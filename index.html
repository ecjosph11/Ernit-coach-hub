<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ERN IT | Coach Hub</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  :root{
    --black:#0a0a0a; --dark:#151515; --card:#1c1c1c; --line:#2c2c2c;
    --red:#CC0000; --red-dim:#2A0000; --white:#f5f5f5; --grey:#8f8f8f;
    --grey-dim:#5a5a5a; --green:#2fae5a; --green-dim:#0d2416; --amber:#d1962c; --amber-dim:#2e2210;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--black);color:var(--white);
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;height:100%;overflow-x:hidden;}
  input,select,textarea,button{font-family:inherit;}
  input,select,textarea{font-size:16px;}
  .app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

  /* ===== HEADER ===== */
  .topbar{background:var(--dark);border-bottom:1px solid var(--line);
    padding:14px 16px 12px;padding-top:calc(14px + env(safe-area-inset-top));flex-shrink:0;}
  .brand-row{display:flex;align-items:baseline;gap:8px;margin-bottom:2px;}
  .brand{font-size:13px;font-weight:800;letter-spacing:2px;color:var(--red);}
  .brand-sub{font-size:11px;color:var(--grey-dim);letter-spacing:1px;text-transform:uppercase;}
  .title-row{display:flex;align-items:center;justify-content:space-between;margin:4px 0 2px;}
  .program-title{font-size:19px;font-weight:800;}
  .sync-pill{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--grey-dim);margin-top:6px;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--grey-dim);flex-shrink:0;}
  .sync-dot.live{background:var(--green);box-shadow:0 0 6px var(--green);}
  .sync-dot.off{background:var(--grey-dim);}

  .search-row{display:flex;gap:8px;margin-top:10px;}
  .search-input{flex:1;background:var(--card);border:1px solid var(--line);border-radius:9px;
    color:var(--white);padding:10px 12px;}
  .add-btn{background:var(--red);color:#fff;border:none;border-radius:9px;padding:10px 16px;
    font-weight:800;font-size:14px;flex-shrink:0;}

  .filter-row{display:flex;gap:6px;margin-top:10px;overflow-x:auto;}
  .filter-chip{flex-shrink:0;padding:6px 12px;border-radius:20px;background:var(--card);
    border:1px solid var(--line);font-size:11.5px;font-weight:700;color:var(--grey);text-transform:uppercase;letter-spacing:0.3px;}
  .filter-chip.active{background:var(--red-dim);border-color:var(--red);color:var(--white);}

  /* ===== SCROLL BODY ===== */
  .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 24px;}

  .empty-state{text-align:center;padding:60px 20px;color:var(--grey-dim);}
  .empty-state .big{font-size:15px;color:var(--grey);margin-bottom:6px;font-weight:700;}

  .client-card{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
  .client-avatar{width:44px;height:44px;border-radius:50%;background:var(--red-dim);
    border:1px solid var(--red);display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:16px;color:var(--white);flex-shrink:0;}
  .client-info{flex:1;min-width:0;}
  .client-name{font-size:15.5px;font-weight:800;margin-bottom:3px;}
  .client-meta{font-size:11.5px;color:var(--grey);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .status-badge{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;
    padding:2px 8px;border-radius:10px;}
  .status-badge.prospect{background:var(--amber-dim);color:var(--amber);}
  .status-badge.active{background:var(--green-dim);color:var(--green);}
  .status-badge.lapsed{background:#2a1414;color:#a35252;}
  .client-chevron{color:var(--grey-dim);font-size:18px;flex-shrink:0;}

  /* ===== MODAL / DETAIL ===== */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:50;display:none;}
  .modal-overlay.open{display:block;}
  .modal-sheet{position:fixed;inset:0;background:var(--black);z-index:51;display:none;
    flex-direction:column;}
  .modal-sheet.open{display:flex;}
  .modal-header{background:var(--dark);border-bottom:1px solid var(--line);
    padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));
    display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .modal-title{font-size:17px;font-weight:800;}
  .modal-close{background:var(--card);border:1px solid var(--line);color:var(--white);
    width:32px;height:32px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center;}

  .tab-row{display:flex;gap:4px;padding:10px 14px 0;background:var(--dark);overflow-x:auto;flex-shrink:0;}
  .tab-btn{flex-shrink:0;padding:9px 13px;font-size:12px;font-weight:800;color:var(--grey);
    border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:0.3px;}
  .tab-btn.active{color:var(--red);border-bottom-color:var(--red);}

  .modal-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 30px;}

  .field-group{margin-bottom:14px;}
  .field-label{display:block;font-size:11px;color:var(--grey-dim);text-transform:uppercase;
    letter-spacing:0.8px;margin-bottom:6px;font-weight:700;}
  .field-input, .field-select, .field-textarea{width:100%;background:var(--card);
    border:1px solid var(--line);border-radius:9px;color:var(--white);padding:11px 12px;}
  .field-textarea{min-height:64px;resize:vertical;}
  .field-input:focus, .field-select:focus, .field-textarea:focus{outline:none;border-color:var(--red);}
  .field-row2{display:flex;gap:10px;}
  .field-row2 .field-group{flex:1;}

  .section-head{font-size:14px;font-weight:800;color:var(--red);text-transform:uppercase;
    letter-spacing:0.5px;margin:20px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--line);}
  .section-head:first-child{margin-top:0;}

  .status-select-row{display:flex;gap:6px;margin-bottom:16px;}
  .status-opt{flex:1;text-align:center;padding:9px 4px;border-radius:8px;background:var(--card);
    border:1px solid var(--line);font-size:11.5px;font-weight:800;color:var(--grey);text-transform:uppercase;}
  .status-opt.active.prospect{background:var(--amber-dim);border-color:var(--amber);color:var(--amber);}
  .status-opt.active.active{background:var(--green-dim);border-color:var(--green);color:var(--green);}
  .status-opt.active.lapsed{background:#2a1414;border-color:#a35252;color:#a35252;}

  .note-item{background:var(--card);border:1px solid var(--line);border-radius:9px;
    padding:10px 12px;margin-bottom:8px;}
  .note-date{font-size:10px;color:var(--grey-dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;}
  .note-text{font-size:13.5px;line-height:1.4;}

  .calc-card{background:var(--card);border:1px solid var(--red);border-radius:10px;padding:14px;margin-top:16px;}
  .calc-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);
    font-size:13.5px;}
  .calc-row:last-child{border-bottom:none;}
  .calc-row .lbl{color:var(--grey);}
  .calc-row .val{font-weight:800;color:var(--white);}
  .calc-row .val.hi{color:var(--red);}

  .day-block{background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:12px;margin-bottom:12px;}
  .day-head-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .day-name-input{background:var(--dark);border:1px solid var(--line);border-radius:7px;
    color:var(--white);padding:8px 10px;font-weight:800;font-size:14px;flex:1;margin-right:8px;}
  .day-del{background:var(--card);border:1px solid var(--line);color:var(--grey);
    width:30px;height:30px;border-radius:7px;font-size:14px;flex-shrink:0;}

  .ex-row{background:var(--dark);border:1px solid var(--line);border-radius:8px;
    padding:10px;margin-bottom:8px;}
  .ex-row-top{display:flex;gap:6px;margin-bottom:6px;}
  .ex-name-input{flex:1;background:var(--black);border:1px solid var(--line);border-radius:6px;
    color:var(--white);padding:8px 9px;font-size:13.5px;font-weight:700;}
  .ex-del{background:var(--black);border:1px solid var(--line);color:var(--grey);
    width:30px;height:30px;border-radius:6px;flex-shrink:0;font-size:13px;}
  .ex-row-mid{display:flex;gap:6px;margin-bottom:6px;}
  .ex-mini-input{flex:1;background:var(--black);border:1px solid var(--line);border-radius:6px;
    color:var(--white);padding:7px 6px;font-size:12px;text-align:center;}
  .ex-mini-lbl{font-size:8.5px;color:var(--grey-dim);text-align:center;text-transform:uppercase;margin-top:2px;}
  .ex-note-input{width:100%;background:var(--black);border:1px solid var(--line);border-radius:6px;
    color:var(--white);padding:7px 9px;font-size:12px;margin-bottom:6px;}
  .ex-video-input{width:100%;background:var(--black);border:1px solid var(--red-dim);border-radius:6px;
    color:#ffb3b3;padding:7px 9px;font-size:11.5px;}

  .add-row-btn{width:100%;background:var(--red-dim);border:1px dashed var(--red);color:var(--red);
    border-radius:8px;padding:10px;font-weight:800;font-size:12.5px;text-transform:uppercase;letter-spacing:0.5px;}
  .add-day-btn{width:100%;background:var(--card);border:1px dashed var(--line);color:var(--grey);
    border-radius:9px;padding:12px;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:0.5px;margin-top:4px;}

  .video-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--red);
    margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;}

  .scan-card{background:var(--card);border:1px solid var(--red);border-radius:11px;
    padding:14px;margin-bottom:18px;}
  .scan-head{font-size:13px;font-weight:800;color:var(--white);margin-bottom:3px;}
  .scan-sub{font-size:11px;color:var(--grey);margin-bottom:12px;line-height:1.4;}
  .scan-btn-row{display:flex;gap:8px;}
  .scan-btn{flex:1;background:var(--red-dim);border:1px solid var(--red);color:var(--white);
    border-radius:8px;padding:11px;font-weight:800;font-size:12.5px;text-transform:uppercase;letter-spacing:0.3px;}
  .scan-btn.secondary{background:var(--dark);border-color:var(--line);color:var(--grey);flex:0 0 auto;padding:11px 16px;}
  .scan-thumb-wrap{margin-top:12px;display:none;}
  .scan-thumb-wrap.show{display:block;}
  .scan-thumb{width:100%;max-height:220px;object-fit:contain;border-radius:8px;border:1px solid var(--line);
    background:var(--black);}
  .scan-status{font-size:11.5px;color:var(--grey);margin-top:10px;line-height:1.4;}
  .scan-status.working{color:var(--amber);}
  .scan-status.ok{color:var(--green);}
  .scan-status.err{color:#ff8080;}
  .scan-spinner{display:inline-block;width:10px;height:10px;border-radius:50%;
    border:2px solid var(--grey-dim);border-top-color:var(--amber);animation:spin 0.7s linear infinite;
    margin-right:6px;vertical-align:-1px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ===== FLOATING SAVE ===== */
  .savebar{flex-shrink:0;background:var(--dark);border-top:1px solid var(--line);
    padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .save-status{font-size:11px;color:var(--grey);flex:1;}
  .btn{border:none;border-radius:8px;padding:11px 18px;font-weight:800;font-size:13px;letter-spacing:0.3px;}
  .btn-red{background:var(--red);color:#fff;}
  .btn-ghost{background:var(--card);color:var(--grey);border:1px solid var(--line);}

  .fab{position:fixed;bottom:24px;right:18px;z-index:20;}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand-row"><span class="brand">ERN IT</span><span class="brand-sub">Coaching</span></div>
    <div class="title-row"><div class="program-title">Coach Hub</div></div>
    <div class="sync-pill"><div class="sync-dot" id="syncDot"></div><span id="syncText">—</span></div>
    <div class="search-row">
      <input class="search-input" id="searchInput" placeholder="Search clients..." oninput="renderRoster()">
      <button class="add-btn" onclick="openNewClient()">+ New Client</button>
    </div>
    <div class="filter-row" id="filterRow"></div>
  </div>

  <div class="scroll" id="roster"></div>
</div>

<!-- ===== CLIENT DETAIL MODAL ===== -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
<div class="modal-sheet" id="modalSheet">
  <div class="modal-header">
    <div class="modal-title" id="modalTitle">Client</div>
    <div class="modal-close" onclick="closeModal()">✕</div>
  </div>
  <div class="tab-row" id="tabRow"></div>
  <div class="modal-scroll" id="modalScroll"></div>
  <div class="savebar">
    <div class="save-status" id="saveStatus">—</div>
    <button class="btn btn-ghost" onclick="deleteClient()">Delete</button>
    <button class="btn btn-red" onclick="saveClient()">Save</button>
  </div>
</div>

<script>
/* ============ FIREBASE (shared single project — fill in once created) ============ */
const HUB_FIREBASE_CONFIG = null; /* set this to { apiKey, authDomain, databaseURL, projectId, storageBucket, messagingSenderId, appId } once the shared project exists */

let hubDb = null;
const firebaseSdkAvailable = typeof firebase !== "undefined";
if(firebaseSdkAvailable && HUB_FIREBASE_CONFIG){
  try{
    const app = firebase.initializeApp(HUB_FIREBASE_CONFIG);
    hubDb = app.database();
  }catch(e){ console.warn("Firebase init failed:", e.message); }
}

function setSyncStatus(){
  const dot = document.getElementById("syncDot");
  const txt = document.getElementById("syncText");
  if(hubDb){ dot.className = "sync-dot live"; txt.textContent = "Live sync — shared client database"; }
  else if(!HUB_FIREBASE_CONFIG){ dot.className = "sync-dot off"; txt.textContent = "Local only — shared Firebase project not set up yet"; }
  else if(!firebaseSdkAvailable){ dot.className = "sync-dot off"; txt.textContent = "Offline preview — Firebase SDK couldn't load"; }
  else { dot.className = "sync-dot off"; txt.textContent = "Local only"; }
}

/* ============ STORE ============ */
const STORE_KEY = "ernit_hub_clients_v1";
function loadClients(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }catch(e){ return {}; } }
function saveClients(obj){ localStorage.setItem(STORE_KEY, JSON.stringify(obj)); }

function pushClientToFirebase(id, client){
  if(!hubDb) return;
  hubDb.ref("clients/" + id).set(client).catch(e=>console.warn("write failed", e.message));
}

function newClientId(){ return "c_" + Date.now() + "_" + Math.random().toString(36).slice(2,7); }

function blankClient(){
  return {
    id: newClientId(),
    name: "", email: "", phone: "", instagram: "",
    status: "prospect",
    createdAt: new Date().toISOString(),
    intake: {
      age:"", heightIn:"", gender:"", occupation:"",
      goal1:"", goal2:"", scaleVsLook:"", inchesGoal:"",
      motivation:"", nutritionLifestyle:"", trainingHistory:"", selfAssessment:"",
      healthWellness:""
    },
    inbody: {
      weightLbs:"", bodyFatPct:"", muscleMassLbs:"", inbodyScore:"",
      weightGoal:"", bodyFatGoal:"", timelineWeeks:""
    },
    program: { days: [] },
    nutrition: { calories:null, protein:null, fat:null, carbs:null, notes:"" },
    notes: []
  };
}

/* ============ STATE ============ */
let clients = loadClients();
let activeClientId = null;
let activeTab = "overview";
let activeFilter = "all";

/* ============ ROSTER RENDER ============ */
const FILTERS = ["all","prospect","active","lapsed"];
function renderFilters(){
  const row = document.getElementById("filterRow");
  row.innerHTML = "";
  FILTERS.forEach(f=>{
    const el = document.createElement("div");
    el.className = "filter-chip" + (activeFilter===f ? " active" : "");
    el.textContent = f === "all" ? "All" : f.charAt(0).toUpperCase()+f.slice(1);
    el.onclick = ()=>{ activeFilter = f; renderFilters(); renderRoster(); };
    row.appendChild(el);
  });
}

function renderRoster(){
  const roster = document.getElementById("roster");
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  let list = Object.values(clients);
  if(activeFilter !== "all") list = list.filter(c=>c.status===activeFilter);
  if(q) list = list.filter(c=>(c.name||"").toLowerCase().includes(q));
  list.sort((a,b)=>(a.name||"").localeCompare(b.name||""));

  roster.innerHTML = "";
  if(list.length === 0){
    roster.innerHTML = `<div class="empty-state"><div class="big">No clients yet</div>Tap "+ New Client" to build your first intake &amp; program.</div>`;
    return;
  }
  list.forEach(c=>{
    const initials = (c.name || "?").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase();
    const card = document.createElement("div");
    card.className = "client-card";
    card.onclick = ()=> openClient(c.id);
    card.innerHTML = `
      <div class="client-avatar">${initials || "?"}</div>
      <div class="client-info">
        <div class="client-name">${c.name || "Unnamed client"}</div>
        <div class="client-meta">
          <span class="status-badge ${c.status}">${c.status}</span>
          <span>${c.phone || c.email || "No contact info"}</span>
        </div>
      </div>
      <div class="client-chevron">›</div>
    `;
    roster.appendChild(card);
  });
}

/* ============ MODAL OPEN / CLOSE ============ */
function openNewClient(){
  const c = blankClient();
  clients[c.id] = c;
  openClient(c.id, true);
}

function openClient(id, isNew){
  activeClientId = id;
  activeTab = "overview";
  scanState = {
    intake: { base64: null, mediaType: null, status: "idle", message: "" },
    inbody: { base64: null, mediaType: null, status: "idle", message: "" },
  };
  document.getElementById("modalOverlay").classList.add("open");
  document.getElementById("modalSheet").classList.add("open");
  renderModal();
}

function closeModal(){
  // discard unsaved-new blank client if it has no name
  const c = clients[activeClientId];
  if(c && !c.name){ delete clients[activeClientId]; }
  document.getElementById("modalOverlay").classList.remove("open");
  document.getElementById("modalSheet").classList.remove("open");
  renderRoster();
}

function deleteClient(){
  if(!confirm("Delete this client permanently? This can't be undone.")) return;
  delete clients[activeClientId];
  saveClients(clients);
  if(hubDb) hubDb.ref("clients/" + activeClientId).remove();
  closeModal();
}

/* ============ TABS ============ */
const TABS = [
  {id:"overview", label:"Overview"},
  {id:"intake", label:"Intake"},
  {id:"inbody", label:"InBody"},
  {id:"program", label:"Program"},
  {id:"nutrition", label:"Nutrition"},
];

function renderModal(){
  const c = clients[activeClientId];
  document.getElementById("modalTitle").textContent = c.name || "New Client";

  const tabRow = document.getElementById("tabRow");
  tabRow.innerHTML = "";
  TABS.forEach(t=>{
    const el = document.createElement("div");
    el.className = "tab-btn" + (activeTab===t.id ? " active" : "");
    el.textContent = t.label;
    el.onclick = ()=>{ collectFormIntoClient(); activeTab = t.id; renderModal(); };
    tabRow.appendChild(el);
  });

  const scroll = document.getElementById("modalScroll");
  if(activeTab === "overview") scroll.innerHTML = renderOverviewTab(c);
  else if(activeTab === "intake") scroll.innerHTML = renderIntakeTab(c);
  else if(activeTab === "inbody") scroll.innerHTML = renderInbodyTab(c);
  else if(activeTab === "program") scroll.innerHTML = renderProgramTab(c);
  else if(activeTab === "nutrition") scroll.innerHTML = renderNutritionTab(c);

  document.getElementById("saveStatus").textContent = c.lastSavedAt ? "Last saved " + c.lastSavedAt : "Not saved yet";
}

/* ============ TAB TEMPLATES ============ */
function renderOverviewTab(c){
  let notesHtml = "";
  (c.notes || []).slice().reverse().forEach(n=>{
    notesHtml += `<div class="note-item"><div class="note-date">${n.date}</div><div class="note-text">${n.text}</div></div>`;
  });

  return `
    <div class="status-select-row" id="statusRow">
      ${["prospect","active","lapsed"].map(s=>`<div class="status-opt ${c.status===s?"active "+s:""}" data-status="${s}" onclick="setStatus('${s}')">${s}</div>`).join("")}
    </div>

    <div class="field-group"><label class="field-label">Full Name</label>
      <input class="field-input" id="f_name" value="${esc(c.name)}"></div>
    <div class="field-row2">
      <div class="field-group"><label class="field-label">Phone</label>
        <input class="field-input" id="f_phone" value="${esc(c.phone)}"></div>
      <div class="field-group"><label class="field-label">Email</label>
        <input class="field-input" id="f_email" value="${esc(c.email)}"></div>
    </div>
    <div class="field-group"><label class="field-label">Instagram Handle</label>
      <input class="field-input" id="f_instagram" value="${esc(c.instagram)}" placeholder="@handle"></div>

    <div class="section-head">Coach Notes</div>
    <div class="field-group">
      <textarea class="field-textarea" id="f_newNote" placeholder="Add a dated note — session feedback, follow-up reminder, life context..."></textarea>
    </div>
    ${notesHtml}
  `;
}

function renderIntakeTab(c){
  const i = c.intake;
  return `
    ${renderScanCard("intake")}
    <div class="section-head">Personal Info</div>
    <div class="field-row2">
      <div class="field-group"><label class="field-label">Age</label>
        <input class="field-input" id="i_age" type="text" inputmode="numeric" value="${esc(i.age)}"></div>

      <div class="field-group"><label class="field-label">Body Fat %</label>
        <input class="field-input" id="b_bodyFatPct" type="text" inputmode="decimal" value="${esc(b.bodyFatPct)}"></div>
    </div>
    <div class="field-row2">
      <div class="field-group"><label class="field-label">Skeletal Muscle Mass (lbs)</label>
        <input class="field-input" id="b_muscleMassLbs" type="text" inputmode="decimal" value="${esc(b.muscleMassLbs)}"></div>
      <div class="field-group"><label class="field-label">InBody Score</label>
        <input class="field-input" id="b_inbodyScore" type="text" inputmode="numeric" value="${esc(b.inbodyScore)}"></div>

      <div class="field-group"><label class="field-label">Weight Goal (lbs)</label>

      <div class="field-group"><label class="field-label">Body Fat Goal %</label>
        <input class="field-input" id="b_bodyFatGoal" type="text" inputmode="decimal" value="${esc(b.bodyFatGoal)}"></div>

function renderInbodyClassification(c){
  const bf = parseFloat(c.inbody.bodyFatPct);
  const gender = c.intake.gender;
  if(isNaN(bf) || !gender) return `<div class="calc-card"><div class="calc-row"><span class="lbl">Classification</span><span class="val">Enter body fat % and gender to classify</span></div></div>`;
  let category = "—";
  if(gender === "female"){
    if(bf < 21) category = "Athletic / Low";
    else if(bf < 25) category = "Fitness";
    else if(bf < 32) category = "Average";
    else category = "Above Average";
  } else {
    if(bf < 14) category = "Athletic / Low";
    else if(bf < 18) category = "Fitness";
    else if(bf < 25) category = "Average";
    else category = "Above Average";
  }
  return `<div class="calc-card"><div class="calc-row"><span class="lbl">BF% Classification</span><span class="val hi">${category}</span></div></div>`;
}

            <div style="flex:1"><input class="ex-mini-input" data-day="${dIdx}" data-ex="${eIdx}" data-field="reps" value="${esc(ex.reps)}" placeholder="10"><div class="ex-mini-lbl">Reps</div></div>
            <div style="flex:1"><input class="ex-mini-input" data-day="${dIdx}" data-ex="${eIdx}" data-field="tempo" value="${esc(ex.tempo)}" placeholder="2011"><div class="ex-mini-lbl">Tempo</div></div>

function renderNutritionTab(c){
  const n = c.nutrition;
  const calc = computeNutrition(c);
  return `
    <div class="section-head">Auto-Calculated Targets</div>
    <div class="calc-card">
      ${calc ? `
        <div class="calc-row"><span class="lbl">BMR (Mifflin-St Jeor)</span><span class="val">${calc.bmr} kcal</span></div>
        <div class="calc-row"><span class="lbl">Calories (BMR × 1.35)</span><span class="val hi">${calc.calories} kcal</span></div>
        <div class="calc-row"><span class="lbl">Protein (1g/lb LBM)</span><span class="val">${calc.protein} g</span></div>
        <div class="calc-row"><span class="lbl">Fat (25–30%)</span><span class="val">${calc.fat} g</span></div>
        <div class="calc-row"><span class="lbl">Carbs (remainder)</span><span class="val">${calc.carbs} g</span></div>

/* ============ SCAN / OCR ============ */
let scanState = {
  intake: { base64: null, mediaType: null, status: "idle", message: "" },
  inbody: { base64: null, mediaType: null, status: "idle", message: "" },
};

function renderScanCard(formType){
  const label = formType === "inbody" ? "InBody / Roadmap Sheet" : "Intake Form";
  const s = scanState[formType];
  const hasImage = !!s.base64;
  return `
    <div class="scan-card">
      <div class="scan-head">📷 Scan Handwritten ${label}</div>
      <div class="scan-sub">Take a photo or choose one from your library — Claude will read it and fill in the fields below for you to review.</div>
      <input type="file" id="scanFile_${formType}" accept="image/*" capture="environment" style="display:none" onchange="handleFileSelected(event,'${formType}')">
      <div class="scan-btn-row">
        <button class="scan-btn" onclick="document.getElementById('scanFile_${formType}').click()">${hasImage ? "Choose Different Photo" : "Choose Photo"}</button>
        ${hasImage ? `<button class="scan-btn secondary" onclick="clearScan('${formType}')">Clear</button>` : ""}
      </div>
      <div class="scan-thumb-wrap ${hasImage ? "show" : ""}">
        ${hasImage ? `<img class="scan-thumb" src="data:${s.mediaType};base64,${s.base64}">` : ""}
      </div>
      ${hasImage ? `<div class="scan-btn-row" style="margin-top:10px;"><button class="scan-btn" onclick="readForm('${formType}')">Read &amp; Fill Form</button></div>` : ""}
      ${s.message ? `<div class="scan-status ${s.status}">${s.status==="working"?'<span class="scan-spinner"></span>':''}${esc(s.message)}</div>` : ""}
    </div>
  `;
}

function handleFileSelected(event, formType){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(){
    const result = reader.result; // data:image/jpeg;base64,...
    const [meta, b64] = result.split(",");
    const mediaType = meta.match(/data:(.*);base64/)[1];
    scanState[formType] = { base64: b64, mediaType, status: "idle", message: "" };
    renderModal();
  };
  reader.readAsDataURL(file);
}

function clearScan(formType){
  scanState[formType] = { base64: null, mediaType: null, status: "idle", message: "" };
  renderModal();
}

async function readForm(formType){
  const s = scanState[formType];
  if(!s.base64) return;
  s.status = "working";
  s.message = "Reading handwriting...";
  renderModal();

  try{
    const res = await fetch("/.netlify/functions/read-form", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ image: s.base64, mediaType: s.mediaType, formType })
    });
    const data = await res.json();

    if(!res.ok || data.error){
      s.status = "err";
      s.message = data.error || "Something went wrong reading the form.";
      renderModal();
      return;
    }

    const c = clients[activeClientId];
    const extracted = data.extracted;
    let filledCount = 0;

    if(formType === "intake"){
      if(extracted.name){ c.name = extracted.name; }
      if(extracted.phone){ c.phone = extracted.phone; }
      if(extracted.email){ c.email = extracted.email; }
      Object.keys(c.intake).forEach(key=>{
        if(extracted[key] !== undefined && extracted[key] !== ""){ c.intake[key] = extracted[key]; filledCount++; }
      });
    } else if(formType === "inbody"){
      Object.keys(c.inbody).forEach(key=>{
        if(extracted[key] !== undefined && extracted[key] !== ""){ c.inbody[key] = extracted[key]; filledCount++; }
      });
    }

    s.status = "ok";
    s.message = `Filled ${filledCount} field${filledCount===1?"":"s"} — review before saving.`;
    renderModal();
  }catch(e){
    s.status = "err";
    s.message = "Network error: " + e.message;
    renderModal();
  }
}

/* ============ NUTRITION CALC (Mifflin-St Jeor, ERN IT standard) ============ */
function computeNutrition(c){
  const heightIn = parseFloat(c.intake.heightIn);
  const age = parseFloat(c.intake.age);
  const gender = c.intake.gender;
  const weightLbs = parseFloat(c.inbody.weightLbs);
  const bfPct = parseFloat(c.inbody.bodyFatPct);
  if(isNaN(heightIn) || isNaN(age) || !gender || isNaN(weightLbs) || isNaN(bfPct)) return null;

  const weightKg = weightLbs * 0.453592;
  const heightCm = heightIn * 2.54;
  let bmr;
  if(gender === "male"){
    bmr = 10*weightKg + 6.25*heightCm - 5*age + 5;
  } else {
    bmr = 10*weightKg + 6.25*heightCm - 5*age - 161;
  }
  const calories = Math.round(bmr * 1.35);

  const lbmLbs = weightLbs * (1 - bfPct/100);
  const proteinG = Math.round(lbmLbs * 1); // 1g protein per lb LBM
  const proteinCals = proteinG * 4;

  const fatCals = calories * 0.275; // midpoint of 25-30%
  const fatG = Math.round(fatCals / 9);

  const remainingCals = calories - proteinCals - (fatG*9);
  const carbsG = Math.max(0, Math.round(remainingCals / 4));

  return { bmr: Math.round(bmr), calories, protein: proteinG, fat: fatG, carbs: carbsG };
}

/* ============ FORM COLLECTION ============ */
function esc(v){ return (v===undefined||v===null) ? "" : String(v).replace(/"/g,"&quot;"); }

function setStatus(s){
  clients[activeClientId].status = s;
  renderModal();
}

function collectFormIntoClient(){
  const c = clients[activeClientId];
  if(!c) return;

  if(activeTab === "overview"){
    c.name = valOf("f_name"); c.phone = valOf("f_phone"); c.email = valOf("f_email"); c.instagram = valOf("f_instagram");
    const newNote = valOf("f_newNote");
    if(newNote && newNote.trim()){
      c.notes = c.notes || [];
      c.notes.push({ date: new Date().toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}), text: newNote.trim() });
    }
  } else if(activeTab === "intake"){
    c.intake.age = valOf("i_age"); c.intake.heightIn = valOf("i_heightIn"); c.intake.gender = valOf("i_gender");
    c.intake.occupation = valOf("i_occupation"); c.intake.goal1 = valOf("i_goal1"); c.intake.goal2 = valOf("i_goal2");
    c.intake.scaleVsLook = valOf("i_scaleVsLook"); c.intake.inchesGoal = valOf("i_inchesGoal");
    c.intake.motivation = valOf("i_motivation"); c.intake.nutritionLifestyle = valOf("i_nutritionLifestyle");
    c.intake.trainingHistory = valOf("i_trainingHistory"); c.intake.healthWellness = valOf("i_healthWellness");
    c.intake.selfAssessment = valOf("i_selfAssessment");
  } else if(activeTab === "inbody"){
    c.inbody.weightLbs = valOf("b_weightLbs"); c.inbody.bodyFatPct = valOf("b_bodyFatPct");
    c.inbody.muscleMassLbs = valOf("b_muscleMassLbs"); c.inbody.inbodyScore = valOf("b_inbodyScore");
    c.inbody.weightGoal = valOf("b_weightGoal"); c.inbody.bodyFatGoal = valOf("b_bodyFatGoal");
    c.inbody.timelineWeeks = valOf("b_timelineWeeks");
  } else if(activeTab === "program"){
    document.querySelectorAll('#modalScroll [data-day][data-field="dayName"]').forEach(inp=>{
      const dIdx = inp.getAttribute('data-day');
      if(c.program.days[dIdx]) c.program.days[dIdx].name = inp.value;
    });
    document.querySelectorAll('#modalScroll [data-ex]').forEach(inp=>{
      const dIdx = inp.getAttribute('data-day'); const eIdx = inp.getAttribute('data-ex'); const field = inp.getAttribute('data-field');
      if(c.program.days[dIdx] && c.program.days[dIdx].exercises[eIdx]) c.program.days[dIdx].exercises[eIdx][field] = inp.value;
    });
  } else if(activeTab === "nutrition"){
    c.nutrition.notes = valOf("n_notes");
    const calc = computeNutrition(c);
    if(calc){ c.nutrition.calories = calc.calories; c.nutrition.protein = calc.protein; c.nutrition.fat = calc.fat; c.nutrition.carbs = calc.carbs; }
  }
}
function valOf(id){ const el = document.getElementById(id); return el ? el.value : ""; }

/* ============ PROGRAM BUILDER ACTIONS ============ */
function addDay(){
  collectFormIntoClient();
  const c = clients[activeClientId];
  c.program.days.push({ name: "", exercises: [] });
  renderModal();
}
function removeDay(idx){
  collectFormIntoClient();
  const c = clients[activeClientId];
  c.program.days.splice(idx,1);
  renderModal();
}
function addExercise(dayIdx){
  collectFormIntoClient();
  const c = clients[activeClientId];
  c.program.days[dayIdx].exercises.push({ name:"", sets:"", reps:"", tempo:"", rest:"", note:"", videoUrl:"" });
  renderModal();
}
function removeExercise(dayIdx, exIdx){
  collectFormIntoClient();
  const c = clients[activeClientId];
  c.program.days[dayIdx].exercises.splice(exIdx,1);
  renderModal();
}

/* ============ SAVE ============ */
function saveClient(){
  collectFormIntoClient();
  const c = clients[activeClientId];
  if(!c.name || !c.name.trim()){
    alert("Add a client name before saving.");
    return;
  }
  const now = new Date();
  c.lastSavedAt = now.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + " · " + now.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
  saveClients(clients);
  pushClientToFirebase(c.id, c);
  renderModal();
  renderRoster();
}

/* ============ INIT ============ */
setSyncStatus();
renderFilters();
renderRoster();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ERN IT | Coach Hub</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  :root{
    --black:#0a0a0a; --dark:#151515; --card:#1c1c1c; --line:#2c2c2c;
    --red:#CC0000; --red-dim:#2A0000; --white:#f5f5f5; --grey:#8f8f8f;
    --grey-dim:#5a5a5a; --green:#2fae5a; --green-dim:#0d2416; --amber:#d1962c; --amber-dim:#2e2210;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--black);color:var(--white);
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;height:100%;overflow-x:hidden;}
  input,select,textarea,button{font-family:inherit;}
  input,select,textarea{font-size:16px;}
  .app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

  /* ===== HEADER ===== */
  .topbar{background:var(--dark);border-bottom:1px solid var(--line);
    padding:14px 16px 12px;padding-top:calc(14px + env(safe-area-inset-top));flex-shrink:0;}
  .brand-row{display:flex;align-items:baseline;gap:8px;margin-bottom:2px;}
  .brand{font-size:13px;font-weight:800;letter-spacing:2px;color:var(--red);}
  .brand-sub{font-size:11px;color:var(--grey-dim);letter-spacing:1px;text-transform:uppercase;}
  .title-row{display:flex;align-items:center;justify-content:space-between;margin:4px 0 2px;}
  .program-title{font-size:19px;font-weight:800;}
  .sync-pill{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--grey-dim);margin-top:6px;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--grey-dim);flex-shrink:0;}
  .sync-dot.live{background:var(--green);box-shadow:0 0 6px var(--green);}
  .sync-dot.off{background:var(--grey-dim);}

  .search-row{display:flex;gap:8px;margin-top:10px;}
  .search-input{flex:1;background:var(--card);border:1px solid var(--line);border-radius:9px;
    color:var(--white);padding:10px 12px;}
  .add-btn{background:var(--red);color:#fff;border:none;border-radius:9px;padding:10px 16px;
    font-weight:800;font-size:14px;flex-shrink:0;}

  .filter-row{display:flex;gap:6px;margin-top:10px;overflow-x:auto;}
  .filter-chip{flex-shrink:0;padding:6px 12px;border-radius:20px;background:var(--card);
    border:1px solid var(--line);font-size:11.5px;font-weight:700;color:var(--grey);text-transform:uppercase;letter-spacing:0.3px;}
  .filter-chip.active{background:var(--red-dim);border-color:var(--red);color:var(--white);}

  /* ===== SCROLL BODY ===== */
  .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 24px;}

  .empty-state{text-align:center;padding:60px 20px;color:var(--grey-dim);}
  .empty-state .big{font-size:15px;color:var(--grey);margin-bottom:6px;font-weight:700;}

  .client-card{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
  .client-avatar{width:44px;height:44px;border-radius:50%;background:var(--red-dim);
    border:1px solid var(--red);display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:16px;color:var(--white);flex-shrink:0;}
  .client-info{flex:1;min-width:0;}
  .client-name{font-size:15.5px;font-weight:800;margin-bottom:3px;}
  .client-meta{font-size:11.5px;color:var(--grey);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .status-badge{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;
    padding:2px 8px;border-radius:10px;}
  .status-badge.prospect{background:var(--amber-dim);color:var(--amber);}
  .status-badge.active{background:var(--green-dim);color:var(--green);}
  .status-badge.lapsed{background:#2a1414;color:#a35252;}
  .client-chevron{color:var(--grey-dim);font-size:18px;flex-shrink:0;}

  /* ===== MODAL / DETAIL ===== */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:50;display:none;}
  .modal-overlay.open{display:block;}
  .modal-sheet{position:fixed;inset:0;background:var(--black);z-index:51;display:none;
    flex-direction:column;}
  .modal-sheet.open{display:flex;}
  .modal-header{background:var(--dark);border-bottom:1px solid var(--line);
    padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));
    display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .modal-title{font-size:17px;font-weight:800;}
  .modal-close{background:var(--card);border:1px solid var(--line);color:var(--white);
    width:32px;height:32px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center;}

  .tab-row{display:flex;gap:4px;padding:10px 14px 0;background:var(--dark);overflow-x:auto;flex-shrink:0;}
  .tab-btn{flex-shrink:0;padding:9px 13px;font-size:12px;font-weight:800;color:var(--grey);
    border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:0.3px;}
  .tab-btn.active{color:var(--red);border-bottom-color:var(--red);}

  .modal-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 30px;}

  .field-group{margin-bottom:14px;}
  .field-label{display:block;font-size:11px;color:var(--grey-dim);text-transform:uppercase;
    letter-spacing:0.8px;margin-bottom:6px;font-weight:700;}
  .field-input, .field-select, .field-textarea{width:100%;background:var(--card);
    border:1px solid var(--line);border-radius:9px;color:var(--white);padding:11px 12px;}
  .field-textarea{min-height:64px;resize:vertical;}
  .field-input:focus, .field-select:focus, .field-textarea:focus{outline:none;border-color:var(--red);}
  .field-row2{display:flex;gap:10px;}
  .field-row2 .field-group{flex:1;}

  .section-head{font-size:14px;font-weight:800;color:var(--red);text-transform:uppercase;
    letter-spacing:0.5px;margin:20px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--line);}
  .section-head:first-child{margin-top:0;}

  .status-select-row{display:flex;gap:6px;margin-bottom:16px;}
  .status-opt{flex:1;text-align:center;padding:9px 4px;border-radius:8px;background:var(--card);
    border:1px solid var(--line);font-size:11.5px;font-weight:800;color:var(--grey);text-transform:uppercase;}
  .status-opt.active.prospect{background:var(--amber-dim);border-color:var(--amber);color:var(--amber);}
  .status-opt.active.active{background:var(--green-dim);border-color:var(--green);color:var(--green);}
  .status-opt.active.lapsed{background:#2a1414;border-color:#a35252;color:#a35252;}

  .note-item{background:var(--card);border:1px solid var(--line);border-radius:9px;
    padding:10px 12px;margin-bottom:8px;}
  .note-date{font-size:10px;color:var(--grey-dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;}
  .note-text{font-size:13.5px;line-height:1.4;}

  .calc-card{background:var(--card);border:1px solid var(--red);border-radius:10px;padding:14px;margin-top:16px;}
  .calc-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);
    font-size:13.5px;}
  .calc-row:last-child{border-bottom:none;}
  .calc-row .lbl{color:var(--grey);}
  .calc-row .val{font-weight:800;color:var(--white);}
  .calc-row .val.hi{color:var(--red);}

  .day-block{background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:12px;margin-bottom:12px;}
  .day-head-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .day-name-input{background:var(--dark);border:1px solid var(--line);border-radius:7px;
    color:var(--white);padding:8px 10px;font-weight:800;font-size:14px;flex:1;margin-right:8px;}
  .day-del{background:var(--card);border:1px solid var(--line);color:var(--grey);
    width:30px;height:30px;border-radius:7px;font-size:14px;flex-shrink:0;}

  .ex-row{background:var(--dark);border:1px solid var(--line);border-radius:8px;
    padding:10px;margin-bottom:8px;}
  .ex-row-top{display:flex;gap:6px;margin-bottom:6px;}
  .ex-name-input{flex:1;background:var(--black);border:1px solid var(--line);border-radius:6px;
    color:var(--white);padding:8px 9px;font-size:13.5px;font-weight:700;}
  .ex-del{background:var(--black);border:1px solid var(--line);color:var(--grey);
    width:30px;height:30px;border-radius:6px;flex-shrink:0;font-size:13px;}
  .ex-row-mid{display:flex;gap:6px;margin-bottom:6px;}
  .ex-mini-input{flex:1;background:var(--black);border:1px solid var(--line);border-radius:6px;
    color:var(--white);padding:7px 6px;font-size:12px;text-align:center;}
  .ex-mini-lbl{font-size:8.5px;color:var(--grey-dim);text-align:center;text-transform:uppercase;margin-top:2px;}
  .ex-note-input{width:100%;background:var(--black);border:1px solid var(--line);border-radius:6px;
    color:var(--white);padding:7px 9px;font-size:12px;margin-bottom:6px;}
  .ex-video-input{width:100%;background:var(--black);border:1px solid var(--red-dim);border-radius:6px;
    color:#ffb3b3;padding:7px 9px;font-size:11.5px;}

  .add-row-btn{width:100%;background:var(--red-dim);border:1px dashed var(--red);color:var(--red);
    border-radius:8px;padding:10px;font-weight:800;font-size:12.5px;text-transform:uppercase;letter-spacing:0.5px;}
  .add-day-btn{width:100%;background:var(--card);border:1px dashed var(--line);color:var(--grey);
    border-radius:9px;padding:12px;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:0.5px;margin-top:4px;}

  .video-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--red);
    margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;}

  .scan-card{background:var(--card);border:1px solid var(--red);border-radius:11px;
    padding:14px;margin-bottom:18px;}
  .scan-head{font-size:13px;font-weight:800;color:var(--white);margin-bottom:3px;}
  .scan-sub{font-size:11px;color:var(--grey);margin-bottom:12px;line-height:1.4;}
  .scan-btn-row{display:flex;gap:8px;}
  .scan-btn{flex:1;background:var(--red-dim);border:1px solid var(--red);color:var(--white);
    border-radius:8px;padding:11px;font-weight:800;font-size:12.5px;text-transform:uppercase;letter-spacing:0.3px;}
  .scan-btn.secondary{background:var(--dark);border-color:var(--line);color:var(--grey);flex:0 0 auto;padding:11px 16px;}
  .scan-thumb-wrap{margin-top:12px;display:none;}
  .scan-thumb-wrap.show{display:block;}
  .scan-thumb{width:100%;max-height:220px;object-fit:contain;border-radius:8px;border:1px solid var(--line);
    background:var(--black);}
  .scan-status{font-size:11.5px;color:var(--grey);margin-top:10px;line-height:1.4;}
  .scan-status.working{color:var(--amber);}
  .scan-status.ok{color:var(--green);}
  .scan-status.err{color:#ff8080;}
  .scan-spinner{display:inline-block;width:10px;height:10px;border-radius:50%;
    border:2px solid var(--grey-dim);border-top-color:var(--amber);animation:spin 0.7s linear infinite;
    margin-right:6px;vertical-align:-1px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ===== FLOATING SAVE ===== */
  .savebar{flex-shrink:0;background:var(--dark);border-top:1px solid var(--line);
    padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .save-status{font-size:11px;color:var(--grey);flex:1;}
  .btn{border:none;border-radius:8px;padding:11px 18px;font-weight:800;font-size:13px;letter-spacing:0.3px;}
  .btn-red{background:var(--red);color:#fff;}
  .btn-ghost{background:var(--card);color:var(--grey);border:1px solid var(--line);}

  .fab{position:fixed;bottom:24px;right:18px;z-index:20;}

  /* pills / ratings / assessment */
  .pill-row{display:flex;flex-wrap:wrap;gap:6px;}
  .pill{padding:8px 13px;border-radius:18px;background:var(--card);border:1px solid var(--line);
    font-size:12px;color:var(--grey);font-weight:700;}
  .pill.on{background:var(--red-dim);border-color:var(--red);color:var(--white);}
  .rate-row{display:flex;gap:6px;}
  .rate-btn{flex:1;text-align:center;padding:10px 0;border-radius:8px;background:var(--card);
    border:1px solid var(--line);color:var(--grey);font-weight:800;font-size:14px;}
  .rate-btn.on{background:var(--red);border-color:var(--red);color:#fff;}
  .crit-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;}
  .crit-label{font-size:13.5px;font-weight:800;margin-bottom:2px;}
  .crit-cue{font-size:11px;color:var(--grey);margin-bottom:9px;line-height:1.4;}
  .seg-row{display:flex;gap:6px;}
  .seg{flex:1;text-align:center;padding:9px 0;border-radius:7px;background:var(--dark);
    border:1px solid var(--line);color:var(--grey);font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:0.3px;}
  .seg.good.on{background:var(--green-dim);border-color:var(--green);color:var(--green);}
  .seg.fair.on{background:var(--amber-dim);border-color:var(--amber);color:var(--amber);}
  .seg.poor.on{background:#2a1414;border-color:#a35252;color:#ff8080;}
  .grade-chip{display:inline-block;padding:4px 12px;border-radius:14px;font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:0.4px;}
  .grade-chip.g{background:var(--green-dim);color:var(--green);border:1px solid var(--green);}
  .grade-chip.a{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber);}
  .grade-chip.r{background:#2a1414;color:#ff8080;border:1px solid #a35252;}
  .fix-item{background:var(--dark);border:1px solid var(--line);border-left:3px solid var(--red);
    border-radius:8px;padding:9px 11px;margin-bottom:7px;font-size:12.5px;line-height:1.45;}
  .fix-item b{color:var(--white);}
  .fix-item .fx{color:var(--grey);}

  .phase-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;}
  .phase-tab{flex-shrink:0;padding:8px 13px;border-radius:8px;background:var(--card);
    border:1px solid var(--line);font-size:11.5px;font-weight:800;color:var(--grey);}
  .phase-tab.on{background:var(--red);border-color:var(--red);color:#fff;}
  .phase-focus{background:var(--red-dim);border:1px solid var(--red);border-radius:9px;
    padding:10px 12px;font-size:12px;color:#ffd6d6;line-height:1.45;margin-bottom:14px;}
  .phase-focus b{color:#fff;}

  .rec-card{background:var(--card);border:1px solid var(--red);border-radius:11px;padding:14px;margin-top:14px;}
  .rec-primary{font-size:16px;font-weight:800;color:var(--white);margin-bottom:2px;}
  .rec-price{font-size:13px;color:var(--red);font-weight:800;margin-bottom:8px;}
  .rec-line{font-size:12px;color:var(--grey);margin-bottom:4px;line-height:1.45;}
  .rec-line b{color:var(--white);}

  .sum-block{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px;}
  .sum-title{font-size:11px;color:var(--red);font-weight:800;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:7px;}
  .sum-line{font-size:13px;line-height:1.55;}
  .sum-line b{color:var(--white);}
  .followup-box{background:var(--dark);border:1px solid var(--line);border-radius:9px;padding:12px;
    font-size:13px;line-height:1.55;white-space:pre-wrap;margin-bottom:8px;}
  .copy-btn{background:var(--card);border:1px solid var(--line);color:var(--grey);border-radius:7px;
    padding:8px 14px;font-weight:800;font-size:11.5px;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:14px;}

  /* ===== v4: classifications, comparison card, cardio, print ===== */
  .band-chip{display:inline-block;padding:8px 18px;border-radius:9px;font-weight:900;font-size:18px;color:#fff;letter-spacing:0.3px;}
  .band-card{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:14px;margin-bottom:12px;}
  .band-range{font-size:13px;color:var(--grey);margin-top:7px;}
  .band-means{font-size:14px;color:var(--white);font-weight:700;margin-top:3px;}
  .threshold-box{background:var(--dark);border:1px solid var(--line);border-left:4px solid #b80f0f;border-radius:9px;padding:11px 13px;font-size:12.5px;color:var(--grey);margin-bottom:12px;line-height:1.5;}
  .threshold-box b{color:var(--white);}
  .flag-banner{background:#2a1414;border:1px solid #b80f0f;border-radius:10px;padding:13px;margin-bottom:12px;}
  .flag-banner .fb-title{color:#ff8080;font-weight:900;font-size:14px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
  .flag-banner .fb-body{font-size:13px;color:var(--grey);line-height:1.5;}

  .cmp-wrap{margin-top:12px;}
  .cmp-title{font-size:11px;color:var(--grey-dim);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px;}
  .cmp-grid{display:flex;gap:10px;}
  .cmp-col{flex:1;background:var(--dark);border:1px solid var(--line);border-radius:11px;padding:14px 10px;text-align:center;}
  .cmp-col.hl{border-color:var(--red);}
  .cmp-lbl{font-size:11px;font-weight:800;color:var(--grey);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
  .cmp-total{font-size:27px;font-weight:900;color:var(--white);}
  .cmp-per{font-size:14px;color:var(--grey);margin-top:3px;}
  .cmp-save{font-size:13px;color:var(--green);font-weight:800;margin-top:6px;}
  .cmp-note{font-size:12px;color:var(--grey-dim);margin-top:6px;}
  .rec-total-bar{background:#000;border:1px solid var(--red);border-radius:11px;padding:13px 15px;display:flex;justify-content:space-between;align-items:center;margin-top:12px;}
  .rec-total-bar .rt-lbl{font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:0.5px;color:var(--grey);}
  .rec-total-bar .rt-val{font-size:25px;font-weight:900;color:var(--white);}
  .rec-primary{font-size:21px !important;}
  .rec-price{font-size:18px !important;}
  .rec-line{font-size:14px !important;}

  #printArea{display:none;}
  @media print{
    body.printing > *:not(#printArea){display:none !important;}
    #printArea{display:block !important;background:#fff;color:#000;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;}
    .p-head{background:#CC0000 !important;color:#fff !important;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;font-weight:900;font-size:14px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .p-phase-head{font-size:15px;font-weight:900;border-bottom:3px solid #CC0000;margin:18px 0 4px;padding-bottom:3px;}
    .p-focus{font-size:10px;color:#444;margin-bottom:8px;}
    .p-day{font-size:12.5px;font-weight:800;margin:12px 0 4px;}
    .p-table{width:100%;border-collapse:collapse;font-size:10.5px;}
    .p-table th,.p-table td{border:1px solid #999;padding:5px 6px;text-align:center;}
    .p-table th{background:#eee !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .p-cue{font-size:9px;color:#555;font-weight:400;}
    .p-track{width:36px;}
    .p-break{page-break-before:always;}
    .p-band{background:#000 !important;color:#fff !important;font-weight:900;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .p-week{font-size:13px;font-weight:900;margin:14px 0 2px;}
    .p-rule{font-size:9.5px;color:#555;margin:2px 0 8px;}
    .p-lth{background:#CC0000 !important;color:#fff !important;font-weight:900;padding:8px 10px;font-size:12px;margin:16px 0 4px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .p-qr{text-align:center;margin:12px 0;}
    .p-qr img{width:150px;height:150px;}
    .p-qr .pq-line{font-size:11px;font-weight:800;margin-top:6px;}
    .p-qr .pq-sub{font-size:10px;color:#333;margin-top:2px;}
    .p-foot{margin-top:20px;text-align:center;font-weight:900;font-size:11px;color:#CC0000 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  }


  .prog-pill{flex:1 1 30%;min-width:100px;text-align:center;padding:11px 8px;border-radius:10px;background:var(--card);border:1px solid var(--line);}
  .prog-pill .pp-name{font-size:12px;font-weight:800;color:var(--grey);line-height:1.3;}
  .prog-pill .pp-price{display:block;font-size:17px;font-weight:900;color:var(--white);margin-top:3px;}
  .prog-pill .pp-per{display:block;font-size:10.5px;color:var(--grey-dim);margin-top:2px;}
  .prog-pill.on{background:var(--red-dim);border-color:var(--red);}
  .prog-pill.on .pp-name{color:#ffd6d6;}

</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand-row"><span class="brand">ERN IT</span><span class="brand-sub">Coaching</span></div>
    <div class="title-row"><div class="program-title">Coach Hub</div></div>
    <div class="sync-pill"><div class="sync-dot" id="syncDot"></div><span id="syncText">—</span></div>
    <div class="search-row">
      <input class="search-input" id="searchInput" placeholder="Search clients..." oninput="renderRoster()">
      <button class="add-btn" onclick="openNewClient()">+ New Client</button>
    </div>
    <div class="filter-row" id="filterRow"></div>
  </div>

  <div class="scroll" id="roster"></div>
</div>

<!-- ===== CLIENT DETAIL MODAL ===== -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
<div class="modal-sheet" id="modalSheet">
  <div class="modal-header">
    <div class="modal-title" id="modalTitle">Client</div>
    <div class="modal-close" onclick="closeModal()">✕</div>
  </div>
  <div class="tab-row" id="tabRow"></div>
  <div class="modal-scroll" id="modalScroll"></div>
  <div class="savebar">
    <div class="save-status" id="saveStatus">—</div>
    <button class="btn btn-ghost" onclick="deleteClient()">Delete</button>
    <button class="btn btn-red" onclick="saveClient()">Save</button>
  </div>
</div>

<script>
/* ============ FIREBASE (shared single project — fill in once created) ============ */
const HUB_FIREBASE_CONFIG = null; /* set this to { apiKey, authDomain, databaseURL, projectId, storageBucket, messagingSenderId, appId } once the shared project exists */

let hubDb = null;
const firebaseSdkAvailable = typeof firebase !== "undefined";
if(firebaseSdkAvailable && HUB_FIREBASE_CONFIG){
  try{
    const app = firebase.initializeApp(HUB_FIREBASE_CONFIG);
    hubDb = app.database();
  }catch(e){ console.warn("Firebase init failed:", e.message); }
}

function setSyncStatus(){
  const dot = document.getElementById("syncDot");
  const txt = document.getElementById("syncText");
  if(hubDb){ dot.className = "sync-dot live"; txt.textContent = "Live sync — shared client database"; }
  else if(!HUB_FIREBASE_CONFIG){ dot.className = "sync-dot off"; txt.textContent = "Local only — shared Firebase project not set up yet"; }
  else if(!firebaseSdkAvailable){ dot.className = "sync-dot off"; txt.textContent = "Offline preview — Firebase SDK couldn't load"; }
  else { dot.className = "sync-dot off"; txt.textContent = "Local only"; }
}

/* ============ STORE ============ */
const STORE_KEY = "ernit_hub_clients_v1";
function loadClients(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }catch(e){ return {}; } }
function saveClients(obj){ localStorage.setItem(STORE_KEY, JSON.stringify(obj)); }

function pushClientToFirebase(id, client){
  if(!hubDb) return;
  hubDb.ref("clients/" + id).set(client).catch(e=>console.warn("write failed", e.message));
}

function newClientId(){ return "c_" + Date.now() + "_" + Math.random().toString(36).slice(2,7); }

function blankClient(){
  return {
    id: newClientId(),
    name: "", email: "", phone: "", instagram: "",
    status: "prospect",
    createdAt: new Date().toISOString(),
    intake: {
      age:"", heightIn:"", gender:"", occupation:"",
      goal1:"", goal2:"", scaleVsLook:"", inchesGoal:"",
      motivation:"", nutritionLifestyle:"", trainingHistory:"", selfAssessment:"",
      healthWellness:""
    },
    inbody: {
      weightLbs:"", bodyFatPct:"", muscleMassLbs:"", inbodyScore:"",
      weightGoal:"", bodyFatGoal:"", timelineWeeks:""
    },
    program: { days: [] },
    nutrition: { calories:null, protein:null, fat:null, carbs:null, notes:"" },
    notes: []
  };
}

/* ============ STATE ============ */
let clients = loadClients();
let activeClientId = null;
let activeTab = "overview";
let activeFilter = "all";

/* ============ ROSTER RENDER ============ */
const FILTERS = ["all","prospect","active","lapsed"];
function renderFilters(){
  const row = document.getElementById("filterRow");
  row.innerHTML = "";
  FILTERS.forEach(f=>{
    const el = document.createElement("div");
    el.className = "filter-chip" + (activeFilter===f ? " active" : "");
    el.textContent = f === "all" ? "All" : f.charAt(0).toUpperCase()+f.slice(1);
    el.onclick = ()=>{ activeFilter = f; renderFilters(); renderRoster(); };
    row.appendChild(el);
  });
}

function renderRoster(){
  const roster = document.getElementById("roster");
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  let list = Object.values(clients);
  if(activeFilter !== "all") list = list.filter(c=>c.status===activeFilter);
  if(q) list = list.filter(c=>(c.name||"").toLowerCase().includes(q));
  list.sort((a,b)=>(a.name||"").localeCompare(b.name||""));

  roster.innerHTML = "";
  if(list.length === 0){
    roster.innerHTML = `<div class="empty-state"><div class="big">No clients yet</div>Tap "+ New Client" to build your first intake &amp; program.</div>`;
    return;
  }
  list.forEach(c=>{
    const initials = (c.name || "?").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase();
    const card = document.createElement("div");
    card.className = "client-card";
    card.onclick = ()=> openClient(c.id);
    card.innerHTML = `
      <div class="client-avatar">${initials || "?"}</div>
      <div class="client-info">
        <div class="client-name">${c.name || "Unnamed client"}</div>
        <div class="client-meta">
          <span class="status-badge ${c.status}">${c.status}</span>
          <span>${c.phone || c.email || "No contact info"}</span>
        </div>
      </div>
      <div class="client-chevron">›</div>
    `;
    roster.appendChild(card);
  });
}

/* ============ MODAL OPEN / CLOSE ============ */
function openNewClient(){
  const c = blankClient();
  clients[c.id] = c;
  openClient(c.id, true);
}

function openClient(id, isNew){
  activeClientId = id;
  activeTab = "overview";
  migrateClient(clients[id]);
  scanState = {
    intake: { base64: null, mediaType: null, status: "idle", message: "" },
    inbody: { base64: null, mediaType: null, status: "idle", message: "" },
  };
  document.getElementById("modalOverlay").classList.add("open");
  document.getElementById("modalSheet").classList.add("open");
  renderModal();
}

function closeModal(){
  // discard unsaved-new blank client if it has no name
  const c = clients[activeClientId];
  if(c && !c.name){ delete clients[activeClientId]; }
  document.getElementById("modalOverlay").classList.remove("open");
  document.getElementById("modalSheet").classList.remove("open");
  renderRoster();
}

function deleteClient(){
  if(!confirm("Delete this client permanently? This can't be undone.")) return;
  delete clients[activeClientId];
  saveClients(clients);
  if(hubDb) hubDb.ref("clients/" + activeClientId).remove();
  closeModal();
}

/* ============ TABS ============ */
const TABS = [
  {id:"overview", label:"Overview"},
  {id:"intake", label:"Intake"},
  {id:"assess", label:"Assess"},
  {id:"inbody", label:"InBody"},
  {id:"recommend", label:"Program Rec"},
  {id:"summary", label:"Summary"},
  {id:"program", label:"Builder"},
  {id:"nutrition", label:"Nutrition"},
];

function renderModal(){
  const c = clients[activeClientId];
  document.getElementById("modalTitle").textContent = c.name || "New Client";

  const tabRow = document.getElementById("tabRow");
  tabRow.innerHTML = "";
  TABS.forEach(t=>{
    const el = document.createElement("div");
    el.className = "tab-btn" + (activeTab===t.id ? " active" : "");
    el.textContent = t.label;
    el.onclick = ()=>{ collectFormIntoClient(); activeTab = t.id; renderModal(); };
    tabRow.appendChild(el);
  });

  const scroll = document.getElementById("modalScroll");
  if(activeTab === "overview") scroll.innerHTML = renderOverviewTab(c);
  else if(activeTab === "intake") scroll.innerHTML = renderIntakeTab(c);
  else if(activeTab === "assess") scroll.innerHTML = renderAssessTab(c);
  else if(activeTab === "inbody") scroll.innerHTML = renderInbodyTab(c);
  else if(activeTab === "recommend") scroll.innerHTML = renderRecommendTab(c);
  else if(activeTab === "summary") scroll.innerHTML = renderSummaryTab(c);
  else if(activeTab === "program") scroll.innerHTML = renderProgramTab(c);
  else if(activeTab === "nutrition") scroll.innerHTML = renderNutritionTab(c);

  document.getElementById("saveStatus").textContent = c.lastSavedAt ? "Last saved " + c.lastSavedAt : "Not saved yet";
}

/* ============ TAB TEMPLATES ============ */
function renderOverviewTab(c){
  let notesHtml = "";
  (c.notes || []).slice().reverse().forEach(n=>{
    notesHtml += `<div class="note-item"><div class="note-date">${n.date}</div><div class="note-text">${n.text}</div></div>`;
  });

  return `
    <div class="status-select-row" id="statusRow">
      ${["prospect","active","lapsed"].map(s=>`<div class="status-opt ${c.status===s?"active "+s:""}" data-status="${s}" onclick="setStatus('${s}')">${s}</div>`).join("")}
    </div>

    <div class="field-group"><label class="field-label">Full Name</label>
      <input class="field-input" id="f_name" value="${esc(c.name)}"></div>
    <div class="field-row2">
      <div class="field-group"><label class="field-label">Phone</label>
        <input class="field-input" id="f_phone" type="tel" inputmode="tel" value="${esc(c.phone)}"></div>
      <div class="field-group"><label class="field-label">Email</label>
        <input class="field-input" id="f_email" type="email" inputmode="email" value="${esc(c.email)}"></div>
    </div>
    <div class="field-group"><label class="field-label">Instagram Handle</label>
      <input class="field-input" id="f_instagram" value="${esc(c.instagram)}" placeholder="@handle"></div>

    <div class="section-head">Coach Notes</div>
    <div class="field-group">
      <textarea class="field-textarea" id="f_newNote" placeholder="Add a dated note — session feedback, follow-up reminder, life context..."></textarea>
    </div>
    ${notesHtml}
  `;
}

function renderIntakeTab_OLD(c){
  const i = c.intake;
  return `
    ${renderScanCard("intake")}
    <div class="section-head">Personal Info</div>
    <div class="field-row2">
      <div class="field-group"><label class="field-label">Age</label>
        <input class="field-input" id="i_age" type="text" inputmode="numeric" value="${esc(i.age)}"></div>
      <div class="field-group"><label class="field-label">Height (in) — required</label>
        <input class="field-input" id="i_heightIn" type="text" inputmode="decimal" value="${esc(i.heightIn)}" placeholder="e.g. 65"></div>
    </div>
    <div class="field-row2">
      <div class="field-group"><label class="field-label">Gender</label>
        <select class="field-select" id="i_gender">
          <option value="">Select</option>
          <option value="female" ${i.gender==="female"?"selected":""}>Female</option>
          <option value="male" ${i.gender==="male"?"selected":""}>Male</option>

      <div class="field-group"><label class="field-label">Occupation</label>

    <div class="section-head">Top 2 Goals</div>

    <div class="field-group"><label class="field-label">Goal 2</label>

    <div class="field-group"><label class="field-label">Scale-Focused or Look-Focused?</label>
      <select class="field-select" id="i_scaleVsLook">
        <option value="">Select</option>
        <option value="scale" ${i.scaleVsLook==="scale"?"selected":""}>Scale (weight number)</option>
        <option value="look" ${i.scaleVsLook==="look"?"selected":""}>Look (how clothes fit / mirror)</option>
        <option value="both" ${i.scaleVsLook==="both"?"selected":""}>Both equally</option>
      </select></div>
    <div class="field-group"><label class="field-label">Inches Goal</label>
      <input class="field-input" id="i_inchesGoal" value="${esc(i.inchesGoal)}"></div>

    <div class="section-head">Motivation &amp; Mindset</div>
    <div class="field-group"><textarea class="field-textarea" id="i_motivation">${esc(i.motivation)}</textarea></div>

    <div class="section-head">Self-Assessment</div>
    <div class="field-group"><textarea class="field-textarea" id="i_selfAssessment">${esc(i.selfAssessment)}</textarea></div>
  `;
}

function renderInbodyTab(c){
  const b = c.inbody;
  return `
    ${renderScanCard("inbody")}
    <div class="section-head">Current Numbers</div>
    <div class="field-row2">
      <div class="field-group"><label class="field-label">Weight (lbs)</label>
        <input class="field-input" id="b_weightLbs" type="text" inputmode="decimal" value="${esc(b.weightLbs)}"></div>
      <div class="field-group"><label class="field-label">Body Fat %</label>
        <input class="field-input" id="b_bodyFatPct" type="text" inputmode="decimal" value="${esc(b.bodyFatPct)}"></div>
    </div>
    <div class="field-row2">
      <div class="field-group"><label class="field-label">Skeletal Muscle Mass (lbs)</label>
        <input class="field-input" id="b_muscleMassLbs" type="text" inputmode="decimal" value="${esc(b.muscleMassLbs)}"></div>
      <div class="field-group"><label class="field-label">InBody Score</label>
        <input class="field-input" id="b_inbodyScore" type="text" inputmode="numeric" value="${esc(b.inbodyScore)}"></div>
    </div>

    <div class="section-head">Goals &amp; Timeline</div>
    <div class="field-row2">
      <div class="field-group"><label class="field-label">Weight Goal (lbs)</label>
        <input class="field-input" id="b_weightGoal" type="text" inputmode="decimal" value="${esc(b.weightGoal)}"></div>
      <div class="field-group"><label class="field-label">Body Fat Goal %</label>
        <input class="field-input" id="b_bodyFatGoal" type="text" inputmode="decimal" value="${esc(b.bodyFatGoal)}"></div>
    </div>
    <div class="field-group"><label class="field-label">Timeline (weeks)</label>
      <input class="field-input" id="b_timelineWeeks" type="text" inputmode="numeric" value="${esc(b.timelineWeeks)}"></div>

    ${renderInbodyClassification(c)}
  `;
}

function renderInbodyClassification(c){
  const bf = parseFloat(c.inbody.bodyFatPct);
  const gender = c.intake.gender;
  if(isNaN(bf) || !gender) return `<div class="calc-card"><div class="calc-row"><span class="lbl">Classification</span><span class="val">Enter body fat % and gender to classify</span></div></div>`;
  let category = "—";
  if(gender === "female"){
    if(bf < 21) category = "Athletic / Low";
    else if(bf < 25) category = "Fitness";
    else if(bf < 32) category = "Average";
    else category = "Above Average";
  } else {
    if(bf < 14) category = "Athletic / Low";
    else if(bf < 18) category = "Fitness";
    else if(bf < 25) category = "Average";
    else category = "Above Average";
  }
  return `<div class="calc-card"><div class="calc-row"><span class="lbl">BF% Classification</span><span class="val hi">${category}</span></div></div>`;
}

function renderProgramTab_OLD(c){
  let daysHtml = "";
  (c.program.days || []).forEach((day, dIdx)=>{
    let exHtml = "";
    (day.exercises || []).forEach((ex, eIdx)=>{
      exHtml += `
        <div class="ex-row">

            <input class="ex-name-input" data-day="${dIdx}" data-ex="${eIdx}" data-field="name" value="${esc(ex.name)}" placeholder="Exercise name">

          </div>
          <div class="ex-row-mid">
            <div style="flex:1"><input class="ex-mini-input" data-day="${dIdx}" data-ex="${eIdx}" data-field="sets" type="text" inputmode="numeric" value="${esc(ex.sets)}" placeholder="4"><div class="ex-mini-lbl">Sets</div></div>
            <div style="flex:1"><input class="ex-mini-input" data-day="${dIdx}" data-ex="${eIdx}" data-field="reps" type="text" value="${esc(ex.reps)}" placeholder="10"><div class="ex-mini-lbl">Reps</div></div>
            <div style="flex:1"><input class="ex-mini-input" data-day="${dIdx}" data-ex="${eIdx}" data-field="tempo" type="text" inputmode="numeric" value="${esc(ex.tempo)}" placeholder="2011"><div class="ex-mini-lbl">Tempo</div></div>
            <div style="flex:1"><input class="ex-mini-input" data-day="${dIdx}" data-ex="${eIdx}" data-field="rest" type="text" value="${esc(ex.rest)}" placeholder="60s"><div class="ex-mini-lbl">Rest</div></div>
          </div>
          <input class="ex-note-input" data-day="${dIdx}" data-ex="${eIdx}" data-field="note" value="${esc(ex.note)}" placeholder="Coaching cue...">
          <div class="video-badge">▶ How-to video</div>
          <input class="ex-video-input" data-day="${dIdx}" data-ex="${eIdx}" data-field="videoUrl" value="${esc(ex.videoUrl)}" placeholder="YouTube link for client">

    });

      <div class="day-block">

        </div>
        ${exHtml}
        <button class="add-row-btn" onclick="addExercise(${dIdx})">+ Add Exercise</button>

  return `
    <div class="section-head">Phase 1 Program</div>
    ${daysHtml || '<div class="empty-state">No days yet. Add training days below.</div>'}
    <button class="add-day-btn" onclick="addDay()">+ Add Training Day</button>
  `;
}

function renderNutritionTab_OLD(c){
  const n = c.nutrition;
  const calc = computeNutrition(c);
  return `
    <div class="section-head">Auto-Calculated Targets</div>
    <div class="calc-card">
      ${calc ? `
        <div class="calc-row"><span class="lbl">BMR (Mifflin-St Jeor)</span><span class="val">${calc.bmr} kcal</span></div>
        <div class="calc-row"><span class="lbl">Calories (BMR × 1.35)</span><span class="val hi">${calc.calories} kcal</span></div>
        <div class="calc-row"><span class="lbl">Protein (1g/lb LBM)</span><span class="val">${calc.protein} g</span></div>
        <div class="calc-row"><span class="lbl">Fat (25–30%)</span><span class="val">${calc.fat} g</span></div>
        <div class="calc-row"><span class="lbl">Carbs (remainder)</span><span class="val">${calc.carbs} g</span></div>
      ` : `<div class="calc-row"><span class="lbl">Missing data</span><span class="val">Need height, age, gender (Intake) + weight, body fat% (InBody) to calculate</span></div>`}
    </div>

    <button class="scan-btn" style="width:100%;margin-top:18px;" onclick="exportNutritionPdf()">⬇ Export Nutrition PDF — targets + day plan + LTH protocol</button>
    <div style="font-size:11px;color:var(--grey-dim);margin:6px 0 4px;">Print dialog → Save to Files / Share to send to the client.</div>

    <div class="section-head">Nutrition Notes</div>
    <div class="field-group">
      <textarea class="field-textarea" id="n_notes" placeholder="Meal timing, supplement schedule, food preferences/allergies, batch-prep notes...">${esc(n.notes)}</textarea>
    </div>
  `;
}

/* ============ SCAN / OCR ============ */
let scanState = {
  intake: { base64: null, mediaType: null, status: "idle", message: "" },
  inbody: { base64: null, mediaType: null, status: "idle", message: "" },
};

function renderScanCard(formType){
  const label = formType === "inbody" ? "InBody / Roadmap Sheet" : "Intake Form";
  const s = scanState[formType];
  const hasImage = !!s.base64;
  return `
    <div class="scan-card">
      <div class="scan-head">📷 Scan Handwritten ${label}</div>
      <div class="scan-sub">Take a photo or choose one from your library — Claude will read it and fill in the fields below for you to review.</div>
      <input type="file" id="scanFile_${formType}" accept="image/*" capture="environment" style="display:none" onchange="handleFileSelected(event,'${formType}')">
      <div class="scan-btn-row">
        <button class="scan-btn" onclick="document.getElementById('scanFile_${formType}').click()">${hasImage ? "Choose Different Photo" : "Choose Photo"}</button>
        ${hasImage ? `<button class="scan-btn secondary" onclick="clearScan('${formType}')">Clear</button>` : ""}
      </div>
      <div class="scan-thumb-wrap ${hasImage ? "show" : ""}">
        ${hasImage ? `<img class="scan-thumb" src="data:${s.mediaType};base64,${s.base64}">` : ""}
      </div>
      ${hasImage ? `<div class="scan-btn-row" style="margin-top:10px;"><button class="scan-btn" onclick="readForm('${formType}')">Read &amp; Fill Form</button></div>` : ""}
      ${s.message ? `<div class="scan-status ${s.status}">${s.status==="working"?'<span class="scan-spinner"></span>':''}${esc(s.message)}</div>` : ""}
    </div>
  `;
}

function handleFileSelected(event, formType){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(){
    const result = reader.result; // data:image/jpeg;base64,...
    const [meta, b64] = result.split(",");
    const mediaType = meta.match(/data:(.*);base64/)[1];
    scanState[formType] = { base64: b64, mediaType, status: "idle", message: "" };
    renderModal();
  };
  reader.readAsDataURL(file);
}

function clearScan(formType){
  scanState[formType] = { base64: null, mediaType: null, status: "idle", message: "" };
  renderModal();
}

async function readForm(formType){
  const s = scanState[formType];
  if(!s.base64) return;
  s.status = "working";
  s.message = "Reading handwriting...";
  renderModal();

  try{
    const res = await fetch("/.netlify/functions/read-form", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ image: s.base64, mediaType: s.mediaType, formType })
    });
    const data = await res.json();

    if(!res.ok || data.error){
      s.status = "err";
      s.message = data.error || "Something went wrong reading the form.";
      renderModal();
      return;
    }

    const c = clients[activeClientId];
    const extracted = data.extracted;
    let filledCount = 0;

    if(formType === "intake"){
      if(extracted.name){ c.name = extracted.name; }
      if(extracted.phone){ c.phone = extracted.phone; }
      if(extracted.email){ c.email = extracted.email; }
      Object.keys(c.intake).forEach(key=>{
        const v = extracted[key];
        if(v === undefined || v === "") return;
        if(Array.isArray(v) && v.length === 0) return;
        c.intake[key] = v; filledCount++;
      });
    } else if(formType === "inbody"){
      if(extracted.heightIn){ c.intake.heightIn = extracted.heightIn; filledCount++; }
      Object.keys(c.inbody).forEach(key=>{
        if(extracted[key] !== undefined && extracted[key] !== ""){ c.inbody[key] = extracted[key]; filledCount++; }
      });
    }

    s.status = "ok";
    s.message = `Filled ${filledCount} field${filledCount===1?"":"s"} — review before saving.`;
    renderModal();
  }catch(e){
    s.status = "err";
    s.message = "Network error: " + e.message;
    renderModal();
  }
}

/* ============ NUTRITION CALC (Mifflin-St Jeor, ERN IT standard) ============ */
function computeNutrition(c){
  const heightIn = parseFloat(c.intake.heightIn);
  const age = parseFloat(c.intake.age);
  const gender = c.intake.gender;
  const weightLbs = parseFloat(c.inbody.weightLbs);
  const bfPct = parseFloat(c.inbody.bodyFatPct);
  if(isNaN(heightIn) || isNaN(age) || !gender || isNaN(weightLbs) || isNaN(bfPct)) return null;

  const weightKg = weightLbs * 0.453592;
  const heightCm = heightIn * 2.54;
  let bmr;
  if(gender === "male"){
    bmr = 10*weightKg + 6.25*heightCm - 5*age + 5;
  } else {
    bmr = 10*weightKg + 6.25*heightCm - 5*age - 161;
  }
  const calories = Math.round(bmr * 1.35);

  const lbmLbs = weightLbs * (1 - bfPct/100);
  const proteinG = Math.round(lbmLbs * 1); // 1g protein per lb LBM
  const proteinCals = proteinG * 4;

  const fatCals = calories * 0.275; // midpoint of 25-30%
  const fatG = Math.round(fatCals / 9);

  const remainingCals = calories - proteinCals - (fatG*9);
  const carbsG = Math.max(0, Math.round(remainingCals / 4));

  return { bmr: Math.round(bmr), calories, protein: proteinG, fat: fatG, carbs: carbsG };
}

function plankTimeScore(t){
  const n = parseFloat(t);
  if(isNaN(n)) return null;
  if(n >= 60) return 2;
  if(n >= 30) return 1;
  return 0;
}

function gradeTest(c, testId){
  const test = ASSESS[testId];
  const a = c.assessment[testId];
  let total = 0, max = 0, scored = 0;
  test.criteria.forEach(cr=>{
    max += 2;
    const v = a.scores[cr.id];
    if(v !== undefined && v !== null && v !== ""){ total += parseInt(v); scored++; }
  });
  if(test.timed){
    max += 2;
    const ts = plankTimeScore(a.timeSec);
    if(ts !== null){ total += ts; scored++; }
  }
  const pct = max ? total/max : 0;
  let chip, cls;
  if(scored === 0){ chip = "Not assessed"; cls = ""; }
  else if(pct >= 0.8){ chip = "Solid"; cls = "g"; }
  else if(pct >= 0.5){ chip = "Developing"; cls = "a"; }
  else { chip = "Priority"; cls = "r"; }
  return {total, max, scored, chip, cls};
}

function assessmentFixes(c){
  const fixes = [];
  Object.keys(ASSESS).forEach(testId=>{
    const test = ASSESS[testId];
    const a = c.assessment[testId];
    test.criteria.forEach(cr=>{
      const v = a.scores[cr.id];
      if(v !== undefined && v !== "" && parseInt(v) <= 1){
        fixes.push({test:test.label, fault:cr.label, severity: parseInt(v)===0 ? "Fix now" : "Refine", fix:cr.fix});
      }
    });
    if(test.timed){
      const ts = plankTimeScore(a.timeSec);
      if(ts !== null && ts <= 1) fixes.push({test:test.label, fault:"Hold time", severity: ts===0 ? "Fix now" : "Refine", fix:"Accumulate holds — 3×20s building to a continuous 60s"});
    }
  });
  return fixes;
}

function computeRecommendation(c){
  const r = c.recommend;
  if(!r.daysPerWeek || !r.budget || !r.style) return null;
  const d = parseInt(r.daysPerWeek);
  const b = r.budget;
  let primary, alternates = [], addons = [];

  if(r.style === "programming"){
    primary = {name:"Program Design Only", price:"$250/mo", detail:"Custom program + 1 check-in meeting per month — no in-person sessions."};
    alternates.push({name:"4-Session Pack", price:"$700 ($175/session)", detail:"Add hands-on sessions to dial in form — expires 90 days."});
  } else if(d >= 3 && b === "1620plus"){
    primary = {name:"3× / Week — Best Value", price:"$1,620/mo · $135/session", detail:"12 sessions/month. Saves $480/mo vs pack rate. Fastest route to the 24-week plan."};
    alternates.push({name:"2× / Week — Popular", price:"$1,200/mo · $150/session", detail:"8 sessions/month if schedule tightens."});
  } else if(d >= 2 && (b === "1200-1620" || b === "1620plus")){
    primary = {name:"2× / Week — Popular", price:"$1,200/mo · $150/session", detail:"8 sessions/month. Saves $200/mo vs pack rate."};
    alternates.push({name:"3× / Week — Best Value", price:"$1,620/mo · $135/session", detail:"Upgrade path when ready to accelerate."});
    alternates.push({name:"1× / Week — Flexible", price:"$660/mo · $165/session", detail:"Step-down option."});
  } else if(d >= 1 && (b === "660-1200" || b === "1200-1620" || b === "1620plus")){
    primary = {name:"1× / Week — Flexible", price:"$660/mo · $165/session", detail:"4 sessions/month. Saves $40/mo vs pack rate. Pair with independent days from your program."};
    alternates.push({name:"2× / Week — Popular", price:"$1,200/mo · $150/session", detail:"Upgrade when budget allows — better rate per session."});
  } else if(b === "250-660"){
    primary = {name:"Program Design Only", price:"$250/mo", detail:"Custom program + monthly check-in. Best results-per-dollar at this budget."};
    alternates.push({name:"4-Session Pack", price:"$700 ($175/session)", detail:"One month of hands-on starts, then transition to programming."});
  } else {
    primary = {name:"2-Session Pack", price:"$350 ($175/session)", detail:"Lowest-commitment starting point — 2 sessions to build the plan and nail form. Expires 90 days."};
    alternates.push({name:"Program Design Only", price:"$250/mo", detail:"If monthly cash flow works better than a lump sum."});
  }

  if(r.nutrition === "yes") addons.push({name:"Nutrition Consultation", price:"$70 (30 min) / $130 (60 min)", detail:"One-on-one review, macro targets & strategy."});
  else if(parseInt(c.intake.nutritionRating) <= 2 && c.intake.nutritionRating !== "") addons.push({name:"Nutrition Consultation", price:"$70 / $130", detail:"Suggested — self-rated nutrition " + c.intake.nutritionRating + "/5."});
  if(r.energy === "yes") addons.push({name:"Active Metabolic Assessment", price:"$189 single / $300 test + re-test", detail:"Measures calories burned during activity — dials in training zones."});

  return {primary, alternates, addons};
}

async function generateFollowup(){
  collectFormIntoClient();
  const c = clients[activeClientId];
  const btn = document.getElementById("followupBtn");
  const status = document.getElementById("followupStatus");
  btn.disabled = true;
  status.textContent = "Writing follow-up...";
  const rec = computeRecommendation(c);
  const fixes = assessmentFixes(c);
  const payload = {
    formType: "followup",
    client: {
      name: c.name,
      goals: (c.intake.goals||[]).join(" + "),
      why: c.intake.whyImportant,
      preventedBefore: c.intake.preventedBefore,
      lifeChange: c.intake.lifeChange,
      assessmentNotes: fixes.slice(0,3).map(f=>f.fault + " (" + f.test + ")").join("; "),
      currentStats: c.inbody.weightLbs ? `${c.inbody.weightLbs} lbs, ${c.inbody.bodyFatPct}% BF, goal ${c.inbody.weightGoal} lbs / ${c.inbody.bodyFatGoal}%` : "",
      recommendation: selectedProgramText(c),
      decision: c.recommend.decision
    }
  };
  try{
    const res = await fetch("/.netlify/functions/read-form", {
      method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload)
    });
    const data = await res.json();
    if(!res.ok || data.error){ status.textContent = data.error || "Generation failed."; btn.disabled = false; return; }
    let fu = data.extracted;
    const opener = "Hey " + (c.name.split(" ")[0] || c.name) + " — this is Ernest, your trainer from Life Time.";
    if(fu.textMessage && !fu.textMessage.startsWith("Hey")) fu.textMessage = opener + " " + fu.textMessage;
    c.followup = fu;
    saveClients(clients);
    pushClientToFirebase(c.id, c);
    renderModal();
  }catch(e){
    status.textContent = "Network error: " + e.message;
    btn.disabled = false;
  }
}

function copyFollow(which){
  const c = clients[activeClientId];
  const txt = which === "email"
    ? "Subject: " + c.followup.emailSubject + "\n\n" + c.followup.emailBody
    : c.followup.textMessage;
  if(navigator.clipboard) navigator.clipboard.writeText(txt);
}

function foodMacros(key, qty, c){
  const db = Object.assign({}, FOOD_DB, (c && c.nutrition.customFoods) || {});
  const f = db[key];
  if(!f) return null;
  const q = parseFloat(qty);
  if(isNaN(q) || q <= 0) return {kcal:0,p:0,f:0,c:0,name:f.n};
  const mult = f.per === "srv" ? q : q/100;
  /* calories computed from macros — P×4 + C×4 + F×9, never the label kcal */
  const p = f.p*mult, fat = f.f*mult, carb = f.c*mult;
  return {kcal: Math.round(p*4 + carb*4 + fat*9), p:Math.round(p*10)/10, f:Math.round(fat*10)/10, c:Math.round(carb*10)/10, name:f.n, per:f.per||"100g"};
}

function foodSelectHtml(mIdx, iIdx, selectedKey, c){

  const order = ["Protein","Carb","Fat","Veg","LTH","Custom","Other"];
  let opts = `<option value="">Select food...</option>`;
  order.forEach(g=>{
    if(!groups[g]) return;
    opts += `<optgroup label="${g}">` + groups[g].map(k=>
      `<option value="${k}" ${k===selectedKey?"selected":""}>${db[k].n}</option>`).join("") + `</optgroup>`;
  });
  return `<select class="field-select" style="font-size:13px;padding:9px 8px;" data-meal="${mIdx}" data-item="${iIdx}" data-nfield="f" onchange="nSync()">${opts}</select>`;

    });

      const idx = inp.getAttribute('data-cardio'), field = inp.getAttribute('data-cfield');

    });

    if(waEl) c.program.workoutAText = waEl.value;
  } else if(activeTab === "nutrition"){
    const n = c.nutrition;
    const notesEl = document.getElementById("n_notes");

    });
    const calc = computeNutrition(c);
    if(calc){ n.calories = calc.calories; n.protein = calc.protein; n.fat = calc.fat; n.carbs = calc.carbs; }
  }
}

const SHEET = { green:"#1f6b38", teal:"#145c66", amber:"#b8700f", red:"#b80f0f" };

const BF_BANDS = {
  female: [
    {name:"Essential", lo:0,  hi:13.9, range:"10–13%", color:SHEET.green, means:"Vital body functions"},

    {name:"Average",   lo:25, hi:31.9, range:"25–31%", color:SHEET.amber, means:"Room to improve"},
    {name:"Overfat",   lo:32, hi:41.9, range:"32–41%", color:SHEET.red,   means:"Elevated health risk"},
    {name:"Obese",     lo:42, hi:200,  range:"42%+",   color:SHEET.red,   means:"High health risk"},
  ],
  male: [
    {name:"Essential", lo:0,  hi:5.9,  range:"2–5%",   color:SHEET.green, means:"Vital body functions"},
    {name:"Athletic",  lo:6,  hi:13.9, range:"6–13%",  color:SHEET.teal,  means:"Peak performance"},
    {name:"Fit",       lo:14, hi:17.9, range:"14–17%", color:SHEET.teal,  means:"Healthy & active"},
    {name:"Average",   lo:18, hi:24.9, range:"18–24%", color:SHEET.amber, means:"Room to improve"},
    {name:"Overfat",   lo:25, hi:30.9, range:"25–30%", color:SHEET.red,   means:"Elevated health risk"},
    {name:"Obese",     lo:31, hi:200,  range:"31%+",   color:SHEET.red,   means:"High health risk"},
  ],
};

function bfClassify(gender, bf){
  const bands = BF_BANDS[gender];
  if(!bands) return null;
  return bands.find(b => bf >= b.lo && bf <= b.hi) || bands[bands.length-1];
}

function scoreBand(score){
  if(score < 60)  return {name:"High Risk", range:"Below 60", color:SHEET.red,
    means:"Low lean mass or excess body fat — elevated metabolic risk. Below the healthy baseline."};
  if(score < 80)  return {name:"Average", range:"60–79", color:SHEET.amber,
    means:"Reasonably balanced body composition. Acceptable baseline with clear room to improve toward optimal."};
  return {name:"Optimal", range:"80+", color:SHEET.green,
    means:"Balanced and healthy body composition. Strong lean mass relative to body fat. Baseline = 80 points."};
}

function lbmValue(c){
  const v = parseFloat(c.inbody.muscleMassLbs);
  if(!isNaN(v)) return v;
  const w = parseFloat(c.inbody.weightLbs), bf = parseFloat(c.inbody.bodyFatPct);
  if(isNaN(w) || isNaN(bf)) return NaN;
  return Math.round(w * (1 - bf/100) * 10) / 10;
}
function lbmLow(c){
  const h = parseFloat(c.intake.heightIn);
  const lv = lbmValue(c);
  return !isNaN(h) && h > 60 && !isNaN(lv) && lv < 100;
}

/* ---- Nutrition modes: recommendation + coach override ---- */
function recommendedMode(c){
  const gender = c.intake.gender, bf = parseFloat(c.inbody.bodyFatPct);
  if(lbmLow(c) && gender && !isNaN(bf)){
    const threshold = gender === "male" ? 22 : 32;
    return bf >= threshold ? "cut" : "bulk";
  }
  return "recomp";
}
const MODE_LABEL = {bulk:"Bulk", recomp:"Recomp", cut:"Deficit"};

function computeNutrition(c){
  const i = c.intake, b = c.inbody;
  const w = parseFloat(b.weightLbs), bf = parseFloat(b.bodyFatPct);
  const h = parseFloat(i.heightIn), age = parseFloat(i.age);
  const gender = i.gender;
  if(isNaN(w) || isNaN(bf) || isNaN(h) || isNaN(age) || !gender) return null;
  const kg = w / 2.2046, cm = h * 2.54;
  const bmr = 10*kg + 6.25*cm - 5*age + (gender === "male" ? 5 : -161);
  let cal = bmr * 1.35;
  const lbm = w * (1 - bf/100);
  const rec = recommendedMode(c);
  const mode = (c.nutrition && c.nutrition.mode && c.nutrition.mode !== "auto") ? c.nutrition.mode : rec;
  const deficit = parseFloat((c.nutrition && c.nutrition.deficitLevel) || "500");
  if(mode === "bulk") cal += 250;
  else if(mode === "cut") cal -= deficit;
  cal = Math.round(cal);
  const protein = Math.round(lbm);              /* 1g per lb LBM — held high in every mode */
  const fat = Math.round(cal * 0.275 / 9);
  const carbs = Math.round((cal - protein*4 - fat*9) / 4);
  return {calories:cal, protein, fat, carbs, mode, recommended:rec, deficit, lbm:Math.round(lbm*10)/10};
}

function setNutriMode(v){
  collectFormIntoClient();
  clients[activeClientId].nutrition.mode = v;
  renderModal();
}
function setDeficitLevel(v){

  let html = `<div class="field-group" style="margin-bottom:10px;">
    <label class="field-label">Nutrition Approach — recommended: <b style="color:var(--red);">${MODE_LABEL[rec]}${rec==="cut" ? " (high protein)" : ""}</b></label>
    <div class="rate-row">
      <div class="rate-btn ${mode==="auto"?"on":""}" onclick="setNutriMode('auto')" style="font-size:12px;">Auto</div>
      <div class="rate-btn ${mode==="bulk"?"on":""}" onclick="setNutriMode('bulk')" style="font-size:12px;">Bulk +250</div>
      <div class="rate-btn ${mode==="recomp"?"on":""}" onclick="setNutriMode('recomp')" style="font-size:12px;">Recomp</div>
      <div class="rate-btn ${mode==="cut"?"on":""}" onclick="setNutriMode('cut')" style="font-size:12px;">Deficit</div>

  }

}

function lbmCallout(c){
  if(!lbmLow(c)) return "";
  const lv = lbmValue(c);
  const gender = c.intake.gender, bf = parseFloat(c.inbody.bodyFatPct);
  const threshold = gender === "male" ? 22 : 32;
  const overT = !isNaN(bf) && bf >= threshold;
  const line = overT
    ? `BF% is above the ${threshold}% health threshold — priority is fat loss: <b>high-protein deficit</b> (protein held at 1g/lb LBM to protect muscle while weight drops).`
    : `BF% is under the health threshold — priority is building lean mass: <b>lean bulk (+250 kcal)</b> recommended.`;
  return `<div class="flag-banner">
    <div class="fb-title">Low Lean Body Mass — ${lv} lbs</div>
    <div class="fb-body">Under 100 lbs LBM at 5'0"+ height. ${line} Override with the pills below if needed.</div>
  </div>`;
}

/* ============ INBODY TAB v4 — sheet-exact classifications ============ */
function renderInbodyTab(c){
  const b = c.inbody;

/* ============ PROGRAM REC v4 — never Program Design Only ============ */
const MONTHLY = {
  1:{total:660,  per:165, label:"1× / Week — Flexible"},
  2:{total:1200, per:150, label:"2× / Week — Popular"},
  3:{total:1620, per:135, label:"3× / Week — Best Value"},
};
const PACKS = {
  4:{total:700,  per:175, label:"4-Session Pack"},
  8:{total:1320, per:165, label:"8-Session Pack"},
  12:{total:1860, per:155, label:"12-Session Pack"},
};

function computeRecommendation(c){
  const r = c.recommend;
  if(!r.daysPerWeek || !r.budget || !r.style) return null;
  const d = parseInt(r.daysPerWeek);
  const tierIdx = {"under250":0,"250-660":1,"660-1200":2,"1200-1620":3,"1620plus":4}[r.budget];
  /* highest monthly frequency the budget covers */
  let maxAfford = 0;
  if(tierIdx >= 4) maxAfford = 3;
  else if(tierIdx === 3) maxAfford = 2;
  else if(tierIdx === 2) maxAfford = 1;
  const m = Math.min(d, maxAfford);

  let primary, compare, alternates = [], addons = [];

  if(m >= 1){
    const mo = MONTHLY[m], pk = PACKS[m*4];
    primary = {name:mo.label, priceNum:mo.total, priceLabel:"$" + mo.total.toLocaleString() + "/mo · $" + mo.per + "/session",
      detail:(m*4) + " sessions per month. Locks in the rate — renews monthly, cancel anytime."};
    compare = {sessions:m*4, monthly:mo, pack:pk, save:pk.total - mo.total};
    if(m < d) primary.detail += " Budget caps at " + m + "×/week for now — upgrade path below.";
    if(m < 3) alternates.push({name:MONTHLY[m+1].label, priceLabel:"$" + MONTHLY[m+1].total.toLocaleString() + "/mo · $" + MONTHLY[m+1].per + "/session", detail:"Upgrade path — faster route through the 24-week plan."});
    if(m > 1) alternates.push({name:MONTHLY[m-1].label, priceLabel:"$" + MONTHLY[m-1].total.toLocaleString() + "/mo · $" + MONTHLY[m-1].per + "/session", detail:"Step-down option if the schedule tightens."});
  } else {
    /* budget below any monthly package → no-commitment starter, never Program Design Only */
    primary = {name:"2-Session Pack", priceNum:350, priceLabel:"$350 · $175/session",
      detail:"No-commitment starting point — two sessions to build the plan and nail form. Expires 90 days."};
    compare = {sessions:4, monthly:MONTHLY[1], pack:PACKS[4], save:PACKS[4].total - MONTHLY[1].total,
      note:"When ready for weekly training — same 4 sessions, two ways to pay:"};
    alternates.push({name:"4-Session Pack", priceLabel:"$700 · $175/session", detail:"A full month of hands-on starts."});
  }

  if(r.nutrition === "yes") addons.push({name:"Nutrition Consultation", low:70, priceLabel:"$70 (30 min) / $130 (60 min)", detail:"One-on-one review, macro targets & strategy."});
  else if(c.intake.nutritionRating !== "" && parseInt(c.intake.nutritionRating) <= 2) addons.push({name:"Nutrition Consultation", low:70, priceLabel:"$70 / $130", detail:"Suggested — self-rated nutrition " + c.intake.nutritionRating + "/5."});
  if(r.energy === "yes") addons.push({name:"Active Metabolic Assessment", low:189, priceLabel:"$189 single / $300 test + re-test", detail:"Measures calories burned during activity — dials in training zones."});

  const firstMonth = primary.priceNum + addons.reduce((s,a)=>s+a.low, 0);
  const styleNote = r.style === "programming"
    ? "Client leans self-guided — position monthly coaching as the accelerator. Program Design Only stays out of the consult; it's a follow-up-email fallback."
    : "";

  return {primary, compare, alternates, addons, firstMonth, styleNote};
}

async function generateBC(){
  collectFormIntoClient();
  const c = clients[activeClientId];
  const txt = (c.program.workoutAText || "").trim();
  const st = document.getElementById("bcStatus");
  const btn = document.getElementById("bcBtn");

  st.textContent = "Building Workouts B & C from the 7-pattern framework...";
  const faults = assessmentFixes(c).map(f => f.fault + " (" + f.test + ")").join("; ");
  try{
    const res = await fetch("/.netlify/functions/read-form", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({formType:"workoutBC", client:{
        workoutA: txt,
        goals: (c.intake.goals || []).join(" + "),
        faults: faults,
        phase: c.program.phases[progPhase].name

    });
    const data = await res.json();
    if(!res.ok || data.error){ st.textContent = data.error || "Generation failed."; btn.disabled = false; return; }
    const ex = data.extracted;
    const mk = (arr)=> (arr || []).map(e=>({name:String(e.name||""), sets:String(e.sets||""), reps:String(e.reps||""), tempo:String(e.tempo||""), rest:String(e.rest||""), note:String(e.note||""), load:String(e.load||""), videoUrl:""}));
    const ph = clients[activeClientId].program.phases[progPhase];
    ph.days.push({name:"Workout B", exercises: mk(ex.workoutB)});
    ph.days.push({name:"Workout C", exercises: mk(ex.workoutC)});
    saveClients(clients);
    pushClientToFirebase(c.id, c);
    renderModal();
  }catch(e){
    st.textContent = "Network error: " + e.message;
    btn.disabled = false;
  }
}

/* ---- frequency the GOAL needs — price never enters this ---- */
function neededFrequency(c){
  const goals = c.intake.goals || [];
  const w = parseFloat(c.inbody.weightLbs), gw = parseFloat(c.inbody.weightGoal), wk = parseFloat(c.inbody.timelineWeeks);
  let freq = 2;
  const why = [];

  const muscle = goals.some(g => /Muscle|Strength/i.test(g));
  const loss = goals.some(g => /Lose Weight/i.test(g));

  if(muscle){
    freq = 3;
    why.push("Muscle / strength goal — frequency drives progressive overload. 3×/week hits every movement pattern at least twice.");
  }

  let rate = null, pct = null;
  if(!isNaN(w) && !isNaN(gw) && !isNaN(wk) && wk > 0 && gw < w){
    rate = (w - gw) / wk;
    pct = rate / w * 100;
    const inBand = pct <= 1;
    why.push((w - gw).toFixed(1) + " lbs \u00f7 " + wk + " wks = " + rate.toFixed(2) + " lb/wk (" + pct.toFixed(2) + "% BW/wk" + (inBand ? " — inside the safe 0.5\u20131% band" : " — ABOVE the safe 1% band; adjust the timeline or the expectation") + ")");
    if(pct > 0.85 || rate >= 1.5){
      freq = 3;
      why.push("Aggressive rate for this window — 3\u00d7/week lifting + the cardio Rx keeps the deficit muscle-sparing.");
    }
  } else if(loss){
    why.push("Timeline math incomplete — set weight goal + timeline on the InBody tab to run the deficit calc.");
  }

  const redTests = ["squat","pushup","plank"].map(t => gradeTest(c, t)).filter(g => g.cls === "r").length;
  if(redTests >= 1){
    why.push("Movement screen has priority-level faults — Phase 1 needs coached frequency to hardwire clean patterns before loading.");
    if(redTests >= 2 || muscle) freq = 3;
  }

  if(freq === 2 && !muscle) why.push("2\u00d7/week coached sessions cover the goal — independent cardio days carry the rest.");
  return {freq: Math.min(freq, 3), why, rate, pct};
}

function computeRecommendation(c){
  const r = c.recommend;
  if(!r.daysPerWeek || !r.style) return null;
  const nf = neededFrequency(c);
  const freq = nf.freq;
  const stated = parseInt(r.daysPerWeek);
  const mo = MONTHLY[freq], pk = PACKS[freq * 4];

  const primary = {
    name: mo.label,
    priceNum: mo.total,
    priceLabel: "$" + mo.total.toLocaleString() + "/mo \u00b7 $" + mo.per + "/session",
    detail: (freq * 4) + " sessions per month — picked from the goal, the timeline, and the movement screen. Not the budget."
  };
  const compare = {sessions: freq * 4, monthly: mo, pack: pk, save: pk.total - mo.total};

  const alternates = [];
  if(freq < 3) alternates.push({name: MONTHLY[freq+1].label, priceLabel: "$" + MONTHLY[freq+1].total.toLocaleString() + "/mo \u00b7 $" + MONTHLY[freq+1].per + "/session", detail: "Faster pace through the 24-week plan."});
  if(freq > 1) alternates.push({name: MONTHLY[freq-1].label, priceLabel: "$" + MONTHLY[freq-1].total.toLocaleString() + "/mo \u00b7 $" + MONTHLY[freq-1].per + "/session", detail: "Slower pace — the timeline stretches with it."});

  const gapNote = (!isNaN(stated) && stated < freq)
    ? "Client says " + stated + "\u00d7/week — the goal math says " + freq + "\u00d7. Have that conversation before shrinking the target."
    : "";

  const addons = [];
  if(r.nutrition === "yes") addons.push({name:"Nutrition Consultation", low:70, priceLabel:"$70 (30 min) / $130 (60 min)", detail:"One-on-one review, macro targets & strategy."});
  else if(c.intake.nutritionRating !== "" && parseInt(c.intake.nutritionRating) <= 2) addons.push({name:"Nutrition Consultation", low:70, priceLabel:"$70 / $130", detail:"Suggested — self-rated nutrition " + c.intake.nutritionRating + "/5."});
  if(r.energy === "yes") addons.push({name:"Active Metabolic Assessment", low:189, priceLabel:"$189 single / $300 test + re-test", detail:"Measures calories burned during activity — dials in training zones."});

  const firstMonth = primary.priceNum + addons.reduce((s,a)=>s+a.low, 0);
  const styleNote = r.style === "programming"
    ? "Client leans self-guided — position monthly coaching as the accelerator. Program Design Only stays out of the consult; it's a follow-up-email fallback."
    : "";

  return {primary, compare, alternates, addons, firstMonth, styleNote, rationale: nf.why, gapNote};
}

/* ---- nutrition: pull straight from Intake + InBody ---- */
function computeNutrition(c){
  const i = c.intake, b = c.inbody;
  const w = parseFloat(b.weightLbs), bf = parseFloat(b.bodyFatPct);
  const h = parseFloat(i.heightIn), age = parseFloat(i.age);
  const gender = i.gender;
  if(isNaN(w) || isNaN(bf) || isNaN(h) || isNaN(age) || !gender) return null;
  const kg = w / 2.2046, cm = h * 2.54;
  const bmr = 10*kg + 6.25*cm - 5*age + (gender === "male" ? 5 : -161);
  let cal = bmr * 1.35;
  const derivedLbm = w * (1 - bf/100);
  const lbmUsed = !isNaN(lbmValue(c)) ? lbmValue(c) : Math.round(derivedLbm*10)/10;  /* InBody LBM field wins; derived fallback */
  const rec = recommendedMode(c);
  const mode = (c.nutrition && c.nutrition.mode && c.nutrition.mode !== "auto") ? c.nutrition.mode : rec;
  const deficit = parseFloat((c.nutrition && c.nutrition.deficitLevel) || "500");
  if(mode === "bulk") cal += 250;
  else if(mode === "cut") cal -= deficit;
  cal = Math.round(cal);
  const protein = Math.round(lbmUsed);          /* 1g per lb LBM from the InBody tab */
  const fat = Math.round(cal * 0.275 / 9);
  const carbs = Math.round((cal - protein*4 - fat*9) / 4);
  return {calories:cal, protein, fat, carbs, mode, recommended:rec, deficit, lbm:Math.round(derivedLbm*10)/10, lbmUsed};
}

function missingNutriData(c){
  const miss = [];
  if(!parseFloat(c.intake.heightIn)) miss.push("height (Intake)");
  if(!parseFloat(c.intake.age)) miss.push("age (Intake)");
  if(!c.intake.gender) miss.push("gender (Intake)");
  if(!parseFloat(c.inbody.weightLbs)) miss.push("weight (InBody)");

  return `<div class="calc-row"><span class="lbl">Missing</span><span class="val">${miss.join(" \u00b7 ") || "—"}</span></div>`;
}

/* ---- robust height parsing: 5'4" / 5-4 / 5 ft 4 / 64 / 163cm ---- */
function parseHeightIn(v){
  if(v === undefined || v === null) return NaN;
  const s = String(v).trim().toLowerCase();
  if(!s) return NaN;
  const m = s.match(/^(\d)\s*(?:'|\u2019|-|ft|feet)\s*(\d{1,2})/);
  if(m) return parseInt(m[1]) * 12 + parseInt(m[2]);
  const n = parseFloat(s.replace(/[^0-9.]/g, ""));
  if(isNaN(n)) return NaN;
  if(n > 90) return Math.round(n / 2.54);      /* cm */
  if(n >= 36 && n <= 90) return Math.round(n); /* inches */
  if(n >= 3 && n < 9) return Math.round(n * 12); /* bare feet like "5" or "5.5" */
  return NaN;
}

function lbmLow(c){
  const h = parseHeightIn(c.intake.heightIn);
  const lv = lbmValue(c);
  return !isNaN(h) && h > 60 && !isNaN(lv) && lv < 100;

  const kg = w / 2.2046, cm = h * 2.54;
  const bmr = 10*kg + 6.25*cm - 5*age + (gender === "male" ? 5 : -161);
  let cal = bmr * 1.35;
  const derivedLbm = Math.round(w * (1 - bf/100) * 10) / 10;
  const lbmUsed = !isNaN(lbmValue(c)) ? lbmValue(c) : derivedLbm;
  const rec = recommendedMode(c);
  const mode = (c.nutrition && c.nutrition.mode && c.nutrition.mode !== "auto") ? c.nutrition.mode : rec;
  const deficit = parseFloat((c.nutrition && c.nutrition.deficitLevel) || "500");
  if(mode === "bulk") cal += 250;
  else if(mode === "cut") cal -= deficit;
  cal = Math.round(cal);
  const protein = Math.round(lbmUsed);
  const fat = Math.round(cal * 0.275 / 9);
  const carbs = Math.round((cal - protein*4 - fat*9) / 4);
  return {calories:cal, protein, fat, carbs, mode, recommended:rec, deficit, lbm:derivedLbm, lbmUsed, heightIn:h};

    return ASSESS[t].label.split(" ")[0] + ": " + g.chip + (g.scored ? " (" + g.total + "/" + g.max + ")" : "");
  }).join("; ");
  const faults = assessmentFixes(c).map(f => f.fault + " [" + f.severity + "] \u2192 " + f.fix).join("; ");
  try{
    const res = await fetch("/.netlify/functions/read-form", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({formType:"workoutBC", client:{
        workoutA: txt,
        goals: (c.intake.goals || []).join(" + "),
        phase: c.program.phases[progPhase].name,
        screenGrades: screenGrades,
        faults: faults
      }})
    });
    let data;
    try{ data = await res.json(); }
    catch(parseErr){
      st.textContent = "Server error (HTTP " + res.status + ") \u2014 likely the 10-second function limit. Tap Generate again.";
      btn.disabled = false; return;
    }
    if(!res.ok || data.error){
      st.textContent = (data.error || "Generation failed") + " (HTTP " + res.status + "). If this repeats, it's the 10s function limit \u2014 tap Generate again.";
      btn.disabled = false; return;
    }
    const ex = data.extracted;
    const mk = (arr)=> (arr || []).map(e=>({name:String(e.name||""), sets:String(e.sets||""), reps:String(e.reps||""), tempo:String(e.tempo||""), rest:String(e.rest||""), note:String(e.note||""), load:String(e.load||""), videoUrl:""}));
    const ph = clients[activeClientId].program.phases[progPhase];
    upsertDay(ph, "Workout A", mk(ex.workoutA));
    upsertDay(ph, "Workout B", mk(ex.workoutB));
    upsertDay(ph, "Workout C", mk(ex.workoutC));
    saveClients(clients);
    pushClientToFirebase(c.id, c);
    renderModal();
  }catch(e){
    st.textContent = "Network error: " + e.message;
    btn.disabled = false;
  }
}

const PHASE_WEEKS = [4, 8, 8, 4];
const PROG_RULE = "Progression rule: add 5% load next week when every set was completed at the load with 12+ reps across 3 sets.";
let progWeek = 0;

function setProgPhase(i){
  collectFormIntoClient();
  progPhase = i;
  progWeek = 0;
  renderModal();
}
function setProgWeek(i){
  collectFormIntoClient();
  progWeek = i;
  renderModal();
}

function dupWeek(withProg){
  collectFormIntoClient();
  const ph = clients[activeClientId].program.phases[progPhase];
  const prev = ph.weekPlans[progWeek - 1];
  if(!prev || !prev.days.length){ alert("Week " + progWeek + " is empty — build it first."); return; }
  const copy = JSON.parse(JSON.stringify(prev.days));
  if(withProg){
    copy.forEach(d => (d.exercises || []).forEach(ex => {
      const L = parseFloat(ex.load);
      if(!isNaN(L) && L > 0){
        ex.load = String(Math.round(L * 1.05 / 2.5) * 2.5);
        ex.note = ((ex.note || "").replace(/\s*\u25b25%$/, "") + " \u25b25%").trim();
      }
    }));
  }
  ph.weekPlans[progWeek] = {days: copy};
  renderModal();
}

function lthRecommendations(c){
  const goals = c.intake.goals || [];

  const mode = calc ? calc.mode : null;
  const sleep = parseFloat(c.intake.sleepHours);
  const stress = parseInt(c.intake.stressLevel);
  const has = (re) => goals.some(g => re.test(g));
  const recs = [];
  const add = (name, when, why) => { if(!recs.find(r => r.name === name)) recs.push({name, when, why}); };

  add("LTH Armor D3+K2", "Breakfast", "Daily foundation — immune, bone & hormone support.");
  if(has(/Lose Weight/i) || mode === "cut"){
    add("LTH Build Whey+ (Fuel Vegan+ if plant-based)", "Post-workout / protein-short meals", "Protects lean mass in a deficit — hitting the protein number is the whole game.");
    add("LTH Hydrate", "Cardio days", "Electrolytes for Zone 2 sessions without the sugar.");
  }
  if(has(/Muscle|Strength/i) || mode === "bulk"){
    add("LTH Build Whey+ (Fuel Vegan+ if plant-based)", "Post-workout", "Muscle is built in recovery — this closes the protein gap on training days.");
    add("LTH Power Creatine", "Any meal, every day", "The most-proven supplement in existence for strength & lean mass.");
  }
  if(has(/Energy|Endurance/i)){
    add("LTH Hydrate", "Cardio days", "Electrolytes for Zone 2 sessions without the sugar.");
    add("LTH Power Creatine", "Any meal, every day", "Supports repeat high-effort output — not just a muscle supplement.");
  }
  if(has(/Anxiety|Stress/i) || (!isNaN(sleep) && sleep < 7) || (!isNaN(stress) && stress >= 4)){
    add("LTH Dream Multi-Mag", "Before bed", "Magnesium for sleep quality & stress — results are built overnight.");
  }
  add("LTH Glow Omega-3", "Dinner", "Joint, heart & recovery support.");
  return recs;
}

        h += `<tr><td style="text-align:left;">${esc(m.name)}</td><td>${esc(it.q)}${unit}</td><td>${m.kcal}</td><td>${m.p}</td><td>${m.c}</td><td>${m.f}</td></tr>`;
      });
      day.kcal += mt.kcal; day.p += mt.p; day.f += mt.f; day.c += mt.c;
      h += `<tr><td style="text-align:left;"><b>Meal total</b></td><td></td><td><b>${Math.round(mt.kcal)}</b></td><td><b>${Math.round(mt.p)}</b></td><td><b>${Math.round(mt.c)}</b></td><td><b>${Math.round(mt.f)}</b></td></tr></table>`;
    });
    h += `<table class="p-table" style="margin-top:8px;"><tr class="p-band"><td style="text-align:left;padding:7px 8px;"><b>DAY TOTAL</b></td><td style="padding:7px 8px;"><b>${Math.round(day.kcal)} kcal</b></td><td style="padding:7px 8px;">${Math.round(day.p)}P</td><td style="padding:7px 8px;">${Math.round(day.c)}C</td><td style="padding:7px 8px;">${Math.round(day.f)}F</td></tr></table>`;
    if(calc) h += `<div class="p-rule">vs target: ${Math.round(day.kcal - calc.calories) >= 0 ? "+" : ""}${Math.round(day.kcal - calc.calories)} kcal \u00b7 ${Math.round(day.p - calc.protein) >= 0 ? "+" : ""}${Math.round(day.p - calc.protein)}P</div>`;
  } else {
    h += `<div class="p-rule" style="margin-top:10px;">Day plan pending \u2014 the targets above are the guardrails until the meal plan is built.</div>`;
  }

  const recs = lthRecommendations(c);
  h += `<div class="p-lth">LTH SUPPLEMENT PROTOCOL \u2014 BUILT FOR THIS CLIENT\u2019S GOALS</div>
    <table class="p-table"><tr><th style="text-align:left;">SUPPLEMENT</th><th style="text-align:left;">WHEN</th><th style="text-align:left;">WHY</th></tr>` +
    recs.map(r => `<tr><td style="text-align:left;"><b>${r.name}</b></td><td style="text-align:left;">${r.when}</td><td style="text-align:left;">${r.why}</td></tr>`).join("") +
    `</table>
    <div class="p-qr">
      <img src="${LTH_QR}" alt="LTH order QR">
      <div class="pq-line">SCAN TO ORDER \u00b7 AUTO-SHIP SAVES 10% ON EVERY ORDER</div>
      <div class="pq-sub">LTH Rewards: every 100 points = $1 off \u2014 points stack on every auto-ship delivery.</div>
    </div>`;

  if(c.nutrition.notes && c.nutrition.notes.trim()){
    h += `<div class="p-phase-head" style="margin-top:10px;">Coach Notes</div><div style="font-size:11px;line-height:1.5;">${esc(c.nutrition.notes)}</div>`;
  }
  h += `<div class="p-foot">#ERN_IT \u00b7 I build bodies. Not excuses.</div>`;
  return h;
}

/* ---- cross-device sync: pull + live listen (push already existed) ---- */
let hubSyncStarted = false;
function startHubSync(){
  if(!hubDb || hubSyncStarted) return;
  hubSyncStarted = true;
  let firstSnapshot = true;
  hubDb.ref("clients").on("value", snap => {
    const remote = snap.val() || {};
    if(firstSnapshot){
      /* push up anything this device has that the cloud doesn't */
      Object.keys(clients).forEach(id => { if(!remote[id]) pushClientToFirebase(id, clients[id]); });
      firstSnapshot = false;
    }
    Object.keys(remote).forEach(id => {
      if(id === activeClientId) return; /* don't stomp the client being edited */
      clients[id] = remote[id];
    });
    saveClients(clients);
    renderRoster();
  }, err => console.warn("hub sync read failed:", err.message));
}
startHubSync();

function solveDayPlan(c, calc, style){
  const tpl = DIET_TEMPLATES[style] || DIET_TEMPLATES.normal;
  const db = Object.assign({}, FOOD_DB, c.nutrition.customFoods || {});
  let rem = {p: calc.protein, c: calc.carbs, f: calc.fat};
  const meals = [];
  tpl.forEach((slot, si) => {
    const last = si === tpl.length - 1;
    const tgt = last
      ? {p: Math.max(rem.p, 0), c: Math.max(rem.c, 0), f: Math.max(rem.f, 0)}
      : {p: Math.min(calc.protein * slot.pct, Math.max(rem.p, 0)),
         c: Math.min(calc.carbs * slot.pct, Math.max(rem.c, 0)),
         f: Math.min(calc.fat * slot.pct, Math.max(rem.f, 0))};
    const acc = {p:0, c:0, f:0};
    const items = [];
    const addItem = (key, q) => {
      const m = foodMacros(key, q, c);
      if(!m) return;
      acc.p += m.p; acc.c += m.c; acc.f += m.f;
      items.push({f:key, q:String(q)});
    };
    slot.items.filter(it => it.fixed).forEach(it => addItem(it.f, it.q));
    ["P","C","F"].forEach(role => {
      slot.items.filter(it => it.role === role).forEach(it => {
        const food = db[it.f];
        if(!food) return;
        let q;
        if(food.per === "srv"){
          q = 1; /* one scoop — the remaining-budget solver absorbs the extra protein downstream */
        } else {
          const perg = {P: food.p/100, C: food.c/100, F: food.f/100}[role];
          if(!perg || perg <= 0) return;
          const need = {P: tgt.p - acc.p, C: tgt.c - acc.c, F: tgt.f - acc.f}[role];
          q = Math.round(Math.max(need, 0) / perg / 5) * 5;
          const cap = role === "P" ? 300 : role === "C" ? 350 : ((it.f === "olive_oil" || it.f === "tahini") ? 20 : 60);
          q = Math.min(q, cap);
        }
        if(food.per === "srv" ? q >= 1 : q >= 10) addItem(it.f, q);
      });
    });
    rem.p -= acc.p; rem.c -= acc.c; rem.f -= acc.f;
    meals.push({name: slot.label, items});
  });
  return meals;
}

/* plant-based swap in the LTH protocol */
function lthRecommendations(c){
  const goals = c.intake.goals || [];
  const calc = computeNutrition(c);
  const mode = calc ? calc.mode : null;
  const sleep = parseFloat(c.intake.sleepHours);
  const stress = parseInt(c.intake.stressLevel);
  const plant = (c.nutrition.dietStyle === "vegan" || c.nutrition.dietStyle === "vegetarian");
  const proteinName = plant ? "LTH Fuel Vegan+ All-In-One" : "LTH Build Whey+";
  const has = (re) => goals.some(g => re.test(g));
  const recs = [];
  const add = (name, when, why) => { if(!recs.find(r => r.name === name)) recs.push({name, when, why}); };

  add("LTH Armor D3+K2", "Breakfast", "Daily foundation \u2014 immune, bone & hormone support.");
  if(has(/Lose Weight/i) || mode === "cut"){
    add(proteinName, "Post-workout / protein-short meals", "Protects lean mass in a deficit \u2014 hitting the protein number is the whole game.");
    add("LTH Hydrate", "Cardio days", "Electrolytes for Zone 2 sessions without the sugar.");
  }
  if(has(/Muscle|Strength/i) || mode === "bulk"){
    add(proteinName, "Post-workout", "Muscle is built in recovery \u2014 this closes the protein gap on training days.");
    add("LTH Power Creatine", "Any meal, every day", "The most-proven supplement in existence for strength & lean mass.");
  }
  if(has(/Energy|Endurance/i)){
    add("LTH Hydrate", "Cardio days", "Electrolytes for Zone 2 sessions without the sugar.");
    add("LTH Power Creatine", "Any meal, every day", "Supports repeat high-effort output \u2014 not just a muscle supplement.");
  }
  if(has(/Anxiety|Stress/i) || (!isNaN(sleep) && sleep < 7) || (!isNaN(stress) && stress >= 4)){
    add("LTH Dream Multi-Mag", "Before bed", "Magnesium for sleep quality & stress \u2014 results are built overnight.");
  }
  add("LTH Glow Omega-3", "Dinner", "Joint, heart & recovery support.");
  return recs;
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>ERN IT | High Performance Log</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0a0a0a;--red:#CC0000;--red-dark:#9a0000;
  --w:#fff;--g1:#181818;--g2:#222;--g3:#2c2c2c;--g4:#3a3a3a;
  --g5:#636363;--g6:#929292;--gl:#38a84e;--green:#236b32;
  --amber:#f5a623;--blue:#4aa3ff;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}
html{height:100%;-webkit-text-size-adjust:100%}
body{background:var(--black);color:var(--w);font-family:'Barlow',sans-serif;height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent}
.shell{display:flex;flex-direction:column;height:100dvh;height:100vh}

/* ── TOP BAR ── */
.topbar{background:var(--black);border-bottom:3px solid var(--red);padding:calc(var(--safe-top) + 10px) 16px 10px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:baseline;gap:6px}
.brand-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;letter-spacing:3px;text-transform:uppercase}
.brand-name span{color:var(--red)}
.brand-sub{font-size:9px;font-weight:700;color:var(--g5);letter-spacing:2px;text-transform:uppercase}
.app-title{font-size:10px;font-weight:700;color:var(--g6);letter-spacing:1.5px;text-transform:uppercase;text-align:right}

/* ── SYNC ROW ── */
.sync-row{background:var(--g1);border-bottom:1px solid var(--g3);padding:7px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--g4);flex-shrink:0;transition:background .3s}
.sync-dot.live{background:var(--gl)}
.sync-dot.pending{background:var(--amber);animation:pulse .8s infinite}
.sync-dot.off{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#syncText{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--g6);line-height:1.3}

/* ── TAB ROWS ── */
.tabs-wrap{background:var(--g1);border-bottom:1px solid var(--g3);flex-shrink:0;padding:10px 12px 12px;display:flex;flex-direction:column;gap:9px}
.tab-row{display:flex;gap:6px;align-items:center}
.tab-row-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--g5);width:46px;flex-shrink:0}
#clientTabs,#dayTabs,#viewToggle{display:flex;gap:6px;flex:1}
.client-tab{flex:1;text-align:center;background:var(--g2);border:1px solid var(--g4);border-radius:2px;padding:9px 4px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;letter-spacing:1.5px;text-transform:uppercase;color:var(--g5);cursor:pointer;transition:all .15s}
.client-tab.active{background:var(--red);border-color:var(--red);color:var(--w)}
.day-tab{flex:1;background:var(--g2);border:1px solid var(--g4);border-radius:2px;padding:6px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;transition:all .15s}
.day-tab.active{background:var(--g3);border-color:var(--red)}
.day-tab .dlbl{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--g5)}
.day-tab.active .dlbl{color:var(--w)}
.day-tab .ddate{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--g5)}
.day-tab.active .ddate{color:var(--red)}
.view-btn{flex:1;text-align:center;background:var(--g2);border:1px solid var(--g4);border-radius:2px;padding:7px 4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--g5);cursor:pointer;transition:all .15s}
.view-btn.active{background:var(--red);border-color:var(--red);color:var(--w)}
#weekPills{display:flex;gap:5px;flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch}
#weekPills::-webkit-scrollbar{display:none}
.week-pill{min-width:34px;text-align:center;background:var(--g2);border:1px solid var(--g4);border-radius:2px;padding:6px 0;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;color:var(--g5);cursor:pointer;transition:all .15s;flex-shrink:0}
.week-pill.active{background:var(--red);border-color:var(--red);color:var(--w)}

/* ── SCROLL ── */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:14px 14px calc(70px + var(--safe-bottom))}
.scroll::-webkit-scrollbar{display:none}

/* ── DAY HEAD ── */
.day-head{margin-bottom:12px}
.day-head h2{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:24px;letter-spacing:1px;text-transform:uppercase;line-height:1.1}
.day-head .sub{font-size:11px;color:var(--g6);margin-top:3px;line-height:1.4}

/* ── TRISETS ── */
.triset{background:var(--g1);border:1px solid var(--g3);border-radius:4px;margin-bottom:14px;overflow:hidden}
.triset-head{background:var(--black);border-bottom:2px solid var(--red);padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
.triset-badge{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;letter-spacing:2px;color:var(--red);text-transform:uppercase}
.triset-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--g5)}
.exercise{padding:12px;border-bottom:1px solid var(--g2)}
.exercise:last-child{border-bottom:none}
.ex-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:4px}
.ex-title-block{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.ex-name{font-weight:700;font-size:14px;line-height:1.25}
.ex-id{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;color:var(--red);margin-right:7px}
.ex-target{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;color:var(--w);white-space:nowrap}
.ex-note{font-size:10.5px;color:var(--g6);line-height:1.4;margin-bottom:7px}
.wicked-note{background:#120000;border-left:3px solid var(--red);border-radius:2px;padding:8px 10px;font-size:10.5px;color:#e07070;line-height:1.5;margin-top:9px}
.suggest{border-radius:2px;padding:7px 10px;font-size:10.5px;font-weight:600;line-height:1.45;margin-bottom:10px}
.suggest.none{background:var(--g2);color:var(--g6);border:1px solid var(--g3)}
.suggest.hold{background:rgba(184,120,0,.12);color:var(--amber);border:1px solid rgba(184,120,0,.4)}
.suggest.progress{background:rgba(35,107,50,.15);color:var(--gl);border:1px solid var(--green)}
.suggest.manual{background:rgba(74,163,255,.1);color:var(--blue);border:1px solid rgba(74,163,255,.35)}

/* ── VIDEO INTERFACE LINK ── */
.ex-video-link{display:inline-flex;align-items:center;background:var(--g3);color:var(--g6);border:1px solid var(--g4);border-radius:2px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;text-decoration:none;transition:all .15s}
.ex-video-link:active{background:var(--red);color:var(--w);border-color:var(--red)}

/* ── SET GRID ── */
.sets-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:600px){.sets-row{grid-template-columns:repeat(4,1fr)}}
.set-cell{background:var(--g2);border:1px solid var(--g3);border-radius:3px;padding:8px;display:flex;align-items:center;gap:8px}
.set-done{width:24px;height:24px;border:1px solid var(--g4);border-radius:2px;background:var(--g3);cursor:pointer;flex-shrink:0;position:relative;transition:all .15s}
.set-done.checked{background:var(--green);border-color:var(--green)}
.set-done.checked::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
.slbl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--g5);flex-shrink:0}
.mini-inputs{display:flex;gap:6px;flex:1;min-width:0}
.mini-col{flex:1;min-width:0}
.mini-col input{background:var(--g3);border:1px solid var(--g4);border-radius:2px;color:var(--w);font-family:'Barlow',sans-serif;font-size:16px;font-weight:600;padding:7px 4px;width:100%;text-align:center;outline:none;-webkit-appearance:none;transition:border-color .15s}
.mini-col input:focus{border-color:var(--red)}
.mini-lbl{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--g5);text-align:center;margin-top:3px}

/* ── CARDIO ── */
.cardio-block{background:var(--g1);border:1px solid var(--g3);border-left:3px solid var(--red);border-radius:4px;padding:12px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.clbl{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:4px}
.ctxt{font-size:11px;color:var(--g6);line-height:1.5}
.cardio-toggle{width:52px;height:28px;background:var(--g3);border:1px solid var(--g4);border-radius:14px;cursor:pointer;position:relative;transition:all .2s;margin:0 auto}
.cardio-toggle .knob{width:22px;height:22px;background:var(--g5);border-radius:50%;position:absolute;top:2px;left:2px;transition:all .2s;pointer-events:none}
.cardio-toggle.on{background:var(--green);border-color:var(--green)}
.cardio-toggle.on .knob{left:26px;background:#fff}
.cardio-toggle-lbl{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--g5);text-align:center;margin-top:4px}

/* ── NOTES ── */
.notes-block{background:var(--g1);border:1px solid var(--g3);border-radius:4px;padding:12px;margin-bottom:14px}
.notes-block label{display:block;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--g5);margin-bottom:7px}
.notes-block textarea{background:var(--g2);border:1px solid var(--g4);border-radius:2px;color:var(--w);font-family:'Barlow',sans-serif;font-size:16px;padding:9px 10px;width:100%;outline:none;resize:none;height:84px;line-height:1.45;-webkit-appearance:none;transition:border-color .15s}
.notes-block textarea:focus{border-color:var(--red)}

/* ── SCHEDULE ── */
.schedule-block{background:var(--g1);border:1px solid var(--g3);border-radius:4px;overflow:hidden;margin-bottom:14px}
.sblbl{background:var(--black);border-bottom:2px solid var(--red);padding:8px 12px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:2px;text-transform:uppercase}
.sched-row{display:grid;grid-template-columns:44px 1fr 1.4fr;gap:8px;padding:7px 12px;border-bottom:1px solid var(--g2);align-items:center}
.sched-row:last-child{border-bottom:none}
.sched-row.today{background:rgba(204,0,0,.08);border-left:3px solid var(--red)}
.sched-day{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:1px;color:var(--g5)}
.sched-row.today .sched-day{color:var(--red)}
.sched-focus{font-size:11px;font-weight:700;color:var(--w)}
.sched-cardio{font-size:10px;color:var(--g6);line-height:1.3}

/* ── SAVE BAR ── */
.savebar{position:fixed;bottom:0;left:0;right:0;background:var(--g1);border-top:1px solid var(--g3);padding:10px 14px calc(10px + var(--safe-bottom));display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:50}
.save-status{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--g5)}
.save-status.ok{color:var(--gl)}
.save-actions{display:flex;gap:7px;flex-shrink:0}
.btn{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:9px 18px;border-radius:2px;cursor:pointer;transition:all .15s;-webkit-appearance:none}
.btn-clear{background:none;border:1px solid var(--g4);color:var(--g5)}
.btn-clear:active{border-color:var(--red);color:var(--red)}
.btn-save{background:var(--red);border:none;color:var(--w)}
.btn-save:active{background:var(--red-dark)}
</style>
</head>
<body>

<div class="shell">
  <div class="topbar">
    <div class="brand">
      <div class="brand-name"><span>ERN</span> IT</div>
      <div class="brand-sub">Coaching</div>
    </div>
    <div class="app-title">High Performance Log · 8-Week</div>
  </div>

  <div class="sync-row">
    <div class="sync-dot" id="syncDot"></div>
    <div id="syncText">Connecting...</div>
  </div>

  <div class="tabs-wrap">
    <div class="tab-row"><div class="tab-row-lbl">Client</div><div id="clientTabs"></div></div>
    <div class="tab-row"><div class="tab-row-lbl">Week</div><div id="weekPills"></div></div>
    <div class="tab-row"><div class="tab-row-lbl">Day</div><div id="dayTabs"></div></div>
    <div class="tab-row"><div class="tab-row-lbl">View</div><div id="viewToggle"></div></div>
  </div>

  <div class="scroll" id="scroll"></div>
</div>

<div class="savebar">
  <div class="save-status" id="saveStatus">Loading...</div>
  <div class="save-actions">
    <button class="btn btn-clear" id="clearBtn" onclick="clearWeek()">Clear</button>
    <button class="btn btn-save" onclick="saveNow()">Save</button>
  </div>
</div>

function isSynced(client){ return !!firebaseDbs[client]; }

/* ============ ENGINE STATE ============ */
let state = { client: CLIENTS[0], day: DAYS[0].id, week: 1, view: "coach" };
const STORE_KEY = "ernit_group_log_8wk_v1";

function loadStore(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }catch(e){ return {}; } }
function saveStore(store){ localStorage.setItem(STORE_KEY, JSON.stringify(store)); }
function entryKey(client, day, week){ return client + "::" + day + "::w" + week; }

/* ============ SUGGESTION MATH ============ */
function getWeekEntry(client, day, week){
  const store = loadStore();
  return store[entryKey(client, day, week)] || null;
}

function getLoggedSets(entry, exId, exSets){
  if(!entry || !entry[exId]) return [];
  const out = [];
  for(let s=1; s<=exSets; s++){
    const cell = entry[exId]["s"+s];
    if(cell && cell.w !== "" && cell.r !== "" && cell.w != null && cell.r != null){
      out.push({w:parseFloat(cell.w), r:parseFloat(cell.r)});
    }
  }
  return out;
}

function computeSuggestion(ex){
  if(state.week === 1){
    return {status:"none", text:"Week 1 — log baseline weight and reps for every set."};
  }
  const prevEntry = getWeekEntry(state.client, state.day, state.week - 1);
  const prevSets = getLoggedSets(prevEntry, ex.id, ex.sets);

  if(prevSets.length < ex.sets){
    return {status:"none", text:`Week ${state.week-1} not fully logged — log this week fresh, no auto-suggestion yet.`};
  }

  if(ex.category === "wicked"){
    return {status:"manual", text:"Coach call — raise weight when Around-the-Worlds stop being the limiter. Drop if form breaks."};
  }

  const allHit = prevSets.every(s => s.r >= ex.repTarget);
  const maxW = Math.max(...prevSets.map(s=>s.w));

  if(ex.category === "bodyweight"){
    return allHit
      ? {status:"progress", text:`Week ${state.week-1}: all sets hit ${ex.repTarget}+ reps — add 2 reps per set or progress to a weighted/harder variation.`}
      : {status:"hold", text:`Week ${state.week-1}: not all sets hit target — hold volume, push for ${ex.repTarget} clean reps across all sets.`};
  }

  if(allHit){
    const inc = ex.category === "lower" ? 5 : 2.5;
    const newW = Math.round((maxW + inc) * 2) / 2;
    return {status:"progress", text:`Week ${state.week-1}: all sets hit ${ex.repTarget}+ reps at ${maxW} lbs — progress to ${newW} lbs (+${inc}).`, suggestedWeight:newW};
  } else {
    return {status:"hold", text:`Week ${state.week-1}: hold at ${maxW} lbs — push for ${ex.repTarget} reps across all sets before progressing.`, suggestedWeight:maxW};
  }
}

/* ============ NETWORKS AND SYNC ============ */
function setSyncStatus(mode, detail){
  const dot = document.getElementById("syncDot");
  const txt = document.getElementById("syncText");
  if(!dot || !txt) return;
  // "blocked" reuses the off/error dot styling if no dedicated class exists
  dot.className = "sync-dot " + (mode === "blocked" ? "off" : mode);
  if(mode === "live") txt.textContent = "Live sync — " + state.client;
  else if(mode === "pending") txt.textContent = "Syncing...";
  else if(mode === "blocked") txt.textContent = "SYNC BLOCKED — " + state.client + (detail ? " (" + detail + ")" : "") + " — check Firebase rules";
  else if(!firebaseSdkAvailable) txt.textContent = "Offline preview — Firebase SDK couldn't load (no network here)";
  else if(firebaseInitErrors[state.client]) txt.textContent = "Init failed — " + state.client + " (" + firebaseInitErrors[state.client] + ")";
  else txt.textContent = "Local only — " + state.client + " (no Firebase project set up yet)";
}

function attachRemoteListener(){
  if(activeListener){
    activeListener.ref.off("value", activeListener.callback);
    activeListener = null;
  }
  if(!isSynced(state.client)) { setSyncStatus("off"); return; }

  const path = dbPathFor(state.client, state.day, state.week);
  const ref = firebaseDbs[state.client].ref(path);
  // Don't claim "live" until the first snapshot actually arrives
  setSyncStatus("pending");
  const callback = ref.on("value", (snap)=>{
    if(suppressNextRemote){ suppressNextRemote = false; setSyncStatus("live"); return; }
    const remoteEntry = snap.val();
    if(remoteEntry){
      const store = loadStore();
      store[entryKey(state.client, state.day, state.week)] = remoteEntry;
      saveStore(store);
    }
    setSyncStatus("live");
    if(!isUserTyping) { renderDay(); }
  }, (err)=>{
    // FIX: this cancel callback was missing. Permission-denied and other
    // listener failures were silently swallowed while the pill said "Live".
    console.error("Listener cancelled for", state.client, err);
    setSyncStatus("blocked", err && err.code ? err.code : "listener cancelled");
  });
  activeListener = { ref, callback };
}

/* ============ DISPLAY MATRIX RENDERER ============ */
function refresh(){ renderTabs(); renderDay(); attachRemoteListener(); }

function renderDay(){
  const day = DAYS.find(d=>d.id===state.day);
  const entry = getWeekEntry(state.client, state.day, state.week) || {};

  const scroll = document.getElementById("scroll");
  scroll.innerHTML = "";

  head.className = "day-head";

    triset.exs.forEach(ex=>{

      let rowsHtml = "";

        const isChecked = !!savedCell.c;
        rowsHtml += `
          <div class="set-cell">
            <div class="set-done ${isChecked ? "checked" : ""}" data-ex="${ex.id}" data-set="${s}" onclick="toggleSetDone(this)"></div>
            <span class="slbl">Set ${s}</span>
            <div class="mini-inputs">
              <div class="mini-col">
                <input type="text" inputmode="decimal" placeholder="${wPlaceholder}"
                  data-ex="${ex.id}" data-set="${s}" data-field="w" value="${savedCell.w || ""}">
                <div class="mini-lbl">wt</div>
              </div>
              <div class="mini-col">
                <input type="text" inputmode="numeric" placeholder="reps"
                  data-ex="${ex.id}" data-set="${s}" data-field="r" value="${savedCell.r || ""}">
                <div class="mini-lbl">reps</div>
              </div>
            </div>
          </div>`;
      }

      const noteHtml = `<div class="ex-note">${ex.note}</div>`;
      const wickedHtml = ex.wicked ? `<div class="wicked-note"><b>WICKED —</b> ${ex.note}</div>` : "";
      const videoHtml = ex.video ? `<a href="${ex.video}" target="_blank" class="ex-video-link">📺 Video Demo</a>` : "";

      card.innerHTML = `
        <div class="ex-top">
          <div class="ex-title-block">
            <div class="ex-name"><span class="ex-id">${ex.id}</span>${ex.name}</div>
            ${videoHtml}
          </div>
          <div class="ex-target">${ex.target}</div>
        </div>
        ${ex.wicked ? "" : noteHtml}
        <div class="suggest ${sugg.status}">${sugg.text}</div>
        <div class="sets-row">${rowsHtml}</div>
        ${wickedHtml}
      `;
      tWrap.appendChild(card);
    });

    scroll.appendChild(tWrap);
  });

  const cardio = document.createElement("div");
  cardio.className = "cardio-block";
  const cardioDone = !!entry.__cardioDone;
  cardio.innerHTML = `
    <div class="cardio-text">
      <div class="clbl">${state.day==="total" ? "Finisher" : "Post-Session Cardio"}</div>
      <div class="ctxt">${day.cardio}</div>
    </div>
    <div>
      <div class="cardio-toggle ${cardioDone ? "on" : ""}" id="cardioToggle" onclick="toggleCardioDone(this)"><div class="knob"></div></div>
      <div class="cardio-toggle-lbl">Completed</div>
    </div>
  `;
  scroll.appendChild(cardio);

  const notesWrap = document.createElement("div");
  notesWrap.className = "notes-block";
  const notesReadonly = state.view === "client" ? "readonly" : "";
  notesWrap.innerHTML = `<label>Coach Notes — Week ${state.week}</label><textarea id="dayNotes" ${notesReadonly} placeholder="Form cues, weight adjustments, next session focus...">${entry.__notes || ""}</textarea>`;
  scroll.appendChild(notesWrap);

  const schedWrap = document.createElement("div");
  schedWrap.className = "schedule-block";
  let schedRows = "";
  WEEKLY_SCHEDULE.forEach(d=>{
    const isToday = d.dayId === state.day;
    schedRows += `
      <div class="sched-row ${isToday ? "today" : ""}">
        <div class="sched-day">${d.short}</div>
        <div class="sched-focus">${d.focus}</div>
        <div class="sched-cardio">${d.cardio}</div>
      </div>`;
  });
  schedWrap.innerHTML = `<div class="sblbl">Weekly Schedule</div>${schedRows}`;
  scroll.appendChild(schedWrap);

  const status = document.getElementById("saveStatus");
  status.textContent = entry.__savedAt ? "Last saved " + entry.__savedAt : "No log yet for this week";
  status.className = "save-status";

  const clearBtn = document.getElementById("clearBtn");
  clearBtn.style.display = state.view === "client" ? "none" : "";
}

/* ============ SWITCH INTERACTION ACTIONS ============ */
function toggleSetDone(el){ el.classList.toggle("checked"); }
function toggleCardioDone(el){ el.classList.toggle("on"); }

/* ============ PERSISTENCE DRIVE ============ */
function collectEntryFromDOM(){
  const entry = {};
  document.querySelectorAll('.scroll input[data-ex]').forEach(inp=>{
    const exId = inp.getAttribute('data-ex');
    const setN = inp.getAttribute('data-set');
    const field = inp.getAttribute('data-field');
    if(!entry[exId]) entry[exId] = {};
    if(!entry[exId]["s"+setN]) entry[exId]["s"+setN] = {w:"",r:"",c:false};
    entry[exId]["s"+setN][field] = inp.value;
  });
  document.querySelectorAll('.scroll .set-done').forEach(box=>{
    const exId = box.getAttribute('data-ex');
    const setN = box.getAttribute('data-set');
    if(!entry[exId]) entry[exId] = {};
    if(!entry[exId]["s"+setN]) entry[exId]["s"+setN] = {w:"",r:"",c:false};
    entry[exId]["s"+setN].c = box.classList.contains("checked");
  });
  const cardioEl = document.getElementById("cardioToggle");
  entry.__cardioDone = cardioEl ? cardioEl.classList.contains("on") : false;
  const notesEl = document.getElementById('dayNotes');
  entry.__notes = notesEl ? notesEl.value : "";
  return entry;
}

function pushToFirebase(client, day, week, entry){
  if(!isSynced(client)) return;
  suppressNextRemote = true;
  firebaseDbs[client].ref(dbPathFor(client, day, week)).set(entry)
    .then(()=> setSyncStatus("live"))
    .catch(e=>{
      // FIX: surface WHY the write failed instead of a generic "off" state
      console.error("Firebase write failed for", client, e);
      suppressNextRemote = false;
      setSyncStatus("blocked", e && e.code ? e.code : "write failed");
    });
}

function saveNow(){
  isUserTyping = false;
  const store = loadStore();
  const key = entryKey(state.client, state.day, state.week);
  const entry = collectEntryFromDOM();
  const now = new Date();
  entry.__savedAt = now.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + " · " +
    now.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
  store[key] = entry;
  saveStore(store);
  pushToFirebase(state.client, state.day, state.week, entry);

  const status = document.getElementById("saveStatus");
  status.textContent = "Saved " + entry.__savedAt;
  status.className = "save-status ok";
  renderDay();
}

function scheduleAutoSync(){
  if(!isSynced(state.client)) return;
  setSyncStatus("pending");
  clearTimeout(writeTimer);
  writeTimer = setTimeout(()=>{
    const store = loadStore();
    const key = entryKey(state.client, state.day, state.week);
    const entry = collectEntryFromDOM();
    const prev = store[key] || {};
    entry.__savedAt = prev.__savedAt || null;
    entry.__notes = entry.__notes !== undefined ? entry.__notes : (prev.__notes || "");
    store[key] = Object.assign({}, prev, entry);
    saveStore(store);
    pushToFirebase(state.client, state.day, state.week, store[key]);
    isUserTyping = false;
  }, 1200);
}

function clearWeek(){
  if(!confirm(`Clear ${state.client}'s Week ${state.week} log for ${DAYS.find(d=>d.id===state.day).full}?`)) return;
  const store = loadStore();
  delete store[entryKey(state.client, state.day, state.week)];
  saveStore(store);
  if(isSynced(state.client)){
    suppressNextRemote = true;
    // FIX: was `dbPathFor(state.client, day, week)` — `day` and `week` don't
    // exist in this scope, so Clear crashed with a ReferenceError and never
    // deleted anything from Firebase.
    firebaseDbs[state.client].ref(dbPathFor(state.client, state.day, state.week)).remove()
      .catch(e=>{
        console.error("Firebase clear failed for", state.client, e);
        setSyncStatus("blocked", e && e.code ? e.code : "clear failed");
      });
  }
  renderDay();
}

/* UI EVENT DELEGATION BINDINGS */
document.getElementById("scroll").addEventListener("input", (e)=>{
  if(e.target.matches('input[data-ex]') || e.target.id === "dayNotes"){
    isUserTyping = true;
    scheduleAutoSync();
  }
});

document.getElementById("scroll").addEventListener("click", (e)=>{
  if(e.target.classList.contains("set-done") || e.target.id === "cardioToggle" || e.target.closest("#cardioToggle")){
    scheduleAutoSync();
  }
});

/* ============ RUN ENGINE INITIALIZATION ============ */
refresh();

async function importFile(kind){
  const inp = document.getElementById("imp_" + kind + "_file");
  const st = document.getElementById("imp_" + kind + "_status");
  const btn = document.getElementById("imp_" + kind + "_btn");
  const file = inp.files && inp.files[0];
  if(!file) return;
  if(file.size > 4.2 * 1024 * 1024){
    st.textContent = "File over 4MB \u2014 export a lighter PDF or photograph the key pages.";
    inp.value = ""; return;
  }
  collectFormIntoClient();
  btn.disabled = true;
  st.textContent = "Reading " + file.name + "...";
  let b64;
  try{
    b64 = await new Promise((res, rej)=>{
      const r = new FileReader();
      r.onload = ()=>res(String(r.result).split(",")[1]);
      r.onerror = ()=>rej(new Error("could not read file"));
      r.readAsDataURL(file);
    });
  }catch(e){ st.textContent = e.message; btn.disabled = false; inp.value = ""; return; }

  let doneMsg = "";
  try{
    const res = await fetch("/.netlify/functions/read-form", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        formType: kind === "program" ? "importProgram" : "importNutrition",
        image: b64,
        mediaType: file.type || "application/pdf"
      })
    });
    let data;
    try{ data = await res.json(); }
    catch(e){ st.textContent = "Server error (HTTP " + res.status + ") \u2014 large files can hit the 10s limit. Photograph the key pages instead."; btn.disabled = false; inp.value = ""; return; }
    if(!res.ok || data.error){ st.textContent = (data.error || "Import failed") + " (HTTP " + res.status + ")"; btn.disabled = false; inp.value = ""; return; }
    const ex = data.extracted;
    const c = clients[activeClientId];

    if(kind === "program"){
      const ph = c.program.phases[progPhase];
      (ex.days || []).forEach(d=>{
        upsertDay(ph, String(d.name || "Imported Day"), (d.exercises || []).map(e=>({
          name:String(e.name||""), sets:String(e.sets||""), reps:String(e.reps||""),
          tempo:String(e.tempo||""), rest:String(e.rest||""), load:String(e.load||""),
          note:String(e.note||""), videoUrl:""
        })));
      });
      (ex.cardio || []).forEach(cd=>{
        c.program.cardio.push({
          modality: CARDIO_MODES.includes(cd.modality) ? cd.modality : "Treadmill",
          days:String(cd.days||""), timeMin:String(cd.timeMin||""), speed:String(cd.speed||""),
          level:String(cd.level||""), distance:String(cd.distance||""),
          zone:String(cd.zone||"2"), notes:String(cd.notes||"")
        });
      });
      doneMsg = "Imported " + (ex.days||[]).length + " day(s) + " + (ex.cardio||[]).length + " cardio Rx into Week " + (progWeek + 1) + " \u2014 review before saving.";
    } else {
      if((c.nutrition.meals || []).length && !confirm("Replace the current meals with the imported plan?")){
        btn.disabled = false; inp.value = ""; st.textContent = ""; return;
      }
      const meals = [];
      (ex.meals || []).forEach((m, mi)=>{
        const items = [];
        (m.items || []).forEach((it, ii)=>{
          const key = "imp_" + String(it.name || "item").toLowerCase().replace(/[^a-z0-9]+/g, "_").slice(0, 28) + "_" + mi + ii;
          c.nutrition.customFoods[key] = {
            n: String(it.name || "Imported item") + (it.portion ? " \u00b7 " + String(it.portion) : ""),
            g: "Custom", kcal: 0,
            p: parseFloat(it.p) || 0, f: parseFloat(it.f) || 0, c: parseFloat(it.c) || 0,
            per: "srv"
          };
          items.push({f: key, q: "1"});
        });
        meals.push({name: String(m.name || ("Meal " + (mi + 1))), items});
      });
      c.nutrition.meals = meals;
      if(ex.notes) c.nutrition.notes = ((c.nutrition.notes || "") + "\n" + String(ex.notes)).trim();
      doneMsg = "Imported " + meals.length + " meal(s) \u2014 macros exactly as printed in the file.";
    }
    saveClients(clients);
    pushClientToFirebase(c.id, c);
    renderModal();
    setTimeout(()=>{
      const s2 = document.getElementById("imp_" + kind + "_status");
      if(s2) s2.textContent = doneMsg;
    }, 60);
  }catch(e){
    st.textContent = "Network error: " + e.message;
    btn.disabled = false; inp.value = "";
  }
}

/* ================================================================
   ERN IT COACH HUB v14 — coach sign-in (Firebase Auth) protecting client data
   ================================================================ */

let hubAuthed = false;
let hubOfflineMode = false;

function showLoginWall(v){
  const w = document.getElementById("loginWall");
  if(w) w.style.display = v ? "flex" : "none";
}

async function hubSignIn(){
  const email = (document.getElementById("loginEmail").value || "").trim();
  const pass = document.getElementById("loginPass").value || "";
  const err = document.getElementById("loginErr");
  const btn = document.getElementById("loginBtn");
  if(!email || !pass){ err.textContent = "Email and password."; return; }
  btn.disabled = true; err.textContent = "Signing in...";
  try{
    await firebase.auth().signInWithEmailAndPassword(email, pass);
    err.textContent = "";
  }catch(e){
    const map = {
      "auth/invalid-credential": "Wrong email or password.",
      "auth/user-not-found": "Wrong email or password.",
      "auth/wrong-password": "Wrong email or password.",
      "auth/invalid-email": "That email is not valid.",
      "auth/too-many-requests": "Too many tries — wait a minute and retry.",
      "auth/network-request-failed": "No connection — check wifi or continue offline."
    };
    err.textContent = map[e.code] || e.message;
  }
  btn.disabled = false;
}

function hubOffline(){
  hubOfflineMode = true;
  showLoginWall(false);
  setSyncStatus();
}

function hubSignOut(){
  if(typeof firebase !== "undefined" && firebase.auth) firebase.auth().signOut();
}

function setSyncStatus(){
  const dot = document.getElementById("syncDot");
  const txt = document.getElementById("syncText");
  if(!dot || !txt) return;
  if(hubDb && hubAuthed){
    dot.className = "sync-dot live";
    txt.innerHTML = 'Live sync — signed in · <span style="text-decoration:underline;cursor:pointer;" onclick="hubSignOut()">sign out</span>';
  } else if(hubDb && hubOfflineMode){
    dot.className = "sync-dot off";
    txt.innerHTML = 'Offline — this device only · <span style="text-decoration:underline;cursor:pointer;" onclick="hubOfflineMode=false;showLoginWall(true);">sign in</span>';
  } else if(hubDb){
    dot.className = "sync-dot off";
    txt.textContent = "Waiting for sign-in...";
  } else {
    dot.className = "sync-dot off";
    txt.textContent = "Local only";
  }
}

if(hubDb && typeof firebase !== "undefined" && firebase.auth){
  firebase.auth().onAuthStateChanged(user=>{
    hubAuthed = !!user;
    if(user){
      showLoginWall(false);
      startHubSync();
    } else if(!hubOfflineMode){
      showLoginWall(true);
    }
    setSyncStatus();
  });
}

function todayISO(){ const d = new Date(); return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); }

function fuDiffDays(c){
  if(!c.followupDate) return null;
  const t = new Date(); t.setHours(0,0,0,0);
  const d = new Date(c.followupDate + "T00:00:00");
  return Math.round((d - t) / 86400000);
}

function fuBadge(c){
  const diff = fuDiffDays(c);
  if(diff === null) return "";
  if(diff < 0) return `<span style="background:#CC0000;color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;letter-spacing:.4px;">FOLLOW UP \u00b7 ${-diff}d LATE</span>`;
  if(diff === 0) return `<span style="background:#b8700f;color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;letter-spacing:.4px;">DUE TODAY</span>`;
  if(diff <= 3) return `<span style="border:1px solid var(--line);color:var(--grey);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;">Due in ${diff}d</span>`;
  return "";
}

function setDecision(v){
  collectFormIntoClient();
  const c = clients[activeClientId];
  c.recommend.decision = v;
  if(v === "signed"){ c.status = "active"; c.followupDate = ""; }
  if(v === "thinking" && !c.followupDate){ const d = new Date(); d.setDate(d.getDate()+2); c.followupDate = d.toISOString().slice(0,10); }
  if(v === "declined" && !c.followupDate){ const d = new Date(); d.setDate(d.getDate()+7); c.followupDate = d.toISOString().slice(0,10); }
  saveClients(clients); pushClientToFirebase(c.id, c); renderModal();
}

function setFollowupField(k, v){
  collectFormIntoClient();
  const c = clients[activeClientId];
  c[k] = v;
  saveClients(clients); pushClientToFirebase(c.id, c); renderModal();
}

function bumpFollowup(days){
  const d = new Date(); d.setDate(d.getDate() + days);
  setFollowupField("followupDate", d.toISOString().slice(0,10));
}

/* ---- roster with pipeline sort + badges + backup ---- */
function renderRoster(){
  const roster = document.getElementById("roster");
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  let list = Object.values(clients);
  if(activeFilter !== "all") list = list.filter(c=>c.status===activeFilter);
  if(q) list = list.filter(c=>(c.name||"").toLowerCase().includes(q));

  const rank = c => {
    const d = fuDiffDays(c);
    if(d === null) return [3, 0];
    if(d < 0) return [0, d];
    if(d === 0) return [1, 0];
    if(d <= 3) return [2, d];
    return [3, 0];
  };
  list.sort((a,b)=>{
    const ra = rank(a), rb = rank(b);
    if(ra[0] !== rb[0]) return ra[0] - rb[0];
    if(ra[1] !== rb[1]) return ra[1] - rb[1];
    return (a.name||"").localeCompare(b.name||"");
  });

  roster.innerHTML = "";
  if(list.length === 0){
    roster.innerHTML = `<div class="empty-state"><div class="big">No clients yet</div>Tap "+ New Client" to build your first intake &amp; program.<br><span style="color:#555;font-size:11px;font-weight:800;letter-spacing:.5px;">I BUILD BODIES. NOT EXCUSES.</span></div>`;
    return;
  }
  list.forEach(c=>{
    const initials = (c.name || "?").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase();
    const badge = fuBadge(c);
    const card = document.createElement("div");
    card.className = "client-card";
    card.onclick = ()=> openClient(c.id);
    card.innerHTML = `
      <div class="client-avatar">${initials || "?"}</div>
      <div class="client-info">
        <div class="client-name">${c.name || "Unnamed client"}${badge ? " " + badge : ""}</div>
        <div class="client-meta">
          <span class="status-badge ${c.status}">${c.status}</span>
          <span>${c.phone || c.email || "No contact info"}</span>
          ${c.followupNote && fuDiffDays(c) !== null && fuDiffDays(c) <= 0 ? `<span style="color:var(--grey-dim);">\u00b7 ${c.followupNote}</span>` : ""}
        </div>
      </div>
      <div class="client-chevron">\u203a</div>
    `;
    roster.appendChild(card);
  });

  const exp = document.createElement("div");
  exp.innerHTML = `<button onclick="exportBackup()" style="background:none;border:1px solid var(--line);border-radius:8px;color:var(--grey-dim);font-size:11px;font-weight:700;padding:8px 14px;margin:14px 0 30px;">\u2b07 Export backup (.json)</button>`;
  roster.appendChild(exp);
}

function exportBackup(){
  const blob = new Blob([JSON.stringify({exportedAt: new Date().toISOString(), clients, agreements}, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ernit-hub-backup-" + todayISO() + ".json";
  document.body.appendChild(a); a.click(); a.remove();
}

/* ---- InBody progress history ---- */
function inbodyHistoryHtml(c){
  const hist = c.inbodyHistory || [];
  let chart = "";
  if(hist.length >= 2){
    const W = 320, H = 110, P = 14;
    const ws = hist.map(h=>parseFloat(h.weightLbs)).filter(v=>!isNaN(v));
    const bs = hist.map(h=>parseFloat(h.bodyFatPct)).filter(v=>!isNaN(v));
    const line = (vals, color, dash) => {
      if(vals.length < 2) return "";
      const mn = Math.min(...vals), mx = Math.max(...vals), rg = (mx - mn) || 1;
      const pts = vals.map((v,i)=> (P + i*(W-2*P)/(vals.length-1)).toFixed(1) + "," + (H - P - (v - mn)/rg*(H-2*P)).toFixed(1)).join(" ");
      return `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5"${dash ? ' stroke-dasharray="5,4"' : ''}/>`;
    };
    chart = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:430px;background:var(--bg);border:1px solid var(--line);border-radius:9px;margin-top:10px;">
      ${line(ws, "#CC0000", false)}${line(bs, "#8a8a8a", true)}
    </svg>
    <div style="font-size:10.5px;color:var(--grey-dim);margin-top:4px;"><span style="color:#CC0000;font-weight:800;">\u2014 Weight</span> ${ws.length ? ws[0] + " \u2192 " + ws[ws.length-1] + " lbs" : ""} &nbsp;&nbsp; <span style="color:#8a8a8a;font-weight:800;">- - BF%</span> ${bs.length ? bs[0] + " \u2192 " + bs[bs.length-1] + "%" : ""}</div>`;
  }
  const rows = hist.map((h,i)=>`<div style="display:flex;gap:10px;align-items:center;font-size:12.5px;color:var(--white);padding:7px 0;border-bottom:1px solid var(--line);">
    <span style="width:86px;color:var(--grey);">${esc(h.date)}</span>
    <span style="flex:1;">${esc(h.weightLbs)||"—"} lbs \u00b7 ${esc(h.bodyFatPct)||"—"}% BF \u00b7 LBM ${esc(h.muscleMassLbs)||"—"}</span>
    <span onclick="delHistEntry(${i})" style="color:var(--grey-dim);cursor:pointer;padding:0 6px;">\u2715</span>
  </div>`).join("");
  return `
    <div class="section-head" style="margin-top:22px;">Progress History</div>
    <button class="scan-btn" style="width:100%;" onclick="logInbodyScan()">Log current scan to history (${todayISO()})</button>
    ${rows ? `<div style="margin-top:10px;">${rows}</div>` : `<div style="font-size:11.5px;color:var(--grey-dim);margin-top:8px;">No scans logged yet — log today's numbers, then every re-scan. The trend chart appears at two entries.</div>`}
    ${chart}
  `;
}

function logInbodyScan(){
  collectFormIntoClient();
  const c = clients[activeClientId];
  const entry = {
    date: todayISO(),
    weightLbs: c.inbody.weightLbs || "",
    bodyFatPct: c.inbody.bodyFatPct || "",
    muscleMassLbs: c.inbody.muscleMassLbs || "",

  const hist = c.inbodyHistory;

const WEEK_LABELS = ["Day 1 \u2014 Mon","Day 2 \u2014 Tue","Day 3 \u2014 Wed","Day 4 \u2014 Thu","Day 5 \u2014 Fri","Day 6 \u2014 Sat","Day 7 \u2014 Sun"];

const WEEK_SWAPS = {
  normal: [
    {},
    {chicken_breast_cooked:"ground_turkey_93", salmon_cooked:"shrimp_cooked", cottage_cheese_lowfat:"greek_yogurt_nonfat", white_rice_cooked:"quinoa_cooked", sweet_potato:"potato_baked", apple:"banana", broccoli:"green_beans", spinach:"asparagus"},
    {chicken_breast_cooked:"lean_beef_93", salmon_cooked:"tilapia_cooked", cottage_cheese_lowfat:"tuna_canned_water", white_rice_cooked:"brown_rice_cooked", apple:"mixed_berries", broccoli:"zucchini", spinach:"mixed_greens"}
  ],
  vegetarian: [
    {},
    {firm_tofu:"edamame", tempeh:"lentils_cooked", quinoa_cooked:"brown_rice_cooked", brown_rice_cooked:"sweet_potato", tahini:"almonds", zucchini:"broccoli", banana:"apple"},
    {firm_tofu:"cottage_cheese_lowfat", tempeh:"firm_tofu", quinoa_cooked:"potato_baked", brown_rice_cooked:"quinoa_cooked", tahini:"walnuts", zucchini:"green_beans"}
  ],
  vegan: [
    {},
    {tempeh:"lentils_cooked", firm_tofu:"tempeh", quinoa_cooked:"brown_rice_cooked", sweet_potato:"potato_baked", hummus:"tahini", edamame:"chickpeas_cooked", almonds:"walnuts"},
    {tempeh:"firm_tofu", quinoa_cooked:"white_rice_cooked", sweet_potato:"quinoa_cooked", kale:"spinach", banana:"mixed_berries"}
  ]
};

function applySwaps(tpl, map){
  return tpl.map(slot => ({
    label: slot.label, pct: slot.pct,
    items: slot.items.map(it => Object.assign({}, it, {f: map[it.f] || it.f}))
  }));
}

function solveDayPlanTpl(c, calc, tpl){
  const db = Object.assign({}, FOOD_DB, c.nutrition.customFoods || {});
  let rem = {p: calc.protein, c: calc.carbs, f: calc.fat};
  const meals = [];
  tpl.forEach((slot, si) => {
    const last = si === tpl.length - 1;
    const tgt = last
      ? {p: Math.max(rem.p, 0), c: Math.max(rem.c, 0), f: Math.max(rem.f, 0)}
      : {p: Math.min(calc.protein * slot.pct, Math.max(rem.p, 0)),
         c: Math.min(calc.carbs * slot.pct, Math.max(rem.c, 0)),
         f: Math.min(calc.fat * slot.pct, Math.max(rem.f, 0))};
    const acc = {p:0, c:0, f:0};
    const items = [];
    const addItem = (key, q) => {
      const m = foodMacros(key, q, c);
      if(!m) return;
      acc.p += m.p; acc.c += m.c; acc.f += m.f;
      items.push({f:key, q:String(q)});
    };
    slot.items.filter(it => it.fixed).forEach(it => addItem(it.f, it.q));
    ["P","C","F"].forEach(role => {
      slot.items.filter(it => it.role === role).forEach(it => {
        const food = db[it.f];
        if(!food) return;
        let q;
        if(food.per === "srv"){ q = 1; }
        else {
          const perg = {P: food.p/100, C: food.c/100, F: food.f/100}[role];
          if(!perg || perg <= 0) return;
          const need = {P: tgt.p - acc.p, C: tgt.c - acc.c, F: tgt.f - acc.f}[role];
          q = Math.round(Math.max(need, 0) / perg / 5) * 5;
          const cap = role === "P" ? 300 : role === "C" ? 350 : ((it.f === "olive_oil" || it.f === "tahini") ? 20 : 60);
          q = Math.min(q, cap);
        }
        if(food.per === "srv" ? q >= 1 : q >= 10) addItem(it.f, q);
      });
    });
    rem.p -= acc.p; rem.c -= acc.c; rem.f -= acc.f;
    meals.push({name: slot.label, items});
  });
  return meals;
}

function solveDayPlan(c, calc, style){
  return solveDayPlanTpl(c, calc, DIET_TEMPLATES[style] || DIET_TEMPLATES.normal);
}

function setPlanSpan(v){
  collectFormIntoClient();

function generateMealPlan(){
  collectFormIntoClient();
  const c = clients[activeClientId];
  const calc = computeNutrition(c);
  if(!calc){ alert("Targets first — need height, age, gender (Intake) + weight, BF% (InBody)."); return; }
  const style = c.nutrition.dietStyle || "normal";

  if(c.nutrition.planSpan === "7"){
    if((c.nutrition.weekPlan || []).length && !confirm("Replace the current 7-day plan?")) return;
    const rots = WEEK_SWAPS[style] || WEEK_SWAPS.normal;
    const base = DIET_TEMPLATES[style] || DIET_TEMPLATES.normal;
    c.nutrition.weekPlan = WEEK_LABELS.map((label, i) =>
      ({label, meals: solveDayPlanTpl(c, calc, applySwaps(base, rots[i % rots.length]))}));
    c.nutrition.weekDay = 0;
    c.nutrition.meals = JSON.parse(JSON.stringify(c.nutrition.weekPlan[0].meals));
  } else {
    if((c.nutrition.meals || []).length && !confirm("Replace the current meals with a generated 1-day plan?")) return;
    c.nutrition.weekPlan = [];
    c.nutrition.meals = solveDayPlan(c, calc, style);
  }
  saveClients(clients);
  pushClientToFirebase(c.id, c);
  renderModal();
}

  return `<div style="background:var(--card);border:1px solid var(--red);border-radius:11px;padding:13px;margin-bottom:14px;">
    <div style="font-size:12px;font-weight:800;color:var(--white);margin-bottom:8px;">Generate Plan \u2014 3 meals + 2 snacks, solved to the targets</div>
    <div class="rate-row" style="margin-bottom:8px;">
      <div class="rate-btn ${style==="normal"?"on":""}" onclick="setDietStyle('normal')" style="font-size:12px;">Normal</div>

      <div class="rate-btn ${style==="vegan"?"on":""}" onclick="setDietStyle('vegan')" style="font-size:12px;">Vegan</div>

    <div class="rate-row" style="margin-bottom:10px;">
      <div class="rate-btn ${span==="1"?"on":""}" onclick="setPlanSpan('1')" style="font-size:12px;">1 Day</div>

/* ---- grocery aggregation ---- */
function groceryData(c){
  const db = Object.assign({}, FOOD_DB, c.nutrition.customFoods || {});
  const wk = (c.nutrition.weekPlan || []).length ? c.nutrition.weekPlan : [{meals: c.nutrition.meals || []}];
  const agg = {};
  wk.forEach(d => (d.meals || []).forEach(m => (m.items || []).forEach(it => {
    if(!it.f || !db[it.f]) return;
    const q = parseFloat(it.q) || 0;
    if(!agg[it.f]) agg[it.f] = {srv: 0, g: 0};
    if(db[it.f].per === "srv") agg[it.f].srv += q; else agg[it.f].g += q;
  })));
  const groups = {};
  Object.keys(agg).forEach(k => {
    const grp = db[k].g || "Other";
    if(!groups[grp]) groups[grp] = [];
    const a = agg[k];
    const qty = a.srv ? (Math.round(a.srv * 10) / 10) + (a.srv === 1 ? " scoop" : " scoops") : Math.ceil(a.g / 10) * 10 + " g";
    groups[grp].push({name: (db[k].n || k).split(" (")[0], qty, key: k, grams: a.g, srv: a.srv});
  });
  return groups;
}

function sundayPrepLines(c, groups){
  const lines = [];
  const pick = (grp) => (groups[grp] || []);
  const fmt = (arr) => arr.map(x => x.name + " (" + x.qty + ")").join(", ");
  const proteins = pick("Protein").filter(x => x.grams > 0);
  const carbs = pick("Carb").filter(x => x.grams > 0);
  const veg = pick("Veg").filter(x => x.grams > 0);
  if(proteins.length) lines.push("<b>Proteins:</b> season + batch-cook " + fmt(proteins) + ". Split Mon\u2013Wed portions in the fridge, freeze the rest \u2014 second thaw Wednesday night.");
  if(carbs.length) lines.push("<b>Carbs:</b> cook " + fmt(carbs) + " in one session. Portion into containers by the gram amounts on each day\u2019s table.");
  if(veg.length) lines.push("<b>Vegetables:</b> wash + chop " + fmt(veg) + ". Roast half Sunday, keep half raw for the back of the week.");
  const lth = pick("LTH");
  if(lth.length) lines.push("<b>LTH:</b> " + lth.map(x => x.name + " \u2014 " + x.qty + " this week").join("; ") + ". Auto-ship covers it (10% off).");
  lines.push("<b>Rule:</b> gram-weigh cooked portions once on Sunday \u2014 zero decisions on weekdays. Decisions are where diets die.");
  return lines;
}

/* ================================================================
   ERN IT COACH HUB v23 — solver reconciliation, honest grocery units,
   real Sunday prep (cook vs portion)
   ================================================================ */

/* foods that never see heat */
const NO_COOK = new Set(["tuna_canned_water","greek_yogurt_nonfat","cottage_cheese_lowfat",
  "whole_wheat_bread","banana","mixed_berries","apple","rice_cake",
  "chickpeas_cooked","black_beans_cooked",
  "spinach","kale","mixed_greens","bell_pepper","cucumber","tomato"]);
/* cooked the morning of — never batch-cooked */
const COOK_FRESH = new Set(["egg_whole","egg_whites"]);

function prepClass(key, food){
  if(food.g === "LTH") return "lth";
  if(key === "oats_dry") return "dry";
  if(COOK_FRESH.has(key)) return "fresh";
  if(food.g === "Fat") return "portion";
  if(NO_COOK.has(key)) return "portion";
  return "cook";
}

/* "7 servings (14 scoops)" — kills the scoop/serving contradiction */
function srvQtyLabel(food, n){
  const rounded = Math.round(n * 10) / 10;
  const base = rounded + (rounded === 1 ? " serving" : " servings");
  const m = /(\d+)\s*(scoops?|softgels?|capsules?)/i.exec(food.n || "");
  if(!m) return base;
  const per = parseInt(m[1]), unit = m[2].toLowerCase().replace(/s$/, "");
  const total = Math.round(rounded * per);
  return base + " (" + total + " " + unit + (total === 1 ? "" : "s") + ")";
}

/* ---------- solver: reserve fixed servings, then reconcile to target ---------- */
function dayMacroTotals(meals, c){
  const t = {p:0, c:0, f:0, kcal:0};
  (meals || []).forEach(m => (m.items || []).forEach(it => {
    const x = foodMacros(it.f, it.q, c);
    if(x){ t.p += x.p; t.c += x.c; t.f += x.f; t.kcal += x.kcal; }
  }));
  return t;
}

function capFor(role, key){
  if(role === "P") return 300;
  if(role === "C") return 350;
  return (key === "olive_oil" || key === "tahini") ? 20 : 60;
}

function reconcileDay(meals, tpl, calc, c){
  const db = Object.assign({}, FOOD_DB, c.nutrition.customFoods || {});
  const lastMeal = meals[meals.length - 1];
  const lastSlot = tpl[tpl.length - 1];
  if(!lastMeal || !lastSlot) return;
  const roleFood = role => {
    const it = (lastSlot.items || []).find(x => x.role === role);
    return it ? it.f : null;
  };
  const plan = [["P","p"], ["C","c"], ["F","f"]];
  for(let pass = 0; pass < 5; pass++){
    plan.forEach(([role, m]) => {
      const key = roleFood(role);
      if(!key) return;
      const food = db[key];
      if(!food || food.per === "srv") return;
      const perg = food[m] / 100;
      if(!perg || perg <= 0) return;
      const target = m === "p" ? calc.protein : m === "c" ? calc.carbs : calc.fat;
      const delta = target - dayMacroTotals(meals, c)[m];
      if(Math.abs(delta) < 0.4) return;
      let item = lastMeal.items.find(x => x.f === key);
      if(!item){
        if(delta <= 0) return;
        item = {f: key, q: "0"};
        lastMeal.items.push(item);
      }
      let q = (parseFloat(item.q) || 0) + delta / perg;
      q = Math.min(Math.max(0, Math.round(q / 5) * 5), capFor(role, key));
      item.q = String(q);
    });
  }
  lastMeal.items = lastMeal.items.filter(x => (parseFloat(x.q) || 0) > 0);
}

function solveDayPlanTpl(c, calc, tpl){
  const db = Object.assign({}, FOOD_DB, c.nutrition.customFoods || {});

  /* fixed-serving items (shakes) are non-negotiable — reserve them off the budget first */
  const resBy = tpl.map(slot => {
    const r = {p:0, c:0, f:0};
    (slot.items || []).forEach(it => {
      const f = db[it.f];
      if(f && f.per === "srv"){ r.p += f.p; r.c += f.c; r.f += f.f; }
    });
    return r;
  });
  const res = resBy.reduce((a,b)=>({p:a.p+b.p, c:a.c+b.c, f:a.f+b.f}), {p:0,c:0,f:0});
  const budget = {
    p: Math.max(calc.protein - res.p, 0),
    c: Math.max(calc.carbs - res.c, 0),
    f: Math.max(calc.fat - res.f, 0)
  };

  let rem = {p: calc.protein, c: calc.carbs, f: calc.fat};
  const meals = [];
  tpl.forEach((slot, si) => {
    const last = si === tpl.length - 1;
    const r = resBy[si];
    const tgt = last
      ? {p: Math.max(rem.p, 0), c: Math.max(rem.c, 0), f: Math.max(rem.f, 0)}
      : {p: Math.min(budget.p * slot.pct + r.p, Math.max(rem.p, 0)),
         c: Math.min(budget.c * slot.pct + r.c, Math.max(rem.c, 0)),
         f: Math.min(budget.f * slot.pct + r.f, Math.max(rem.f, 0))};
    const acc = {p:0, c:0, f:0};
    const items = [];
    const addItem = (key, q) => {
      const m = foodMacros(key, q, c);
      if(!m) return;
      acc.p += m.p; acc.c += m.c; acc.f += m.f;
      items.push({f:key, q:String(q)});
    };
    slot.items.filter(it => it.fixed).forEach(it => addItem(it.f, it.q));
    ["P","C","F"].forEach(role => {
      slot.items.filter(it => it.role === role).forEach(it => {
        const food = db[it.f];
        if(!food) return;
        let q;
        if(food.per === "srv"){ q = 1; }
        else {
          const perg = {P: food.p/100, C: food.c/100, F: food.f/100}[role];
          if(!perg || perg <= 0) return;
          const need = {P: tgt.p - acc.p, C: tgt.c - acc.c, F: tgt.f - acc.f}[role];
          q = Math.round(Math.max(need, 0) / perg / 5) * 5;
          q = Math.min(q, capFor(role, it.f));
        }
        if(food.per === "srv" ? q >= 1 : q >= 10) addItem(it.f, q);
      });
    });
    rem.p -= acc.p; rem.c -= acc.c; rem.f -= acc.f;
    meals.push({name: slot.label, items});
  });

  reconcileDay(meals, tpl, calc, c);
  return meals;
}

/* ---------- grocery: exact grams, servings not scoops ---------- */
function groceryData(c){
  const db = Object.assign({}, FOOD_DB, c.nutrition.customFoods || {});
  const wk = (c.nutrition.weekPlan || []).length ? c.nutrition.weekPlan : [{meals: c.nutrition.meals || []}];
  const agg = {};
  wk.forEach(d => (d.meals || []).forEach(m => (m.items || []).forEach(it => {
    if(!it.f || !db[it.f]) return;
    const q = parseFloat(it.q) || 0;
    if(!agg[it.f]) agg[it.f] = {srv:0, g:0};
    if(db[it.f].per === "srv") agg[it.f].srv += q; else agg[it.f].g += q;
  })));
  const groups = {};
  Object.keys(agg).forEach(k => {
    const food = db[k];
    const grp = food.g || "Other";
    if(!groups[grp]) groups[grp] = [];
    const a = agg[k];
    const qty = a.srv ? srvQtyLabel(food, a.srv) : (Math.round(a.g / 5) * 5) + " g";
    groups[grp].push({
      name: (food.n || k).split(" (")[0],
      qty, key: k, grams: a.g, srv: a.srv,
      cls: prepClass(k, food)
    });
  });
  return groups;
}

/* ---------- Sunday prep: built from the actual foods, not a template ---------- */
function sundayPrepLines(c, groups){
  const isWeek = (c.nutrition.weekPlan || []).length >= 5;
  const all = Object.keys(groups).reduce((a, g) => a.concat(groups[g].map(x => Object.assign({grp:g}, x))), []);
  const pick = (grp, cls) => all.filter(x => x.grp === grp && x.cls === cls);
  const names = arr => arr.map(x => x.name).join(", ");
  const withQty = arr => arr.map(x => x.name + " (" + x.qty + ")").join(", ");
  const lines = [];

  const cookP = pick("Protein","cook");
  if(cookP.length){
    lines.push("<b>Batch-cook the proteins:</b> season and cook " + withQty(cookP) + " in one session. Weigh cooked portions \u2014 the gram amounts in the day tables are cooked weight.");
    if(isWeek) lines.push("<b>Split the week:</b> Days 1\u20134 straight to the fridge, Days 5\u20137 into the freezer. Move the frozen portions down to the fridge Thursday night.");
  }
  const freshP = pick("Protein","fresh");
  if(freshP.length) lines.push("<b>Cook fresh, morning-of:</b> " + names(freshP) + ". Do not batch these \u2014 four-day-old scrambled eggs are how people quit.");
  const portP = pick("Protein","portion");
  if(portP.length) lines.push("<b>No cooking \u2014 portion only:</b> " + withQty(portP) + ". Split into containers Sunday, or buy single-serve cups and skip the step.");

  const cookC = pick("Carb","cook");
  if(cookC.length) lines.push("<b>Cook the carbs once:</b> " + withQty(cookC) + ". Portion by the gram amounts on each day\u2019s table \u2014 not by eye.");
  const dryC = pick("Carb","dry");
  if(dryC.length) lines.push("<b>Measure dry:</b> " + withQty(dryC) + " \u2014 weigh into jars now, cook each morning.");
  const portC = pick("Carb","portion");
  if(portC.length) lines.push("<b>Grab-and-go:</b> " + names(portC) + ". Buy them, don\u2019t prep them.");

  const cookV = pick("Veg","cook");
  const rawV = pick("Veg","portion");
  if(cookV.length) lines.push("<b>Roast the vegetables:</b> " + withQty(cookV) + ". Sheet pan, 400\u00b0F, done while the protein rests.");
  if(rawV.length) lines.push("<b>Wash + store raw:</b> " + names(rawV) + ".");

  const fats = pick("Fat","portion");
  if(fats.length) lines.push("<b>Fats \u2014 weigh, never pour:</b> " + withQty(fats) + ". This is the number most people miss by 200 calories a day.");

  const lth = all.filter(x => x.cls === "lth");
  if(lth.length) lines.push("<b>LTH:</b> " + lth.map(x => x.name + " \u2014 " + x.qty).join("; ") + " this week. Auto-ship saves 10%.");

  lines.push("<b>The rule:</b> gram-weigh everything once, on Sunday. Zero decisions on weekdays \u2014 decisions are where diets die.");
  return lines;
}

/* ================================================================
   v23b — density-aware caps + multi-anchor reconciliation
   ================================================================ */

function capFor(role, key){
  if(role === "P") return 300;
  if(role === "C") return 350;
  const food = FOOD_DB[key] || {};
  const dens = (food.f || 20) / 100;   /* g fat per g food */
  if(dens >= 0.50) return 30;          /* oils, tahini, walnuts, peanut butter */
  if(dens >= 0.40) return 60;          /* almonds, flax */
  return 200;                          /* avocado, hummus, chia — low density */
}

/* every adjustable anchor for a macro role, last meal first */
function macroAnchors(tpl, role){
  const out = [];
  for(let i = tpl.length - 1; i >= 0; i--){
    const it = (tpl[i].items || []).find(x => x.role === role);
    if(it) out.push({mealIdx: i, key: it.f});
  }
  return out;
}

/* push `delta` grams of `mk` through the anchors, respecting caps and floors */
function applyMacroDelta(meals, c, anchors, role, mk, delta){
  const db = Object.assign({}, FOOD_DB, c.nutrition.customFoods || {});
  for(const a of anchors){
    if(Math.abs(delta) < 0.3) break;
    const food = db[a.key];
    if(!food || food.per === "srv") continue;
    const perg = (food[mk] || 0) / 100;
    if(perg <= 0) continue;
    const meal = meals[a.mealIdx];
    if(!meal) continue;
    let item = meal.items.find(x => x.f === a.key);
    if(!item){
      if(delta <= 0) continue;
      item = {f: a.key, q: "0"};
      meal.items.push(item);
    }
    const q0 = parseFloat(item.q) || 0;
    const want = q0 + delta / perg;
    const q1 = Math.min(Math.max(0, Math.round(want / 5) * 5), capFor(role, a.key));
    delta -= (q1 - q0) * perg;
    item.q = String(q1);
  }
}

function reconcileDay(meals, tpl, calc, c){
  /* fat first (least cross-talk), protein next, carbs absorb the remainder */
  const order = [["F","f","fat"], ["P","p","protein"], ["C","c","carbs"]];
  const anchors = {F: macroAnchors(tpl,"F"), P: macroAnchors(tpl,"P"), C: macroAnchors(tpl,"C")};
  for(let pass = 0; pass < 10; pass++){
    order.forEach(([role, mk, tk]) => {
      const target = tk === "protein" ? calc.protein : tk === "carbs" ? calc.carbs : calc.fat;
      const delta = target - dayMacroTotals(meals, c)[mk];
      if(Math.abs(delta) < 0.3) return;
      applyMacroDelta(meals, c, anchors[role], role, mk, delta);
    });
  }
  meals.forEach(m => { m.items = m.items.filter(x => (parseFloat(x.q) || 0) > 0); });
}

/* ================================================================
   v23c — protein weighted to main meals; dinner protected from the reconciler
   ================================================================ */

/* protein leans on meals, not snacks. index 1 = the reserved shake slot. */
const PROTEIN_PCT = [0.22, 0.00, 0.32, 0.06, 0.40];

/* a main meal keeps a real protein portion unless the math truly forbids it */
const P_FLOOR = {
  egg_whites:60, greek_yogurt_nonfat:120, cottage_cheese_lowfat:80,
  tuna_canned_water:60, firm_tofu:120, tempeh:100, edamame:80, lentils_cooked:100
};
function floorFor(role, key, isMain){
  if(role !== "P" || !isMain) return 0;
  return P_FLOOR[key] || 100;   /* ~4oz cooked animal protein */
}

function macroAnchors(tpl, role){
  const out = [];
  tpl.forEach((slot, i) => {
    const it = (slot.items || []).find(x => x.role === role);
    if(it) out.push({mealIdx: i, key: it.f, isMain: /^Meal/.test(slot.label || "")});
  });
  if(role === "P"){
    /* give protein back from snacks first, then breakfast, then lunch — dinner last */
    const reduce = out.slice().sort((a,b)=> (a.isMain - b.isMain) || (a.mealIdx - b.mealIdx));
    return {reduce, increase: reduce.slice().reverse()};
  }
  const lastFirst = out.slice().reverse();
  return {reduce: lastFirst, increase: lastFirst};
}

function applyMacroDelta(meals, c, list, role, mk, delta, useFloors){
  const db = Object.assign({}, FOOD_DB, c.nutrition.customFoods || {});
  for(const a of list){
    if(Math.abs(delta) < 0.3) break;
    const food = db[a.key];
    if(!food || food.per === "srv") continue;
    const perg = (food[mk] || 0) / 100;
    if(perg <= 0) continue;
    const meal = meals[a.mealIdx];
    if(!meal) continue;
    let item = meal.items.find(x => x.f === a.key);
    if(!item){
      if(delta <= 0) continue;
      item = {f: a.key, q: "0"};
      meal.items.push(item);
    }
    const q0 = parseFloat(item.q) || 0;
    const want = q0 + delta / perg;
    const floor = useFloors ? floorFor(role, a.key, a.isMain) : 0;
    /* never raise a portion just to satisfy a floor while cutting */
    const lo = (want >= q0) ? 0 : Math.min(floor, q0);
    const q1 = Math.min(Math.max(lo, Math.round(want / 5) * 5), capFor(role, a.key));
    delta -= (q1 - q0) * perg;
    item.q = String(q1);
  }
  return delta;
}

function reconcileDay(meals, tpl, calc, c){
  const order = [["F","f"], ["P","p"], ["C","c"]];
  const anchors = {F: macroAnchors(tpl,"F"), P: macroAnchors(tpl,"P"), C: macroAnchors(tpl,"C")};
  const targetOf = mk => mk === "p" ? calc.protein : mk === "c" ? calc.carbs : calc.fat;

  for(let pass = 0; pass < 10; pass++){
    order.forEach(([role, mk]) => {
      let delta = targetOf(mk) - dayMacroTotals(meals, c)[mk];
      if(Math.abs(delta) < 0.3) return;
      const list = delta > 0 ? anchors[role].increase : anchors[role].reduce;
      /* pass 1: respect protein floors. pass 2: relax them only if the day can't balance. */
      delta = applyMacroDelta(meals, c, list, role, mk, delta, true);
      if(Math.abs(delta) >= 0.3) applyMacroDelta(meals, c, list, role, mk, delta, false);
    });
  }
  meals.forEach(m => { m.items = m.items.filter(x => (parseFloat(x.q) || 0) > 0); });
}

function solveDayPlanTpl(c, calc, tpl){
  const db = Object.assign({}, FOOD_DB, c.nutrition.customFoods || {});
  const resBy = tpl.map(slot => {
    const r = {p:0, c:0, f:0};
    (slot.items || []).forEach(it => {
      const f = db[it.f];
      if(f && f.per === "srv"){ r.p += f.p; r.c += f.c; r.f += f.f; }
    });
    return r;
  });
  const res = resBy.reduce((a,b)=>({p:a.p+b.p, c:a.c+b.c, f:a.f+b.f}), {p:0,c:0,f:0});
  const budget = {
    p: Math.max(calc.protein - res.p, 0),
    c: Math.max(calc.carbs - res.c, 0),
    f: Math.max(calc.fat - res.f, 0)
  };

  let rem = {p: calc.protein, c: calc.carbs, f: calc.fat};
  const meals = [];
  tpl.forEach((slot, si) => {
    const last = si === tpl.length - 1;
    const r = resBy[si];
    const ppct = PROTEIN_PCT[si] !== undefined ? PROTEIN_PCT[si] : slot.pct;
    const tgt = last
      ? {p: Math.max(rem.p, 0), c: Math.max(rem.c, 0), f: Math.max(rem.f, 0)}
      : {p: Math.min(budget.p * ppct + r.p, Math.max(rem.p, 0)),
         c: Math.min(budget.c * slot.pct + r.c, Math.max(rem.c, 0)),
         f: Math.min(budget.f * slot.pct + r.f, Math.max(rem.f, 0))};
    const acc = {p:0, c:0, f:0};
    const items = [];
    const addItem = (key, q) => {
      const m = foodMacros(key, q, c);
      if(!m) return;
      acc.p += m.p; acc.c += m.c; acc.f += m.f;
      items.push({f:key, q:String(q)});
    };
    slot.items.filter(it => it.fixed).forEach(it => addItem(it.f, it.q));
    /* carbs & fats first so the protein anchor absorbs what they already carry */
    ["C","F","P"].forEach(role => {
      slot.items.filter(it => it.role === role).forEach(it => {
        const food = db[it.f];
        if(!food) return;
        let q;
        if(food.per === "srv"){ q = 1; }
        else {
          const perg = {P: food.p/100, C: food.c/100, F: food.f/100}[role];
          if(!perg || perg <= 0) return;
          const need = {P: tgt.p - acc.p, C: tgt.c - acc.c, F: tgt.f - acc.f}[role];
          q = Math.round(Math.max(need, 0) / perg / 5) * 5;
          if(role === "P" && /^Meal/.test(slot.label || "")) q = Math.max(q, floorFor("P", it.f, true));
          q = Math.min(q, capFor(role, it.f));
        }
        if(food.per === "srv" ? q >= 1 : q >= 10) addItem(it.f, q);
      });
    });
    rem.p -= acc.p; rem.c -= acc.c; rem.f -= acc.f;
    meals.push({name: slot.label, items});
  });

  reconcileDay(meals, tpl, calc, c);
  return meals;
}

/* ---------- v25: a day can hold more than one activity ---------- */
const DESIGN_ORDER = ["trainer","ghost","cardio","classes","stretch"];
const DESIGN_TINY  = {trainer:"TRN", ghost:"GHT", cardio:"CAR", classes:"CLS", stretch:"STR"};
const DZ_MAX = 3;

/* cells are stored as a comma string ("trainer,cardio") so Firebase keeps
   the 7-slot array intact \u2014 empty arrays get dropped by RTDB. */
function dzTypes(cell){
  if(!cell) return [];
  const raw = Array.isArray(cell) ? cell.map(String) : String(cell).split(",");
  return DESIGN_ORDER.filter(k => raw.indexOf(k) !== -1);
}
function dzJoin(list){ return DESIGN_ORDER.filter(k => list.indexOf(k) !== -1).join(","); }

function designSummary(c){
  const phases = ((c.design || {}).phases) || [];
  const blank = () => ({trainer:0, ghost:0, cardio:0, classes:0, stretch:0, total:0, days:0});
  const perWeek = [0,1,2,3].map(i => {
    const o = blank();
    (((phases[i] || {}).days) || []).forEach(cell => {
      const list = dzTypes(cell);
      if(list.length) o.days++;
      list.forEach(t => { if(o[t] !== undefined){ o[t]++; o.total++; } });
    });
    return o;
  });
  const totals = blank();
  PHASE_WEEKS.forEach((wks, i) => {
    Object.keys(totals).forEach(k => { totals[k] += perWeek[i][k] * wks; });
  });
  return {
    perWeek, totals,
    trainerPerWeek: perWeek.map(p => p.trainer),
    stretchPerWeek: perWeek.map(p => p.stretch),
    hasPlan: totals.total > 0
  };
}

/* ---------- the tap sheet ---------- */
let dzTarget = null;

function dzSheetHtml(p, d){

    <div style="font-size:18px;font-weight:900;color:#fff;margin:3px 0 3px;">Every ${DAY_NAMES[d]} in this phase</div>

    ${DESIGN_ORDER.map(k => {
      const t = DESIGN_TYPES[k];

    }).join("")}
    <div style="display:flex;gap:9px;margin-top:4px;">
      <div class="dz-opt" style="flex:1;margin:0;background:#1f1f1f;color:#999;justify-content:center;border:1px solid #333;font-size:13.5px;" onclick="dzSet('')">${cur.length ? "Clear day" : "Cancel"}</div>
      <div class="dz-opt" style="flex:1;margin:0;background:#CC0000;color:#fff;justify-content:center;font-size:13.5px;" onclick="dzDone()">Done</div>
    </div>
  </div>`;
}

function dzPick(p, d){
  collectFormIntoClient();
  dzTarget = {p, d};
  let el = document.getElementById("dzPicker");
  if(!el){ el = document.createElement("div"); el.id = "dzPicker"; document.body.appendChild(el); }
  el.className = "dz-picker";
  el.style.display = "flex";
  el.innerHTML = dzSheetHtml(p, d);
  el.onclick = dzDone;
}

function dzSet(type){
  if(!dzTarget) return;
  const {p, d} = dzTarget;
  const c = clients[activeClientId];
  if(!type){
    c.design.phases[p].days[d] = "";
    saveClients(clients); pushClientToFirebase(c.id, c);
    dzDone();
    return;
  }
  const list = dzTypes(c.design.phases[p].days[d]);
  const at = list.indexOf(type);
  if(at !== -1) list.splice(at, 1);
  else if(list.length >= DZ_MAX) return;
  else list.push(type);
  c.design.phases[p].days[d] = dzJoin(list);
  saveClients(clients);
  pushClientToFirebase(c.id, c);
  const el = document.getElementById("dzPicker");
  if(el) el.innerHTML = dzSheetHtml(p, d);
}

function dzDone(){
  const had = !!dzTarget;
  dzClose();
  if(had) renderModal();
}

function dzClose(){
  const el = document.getElementById("dzPicker");
  if(el) el.style.display = "none";
  dzTarget = null;
}

function dzCopyPhase(from, to){
  collectFormIntoClient();
  const c = clients[activeClientId];
  c.design.phases[to].days = c.design.phases[from].days.slice();
  saveClients(clients);
  pushClientToFirebase(c.id, c);

/* ================================================================
   ERN IT COACH HUB v25 — Fitness Services Agreement
   Prep + summary copy. Life Time's executed agreement governs.
   Only amended term: recurring draft lands on the same calendar
   day of the month as the signature date.
   ================================================================ */

const AG_PAY = [
  {k:"dues", label:"Membership Dues Card on File"},
  {k:"tab",  label:"Club Tab Card on File"},
];
const AG_CLUB = "Life Time, 10121 Washingtonian Blvd, Gaithersburg, MD 20878";
const AG_PAPER_DAYS = [3, 10, 17, 24, 28];

function ordinal(n){
  n = parseInt(n, 10);
  if(isNaN(n)) return "";
  const v = n % 100;
  if(v >= 11 && v <= 13) return n + "th";
  return n + (["th","st","nd","rd"][n % 10] || "th");
}

function fmtLongDate(iso){
  if(!iso) return "";
  const p = String(iso).split("-");
  if(p.length !== 3) return iso;
  const d = new Date(+p[0], +p[1] - 1, +p[2]);
  if(isNaN(d.getTime())) return iso;
  return d.toLocaleDateString(undefined, {month:"long", day:"numeric", year:"numeric"});
}

function agKind(c){
  const a = agOf(c);
  if(a.kind) return a.kind;
  const o = selectedProgram(c);
  if(!o) return "";
  return o.recur ? "recurring" : "pack";
}

function agMoney(c){
  const o = selectedProgram(c);
  const extras = selectedExtras(c);
  const extraSum = extras.reduce((s, e) => s + e.price, 0);
  const base = o ? o.price : 0;
  return {o, extras, extraSum, base, today: base + extraSum, monthly: (o && agKind(c) === "recurring") ? base : 0};
}

/* the calendar day they signed */
function agSignDay(c){
  const a = agOf(c);
  const d = a.sigDate || a.startDate || todayISO();
  const day = parseInt(String(d).split("-")[2], 10);
  return isNaN(day) ? null : day;
}

/* the day the card actually gets hit \u2014 one of Life Time's five */
function agBillDay(c){
  const a = agOf(c);
  if(a.draftDay) return parseInt(a.draftDay, 10);
  return agPaperBox(agSignDay(c));
}

function agLevelNum(c){
  const m = String(agOf(c).trainerLevel || "").match(/[1-5]/);
  return m ? m[0] : null;
}
function agIsPdo(c){
  const o = selectedProgram(c);
  return !!(o && o.key === "pdo");
}

/* the paper form only has five boxes \u2014 tell him which one to tick */
function agPaperBox(day){
  if(!day) return null;
  return AG_PAPER_DAYS.find(d => d >= day) || AG_PAPER_DAYS[0];
}

function agAuto(c){
  const a = agOf(c);
  if(!a.first && !a.last && c.name){
    const parts = String(c.name).trim().split(/\s+/);
    if(parts.length > 1){ a.last = parts.pop(); a.first = parts.join(" "); }
    else { a.first = parts[0] || ""; }
  }
  if(!a.startDate) a.startDate = todayISO();
  if(!a.trainerLevel) a.trainerLevel = "Level 4";
  if(!a.assoc) a.assoc = "Ernest Joseph Jr.";
  const o = selectedProgram(c);
  if(!a.serviceType && o) a.serviceType = o.label;
  return a;
}

/* ---------- signature pad ---------- */
let sigDrawing = false;

function initSigPad(){
  const cv = document.getElementById("sigPad");
  if(!cv) return;
  const a = agOf(clients[activeClientId]);
  const rect = cv.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  cv.width  = Math.max(1, Math.round(rect.width  * dpr));
  cv.height = Math.max(1, Math.round(rect.height * dpr));
  const ctx = cv.getContext("2d");
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, rect.width, rect.height);   /* transparent \u2014 see fillOfficialPdf */
  ctx.lineWidth = 2.2; ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.strokeStyle = "#111";

  if(a.sigData){
    const img = new Image();
    img.onload = ()=>{ ctx.drawImage(img, 0, 0, rect.width, rect.height); };
    img.src = a.sigData;
  }

  const pos = (e)=>{ const r = cv.getBoundingClientRect(); return {x: e.clientX - r.left, y: e.clientY - r.top}; };
  cv.onpointerdown = (e)=>{
    e.preventDefault();
    try{ cv.setPointerCapture(e.pointerId); }catch(_){}
    sigDrawing = true;
    const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x + 0.1, p.y); ctx.stroke();
  };
  cv.onpointermove = (e)=>{ if(!sigDrawing) return; e.preventDefault(); const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
  cv.onpointerup = ()=>{ if(!sigDrawing) return; sigDrawing = false; sigCommit(); };
  cv.onpointercancel = ()=>{ sigDrawing = false; };
}

function sigCommit(){
  const cv = document.getElementById("sigPad");
  if(!cv) return;
  const c = clients[activeClientId];
  const a = agOf(c);
  a.sigData = cv.toDataURL("image/png");
  if(!a.sigDate) a.sigDate = todayISO();
  a.sigAt = new Date().toISOString();
  agSave();
  const meta = document.getElementById("sigMeta");
  if(meta) meta.innerHTML = sigMetaHtml(c);
  const sched = document.getElementById("agSched");
  if(sched) sched.innerHTML = agSchedHtml(c);
}

function sigClear(){
  const a = agOf(clients[activeClientId]);
  a.sigData = ""; a.sigDate = ""; a.sigAt = ""; a.pdfAt = "";
  agSave();
  renderModal();
}

function sigMetaHtml(c){

  }
  if(m.extras.length) lines.push("Add-ons: " + m.extras.map(e => e.label + " ($" + e.price + ")").join(", "));
  lines.push("Payment method: " + ((AG_PAY.find(p => p.k === a.payMethod) || {}).label || "\u2014"));
  lines.push("");
  lines.push("THE TERMS");
  agPlainTerms(c).forEach(t => { lines.push(t); lines.push(""); });
  lines.push("The complete Fitness Services Agreement you signed at the club is the controlling document. This restates it for your records.");
  lines.push("");
  lines.push("\u2014 Ernest");

  return "mailto:" + encodeURIComponent(c.email || "")
    + "?subject=" + encodeURIComponent("Your Fitness Services Agreement \u2014 Life Time")
    + "&body=" + encodeURIComponent(lines.join("\n"));
}

function exportAgreementPdf(){
  collectFormIntoClient();
  const c = clients[activeClientId];

}

/* ================================================================
   OFFICIAL LIFE TIME FORM \u2014 coordinate fill (v30)
   The blank PDF lives in this iPad's storage, never on the server.
   Coordinates measured off the Gaithersburg 2/18/26 revision.
   ================================================================ */
const AG_BLANK_KEY = "ernit_ag_blank_v1";
const PDFLIB_SRC = "https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js";
const PG_H = 792;
const TY = (yTop) => PG_H - yTop;

const AG_XY = {
  date:{x:445,y:98.0,w:88}, last:{x:68,y:115.0,w:138}, first:{x:212,y:115.0,w:138},
  cell:{x:356,y:115.0,w:102}, home:{x:464,y:115.0,w:68},
  city:{x:356,y:145.2,w:68}, state:{x:428,y:145.2,w:68}, zip:{x:500,y:145.2,w:34},
  email:{x:68,y:174.3,w:282}, memberNo:{x:356,y:174.3,w:176},
  service:{x:187,y:228.0,w:237},
  startDate:{x:114,y:263.0,w:92}, redemption:{x:353,y:263.0,w:71}, fees:{x:470,y:263.0,w:62},
  totalAmt:{x:410,y:305.1,w:86}, associate:{x:166,y:445.5,w:368},
  todayPay:{x:328,y:509.8,w:60}, recurAmt:{x:480,y:556.3,w:38}, beginMonth:{x:497,y:567.7,w:36},
};
const AG_OVAL = {dues:{x:71.1,y:359.2}, tab:{x:272.9,y:360.9}, recurring:{x:71.1,y:394.8}};
const AG_DAYBOX = {3:159.05, 10:250.5, 17:339.2, 24:431.75, 28:523.0};
const AG_DAYBOX_Y = 415.9;
const AG_SIG = {x:115, y:132.8, maxW:250, maxH:36};
const AG_SIGDATE = {x:420, y:132.5};

function loadPdfLib(){
  if(window.PDFLib) return Promise.resolve(window.PDFLib);
  return new Promise((res, rej)=>{
    const el = document.createElement("script");
    el.src = PDFLIB_SRC;
    el.onload = ()=> res(window.PDFLib);
    el.onerror = ()=> rej(new Error("Couldn\u2019t reach the PDF library \u2014 check your connection."));
    document.head.appendChild(el);
  });
}

function agBlank(){ try{ return localStorage.getItem(AG_BLANK_KEY); }catch(e){ return null; } }

function agBlankLoad(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      localStorage.setItem(AG_BLANK_KEY, r.result);
      renderModal();
    }catch(e){ alert("Not enough room on this device to store the blank form."); }
  };
  r.readAsDataURL(file);
}

function agBlankClear(){
  if(!confirm("Remove the blank agreement form from this device?")) return;
  localStorage.removeItem(AG_BLANK_KEY);
  renderModal();
}

function b64ToBytes(dataUrl){
  const b64 = String(dataUrl).split(",")[1] || "";
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for(let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

/* older signatures were saved on a white background \u2014 knock it out */
function sigTransparent(dataUrl){
  return new Promise((res)=>{
    const img = new Image();
    img.onload = ()=>{
      const cv = document.createElement("canvas");
      cv.width = img.width; cv.height = img.height;
      const cx = cv.getContext("2d");
      cx.drawImage(img, 0, 0);
      try{
        const d = cx.getImageData(0, 0, cv.width, cv.height);
        const px = d.data;
        for(let i = 0; i < px.length; i += 4){
          if(px[i] > 235 && px[i+1] > 235 && px[i+2] > 235) px[i+3] = 0;
        }
        cx.putImageData(d, 0, 0);
      }catch(e){}
      res(cv.toDataURL("image/png"));
    };
    img.onerror = ()=> res(dataUrl);
    img.src = dataUrl;
  });
}

/* which month the recurring draft first lands in */
function agBeginMonth(c){
  if(agKind(c) !== "recurring") return "";
  const a = agOf(c);
  const iso = a.sigDate || a.startDate || todayISO();
  const p = String(iso).split("-").map(Number);
  if(p.length !== 3) return "";
  let [yy, mm, dd] = p;
  const draft = agBillDay(c);
  if(draft && dd > draft){ mm++; if(mm > 12){ mm = 1; yy++; } }
  return new Date(yy, mm - 1, 1).toLocaleDateString(undefined, {month:"short"}) + " " + yy;
}

/* StandardFonts are WinAnsi \u2014 anything exotic throws on draw */
function agAscii(t){
  return String(t == null ? "" : t)
    .replace(/[\u00d7\u2715\u2716]/g, "x")
    .replace(/[\u2018\u2019]/g, "'")
    .replace(/[\u201c\u201d]/g, '"')
    .replace(/[\u2013\u2014]/g, "-")
    .replace(/[^\x20-\xff]/g, "");
}

function agFormData(c){
  const a = agOf(c), m = agMoney(c), kind = agKind(c);
  const num = (n) => n ? n.toLocaleString() : "";
  return {
    date: fmtLongDate(a.sigDate || a.startDate),
    last: a.last, first: a.first,
    cell: c.phone, home: a.phoneHome,
    city: a.city, state: a.state, zip: a.zip,
    email: c.email, memberNo: a.memberNo,
    service: [a.serviceType, a.trainerLevel].filter(Boolean).join("  \u00b7  "),
    startDate: fmtLongDate(a.startDate),
    redemption: kind === "pack" ? "90 days" : "N/A",
    fees: num(m.today),
    totalAmt: kind === "pack" ? num(m.today) : "",
    associate: a.assoc,
    todayPay: num(m.today),
    recurAmt: kind === "recurring" ? num(m.monthly) : "",
    beginMonth: agBeginMonth(c),
  };
}

async function buildOfficialPdf(c){
  const blank = agBlank();
  if(!blank) throw new Error("Load the blank agreement form first.");
  const PDFLib = await loadPdfLib();
  const {PDFDocument, StandardFonts, rgb} = PDFLib;

  const pdf = await PDFDocument.load(b64ToBytes(blank));
  const font = await pdf.embedFont(StandardFonts.Helvetica);
  const bold = await pdf.embedFont(StandardFonts.HelveticaBold);
  const pages = pdf.getPages();
  const p1 = pages[0], pLast = pages[pages.length - 1];
  const ink = rgb(0.05, 0.05, 0.15);

  const fit = (f, t, size, maxW) => { let s = size; while(s > 5.5 && f.widthOfTextAtSize(t, s) > maxW) s -= 0.25; return s; };

  const a = agOf(c), kind = agKind(c);
  const data = agFormData(c);
  Object.keys(data).forEach(k => {
    const box = AG_XY[k];
    const t = agAscii(data[k]);
    if(!t || !box) return;
    p1.drawText(t, {x:box.x, y:TY(box.y), size:fit(font, t, 9.5, box.w), font, color:ink});
  });

  const dot = (o) => p1.drawEllipse({x:o.x, y:TY(o.y + 3.0), xScale:3.1, yScale:2.0, color:ink});
  if(a.payMethod === "dues") dot(AG_OVAL.dues);
  if(a.payMethod === "tab")  dot(AG_OVAL.tab);

  if(kind === "recurring"){
    dot(AG_OVAL.recurring);
    const day = agBillDay(c);
    if(AG_DAYBOX[day]){
      const w = bold.widthOfTextAtSize("X", 10);
      p1.drawText("X", {x:AG_DAYBOX[day] - w/2, y:TY(AG_DAYBOX_Y), size:10, font:bold, color:ink});
    }
  }

  if(a.sigData){
    const png = await pdf.embedPng(await sigTransparent(a.sigData));
    const sc = Math.min(AG_SIG.maxW / png.width, AG_SIG.maxH / png.height);
    pLast.drawImage(png, {x:AG_SIG.x, y:TY(AG_SIG.y), width:png.width * sc, height:png.height * sc});
    pLast.drawText(agAscii(fmtLongDate(a.sigDate)), {x:AG_SIGDATE.x, y:TY(AG_SIGDATE.y), size:9.5, font, color:ink});
  }

  return pdf.save();
}

function agFileName(c){
  const a = agOf(c);
  const who = ((a.first || "") + "-" + (a.last || "")).replace(/^-|-$/g, "") || "member";
  return "Fitness-Services-Agreement-" + who.replace(/\s+/g, "-") + "-" + (a.sigDate || todayISO()) + ".pdf";
}

function agMarkExported(c){
  const a = agOf(c);
  if(a.sigData){ a.pdfAt = new Date().toISOString(); agSave(); }
}

async function saveOfficialPdf(){
  collectFormIntoClient();
  const c = clients[activeClientId];
  const btn = document.getElementById("agOfficialBtn");
  if(btn) btn.textContent = "Filling\u2026";
  try{
    const bytes = await buildOfficialPdf(c);
    const blob = new Blob([bytes], {type:"application/pdf"});
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url; link.download = agFileName(c);
    document.body.appendChild(link); link.click(); link.remove();
    setTimeout(()=> URL.revokeObjectURL(url), 4000);
    agMarkExported(c);
  }catch(e){ alert(e.message); }
  renderModal();
}

async function shareOfficialPdf(){
  collectFormIntoClient();
  const c = clients[activeClientId];
  const btn = document.getElementById("agShareBtn");
  if(btn) btn.textContent = "Preparing\u2026";
  try{
    const bytes = await buildOfficialPdf(c);
    const file = new File([bytes], agFileName(c), {type:"application/pdf"});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:"Fitness Services Agreement"});
      agMarkExported(c);
    } else {
      alert("This browser can\u2019t attach files to a share sheet. Use Fill Official PDF, then attach it from Files.");
    }
  }catch(e){ if(e && e.name !== "AbortError") alert(e.message || "Share cancelled."); }
  renderModal();
}

function agOfficialSection(c){
  const blank = agBlank();
  const a = agOf(c);
  if(!blank){
    return `<div class="section-head" style="margin-top:22px;">Official Life Time Form</div>
      <div style="font-size:11.5px;color:var(--grey);line-height:1.55;margin-bottom:10px;">Load the blank <b style="color:var(--white);">Fitness Services Agreement</b> PDF once. It stays on this iPad \u2014 it is never uploaded to the site or the cloud.</div>
      <label class="scan-btn" style="display:block;text-align:center;cursor:pointer;">Load Blank Agreement PDF
        <input type="file" accept="application/pdf" style="display:none;" onchange="agBlankLoad(this)"></label>`;
  }
  const kb = Math.round(blank.length * 0.75 / 1024);
  const ready = !!a.sigData;
  return `<div class="section-head" style="margin-top:22px;">Official Life Time Form</div>
    <div style="display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#5fbf7f;margin-bottom:11px;">
      <span>\u2713 Blank form loaded on this device \u00b7 ${kb} KB</span>
      <span style="color:var(--grey-dim);text-decoration:underline;cursor:pointer;" onclick="agBlankClear()">Remove</span>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="scan-btn" id="agOfficialBtn" style="flex:1;${ready?"":"opacity:.5;"}" onclick="saveOfficialPdf()">Fill Official PDF</button>
      <button class="scan-btn" id="agShareBtn" style="flex:1;${ready?"":"opacity:.5;"}" onclick="shareOfficialPdf()">Share / Email PDF</button>
    </div>
    <div style="font-size:10.5px;color:var(--grey-dim);margin-top:8px;line-height:1.45;">${ready
      ? "Fills page 1 and stamps the signature on the last page. <b>Share</b> opens the iOS sheet \u2014 pick Mail and the PDF rides along as an attachment."
      : "Sign above first. The fill needs a signature to stamp."}</div>`;
}
